<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>HUB.nexus</title>

  <link rel="stylesheet" href="css/global.css"/>

  <style>
    body {
      background: var(--bg);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-body);
      overflow: hidden;
    }

    .login-card {
      width: 420px;
      max-width: 90vw;
      background: var(--surface);
      border-radius: 32px;
      padding: 40px;
      text-align: center;
      box-shadow: var(--clay-shadow-lg);
      border: 2px solid rgba(255,255,255,.7);
    }

    .login-logo {
      width: 100px;
      height: 100px;
      margin: 0 auto 20px;
    }

    .login-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .login-title {
      font-size: 28px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .login-sub {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 30px;
    }

    .cta-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: .2s;
      box-shadow: var(--clay-shadow-accent);
    }

    .cta-btn:hover {
      transform: translateY(-3px);
    }

    .status-pill {
      margin-top: 25px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      font-size: 12px;
      font-weight: 700;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
    }
  </style>
</head>

<body>

<div class="login-card">

  <div class="login-logo">
    <img src="assets/logo.png" alt="HUB.nexus">
  </div>

  <h1 class="login-title">
    Bem-vindo ao HUB.nexus 👋
  </h1>

  <p class="login-sub">
    Plataforma interna · Ambiente de demonstração
  </p>

  <button class="cta-btn" onclick="entrarPlataforma()">
    Entrar na Plataforma →
  </button>

  <div class="status-pill">
    <div class="pulse-dot"></div>
    Sistema online
  </div>

</div>


<script>
function entrarPlataforma() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
```
