<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    body { display:flex; flex-direction:column; overflow:hidden; height:100vh; background:var(--bg); }
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .topbar { display:flex; align-items:center; justify-content:space-between; padding:0 20px; height:52px; flex-shrink:0; backdrop-filter:blur(30px); background:rgba(255,255,255,0.03); border-bottom:1px solid rgba(255,255,255,0.07); z-index:5; }
    .topbar-left { display:flex; align-items:center; gap:10px; }
    .topbar-badge { font-size:10px; padding:3px 9px; background:hsla(var(--theme-h),90%,50%,0.10); border:1px solid hsla(var(--theme-h),90%,50%,0.22); border-radius:var(--r-pill); color:var(--orange-2); display:flex; align-items:center; gap:5px; }
    .topbar-title { font-size:13px; font-weight:500; color:var(--text-primary); letter-spacing:-0.2px; }
    .topbar-right { display:flex; align-items:center; gap:8px; }
    .tbtn { display:inline-flex; align-items:center; gap:5px; padding:6px 12px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.09); border-radius:var(--r-sm); font-size:11px; color:var(--text-secondary); cursor:pointer; font-family:'Inter',sans-serif; transition:all var(--t-normal); }
    .tbtn:hover { background:rgba(255,255,255,0.09); }
    .tbtn-primary { background:hsla(var(--theme-h),90%,50%,0.12); border-color:hsla(var(--theme-h),90%,50%,0.28); color:var(--orange-2); }
    .tbtn-primary:hover { background:hsla(var(--theme-h),90%,50%,0.22); }
    .tab-body { flex:1; overflow-y:auto; overflow-x:hidden; padding:20px; }
    .spinner { display:inline-block; width:12px; height:12px; border:2px solid rgba(255,128,64,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:5px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    body.light .tbtn { background:rgba(255,255,255,0.70); border-color:rgba(180,100,40,0.18); color:#7a4a30; }
    body.light .topbar { background:rgba(255,255,255,0.55); border-bottom-color:rgba(180,100,40,0.10); }
    body.light .topbar-title { color:#3a1200; }
    #navbar-container:not(:empty) ~ .main > .topbar .topbar-left { display:none !important; }
    #navbar-container:not(:empty) ~ .main > .topbar { justify-content:flex-end; padding-left:8px; height:46px; }
    .page-navbar { width:100%; }
  
  /* ── Modal de post manual ── */
  #embModalManual {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.55); align-items: center; justify-content: center;
  }
  #embModalManual.open { display: flex; }
  .emb-modal-box {
    background: var(--bg-card, #1e1e2e); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 24px; width: 100%; max-width: 520px;
    max-height: 90vh; overflow-y: auto;
  }
  .emb-modal-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin: 0 0 16px; }
  .emb-modal-field { margin-bottom: 12px; }
  .emb-modal-label { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); margin-bottom: 4px; display: block; }
  .emb-modal-input {
    width: 100%; box-sizing: border-box;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 7px; padding: 8px 10px; font-size: 12px; color: var(--text-primary);
    font-family: inherit; appearance: none; -webkit-appearance: none;
  }
  .emb-modal-input:focus { outline: none; border-color: var(--orange-2, #FF6B35); }
  select.emb-modal-input { background-color: #1e1e2e; color: var(--text-primary); }
  select.emb-modal-input option { background: #1e1e2e; color: var(--text-primary); }
  .emb-modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .emb-modal-row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .emb-modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
  .emb-modal-required { color: var(--orange-2, #FF6B35); }

  /* ── Abas Diário / Semanal ── */
  .tabs-bar { display:flex; gap:2px; padding:0 20px; border-bottom:1px solid rgba(255,255,255,0.07); flex-shrink:0; background:rgba(255,255,255,0.02); overflow-x:auto; overflow-y:hidden; }
  .main-tab { padding:10px 16px; font-size:12px; color:var(--text-muted); cursor:pointer; border:none; background:transparent; font-family:'Inter',sans-serif; transition:all 0.18s; border-bottom:2px solid transparent; margin-bottom:-1px; display:flex; align-items:center; gap:6px; white-space:nowrap; }
  .main-tab svg { width:12px; height:12px; flex-shrink:0; }
  .main-tab.active { color:var(--orange-2); border-bottom-color:var(--orange); }
  .main-tab:hover:not(.active) { color:var(--text-secondary); }
  body.light .tabs-bar { border-bottom-color:rgba(160,80,20,.14); background:rgba(255,245,235,.7); }
  body.light .main-tab { color:#9a6040; }
  body.light .main-tab.active { color:var(--accent-dark); border-bottom-color:var(--orange); }
  body.light .main-tab:hover:not(.active) { color:#5a2800; }

</style>
</head>
<body>

  <!-- Overlay de login -->
  <div id="embLoginOverlay" style="display:none;position:fixed;inset:0;z-index:9999;background:var(--bg);align-items:center;justify-content:center;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:18px;width:100%;max-width:340px;padding:0 20px;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:4px;">
        <div style="font-size:22px;font-weight:700;color:var(--text-primary);letter-spacing:-0.5px;">Ekklesia <span style="color:var(--orange-2);">Embratur</span></div>
        <div style="font-size:11px;color:var(--text-muted);">Monitoramento Internacional · Nexus</div>
      </div>
      <input id="embLoginInput" type="password" placeholder="Senha de acesso"
        style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:12px 16px;font-size:14px;color:var(--text-primary);font-family:'Inter',sans-serif;outline:none;text-align:center;letter-spacing:2px;">
      <button onclick="_embFazerLogin()"
        style="width:100%;padding:12px;background:var(--orange-2,#FF6B35);border:none;border-radius:10px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .15s;">

      </button>

    </div>

  <div id="embConteudo" style="height:100vh;flex-direction:column;display:none;">
  <div id="navbar-container"></div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <img src="../assets/logo.png" alt="HUB.nexus" style="height:32px;width:auto;object-fit:contain;filter:drop-shadow(0 0 4px hsla(var(--theme-h),90%,50%,0.2));flex-shrink:0;"/>
        <span class="topbar-title">Ekklesia para Embratur</span>
        <div class="topbar-badge" id="topbarBadge"><span class="pulse-dot"></span> Diário Internacional</div>
      </div>
      <div class="topbar-right">
        <button class="tbtn tbtn-primary" id="publishBtn" onclick="window.embPublicar && window.embPublicar()" style="display:none">
          <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          <span id="publishBtnLabel">Publicar link</span>
        </button>
        <button class="tbtn" onclick="toggleMode()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
      </div>
    </div>
    <div class="tabs-bar">
      <button class="main-tab active" id="tabBtnDiario" onclick="setTab('diario',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Diário
      </button>
      <button class="main-tab" id="tabBtnSemanal" onclick="setTab('semanal',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2-7 4 14 2-7h6"/></svg>
        Semanal

  <div id="toast" class="toast"></div>
  <script src="../js/utils.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/database.js"></script>
  <script>
    checkAuth();
    initMode();
    document.getElementById('navbar-container').innerHTML = renderNavbar('ekklesia-embratur');
    if (typeof initTheme === 'function') { initTheme(); updateModeButtons(); }

    /* ── Helpers mínimos usados pelo módulo Embratur ── */
    function fmtNum(n) {
      n = Number(n) || 0;
      return n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n);
    }
    function showToast(msg, dur) {
      const t = document.getElementById('toast');
      if (!t) return;
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._to);
      t._to = setTimeout(() => t.classList.remove('show'), dur || 3000);
    }

    /* ── Parser universal (Brandwatch OU exportação Reputaition) ──
       Resolve os aliases de coluna UMA VEZ (por header, não por linha) e
       cobre os dois formatos que de fato chegam aqui: CSV cru do Brandwatch
       e o XLS/CSV exportado do Reputaition após classificação (Polaridade,
       Data da menção, Link da menção, Publicação...). Sem isso, um upload
       no formato Reputaition cai 100% em campos vazios e quebra a
       deduplicação (ver _embAcumularRows). ── */
    function _embNorm(s) {
      return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[\u200B-\u200D\uFEFF]/g,'').trim();
    }
    // Extrai o handle da URL quando poss\u00EDvel (Twitter/X/Instagram t\u00EAm o username na URL).
    // Para Facebook e outros canais onde a URL n\u00E3o exp\u00F5e o handle, normaliza o nome de
    // exibi\u00E7\u00E3o removendo par\u00EAnteses, espa\u00E7os e caracteres especiais \u2014 garante um handle
    // v\u00E1lido (sem espa\u00E7os) para o formato @handle (url) no prompt da IA.
    function _embHandlePub(link, nome) {
      if (link) {
        const tw = link.match(/(?:twitter\.com|x\.com)\/([A-Za-z0-9_]{1,30})\/status/i);
        if (tw) return tw[1];
        const ig = link.match(/instagram\.com\/([A-Za-z0-9_.]{1,30})\//i);
        if (ig) return ig[1];
        const yt = link.match(/youtube\.com\/@([A-Za-z0-9_.]{1,30})/i);
        if (yt) return yt[1];
        const fb = link.match(/facebook\.com\/([A-Za-z0-9_.]{1,50})/i);
        if (fb && !['posts', 'permalink.php', 'story.php', 'groups', 'watch', 'photo', 'photos'].includes(fb[1].toLowerCase())) return fb[1];
      }
      // Fallback: remove parênteses/colchetes e seus conteúdos, depois remove espaços
      return (nome||'').replace(/\s*[\(\[].*?[\)\]]/g,'').trim().replace(/\s+/g,'').replace(/[^A-Za-z0-9_.]/g,'').substring(0,30) || (nome||'').replace(/\s+/g,'').substring(0,30);
    }
    function toFloat(v) {
      if (v === null || v === undefined || v === '') return null;
      if (typeof v === 'number') return Number.isFinite(v) ? v : null;
      let raw = String(v).trim().toLowerCase();
      const mult = raw.includes('mi') || raw.endsWith('m') ? 1000000 : raw.endsWith('k') || raw.includes('mil') ? 1000 : 1;
      raw = raw.replace(/\s/g, '').replace(/mi|mil|k|m/g, '');
      const hasComma = raw.includes(',');
      const hasDot = raw.includes('.');
      if (hasComma && hasDot) raw = raw.replace(/\./g, '').replace(',', '.');
      else if (hasComma) raw = raw.replace(',', '.');
      else if (/^-?\d{1,3}\.\d{3}(\.\d{3})*$/.test(raw)) raw = raw.replace(/\./g, '');
      else if ((raw.match(/\./g) || []).length > 1) raw = raw.replace(/\./g, '');
      const n = Number(raw.replace(/[^\d.-]/g, ''));
      return Number.isFinite(n) ? n * mult : null;
    }
    function canonRede(v) {
      if (!v) return 'desconhecido';
      let raw = String(v).toLowerCase().trim();
      if (raw.includes('facebook') || raw.startsWith('fb')) return 'facebook';
      if (raw.includes('instagram') || raw === 'ig') return 'instagram';
      if (raw.includes('twitter') || raw === 'x' || raw.includes('tweet')) return 'x';
      if (raw.includes('youtube') || raw === 'yt') return 'youtube';
      if (raw.includes('linkedin') || raw === 'li') return 'linkedin';
      if (raw.includes('tiktok') || raw === 'tk') return 'tiktok';
      if (raw.includes('bluesky') || raw === 'bs') return 'bluesky';
      if (raw.includes('threads')) return 'threads';

      v = raw.replace(/https?:\/\/|www\./g,'').split('/')[0].split('.')[0].trim();
      const MAP = {
        instagram_public:'instagram', ig:'instagram', instagram_business:'instagram', instagram_page:'instagram',
        facebook_public:'facebook', fb:'facebook', facebook_page:'facebook', facebook_group:'facebook', facebook_user:'facebook',
        twitter:'x', tweet:'x', x_post:'x'
      };
      return MAP[v] || MAP[raw] || v || 'desconhecido';
    }
    /* ── Normaliza variações de grafia mas mantém os 4 vocabulários separados ── */
    function canonSentEmb(v) {
      if (!v) return '';
      const raw = String(v).toLowerCase().trim()
        .normalize('NFD').replace(/[\u0300-\u036f]/g,''); // remove acentos para comparar
      const M = {
        'positivo':'positivo', 'positive':'positivo', 'very positive':'positivo', 'muito positivo':'positivo',
        'favoravel':'favoravel', 'favorable':'favoravel',
        'negativo':'negativo', 'negative':'negativo', 'very negative':'negativo', 'muito negativo':'negativo',
        'desfavoravel':'desfavoravel', 'unfavorable':'desfavoravel',
      };
      return M[raw] || '';
    }
    function parseDateCustom(dStr, horaStr) {
      if (!dStr && dStr !== 0) return null;
      const s = String(dStr).trim();
      const mBR = s.match(/^(\d{2})\/(\d{2})\/(\d{2,4})(?:[ T](\d{1,2}:\d{2}(?::\d{2})?))?/);
      if (mBR) {
        const yr = mBR[3].length===2?'20'+mBR[3]:mBR[3];
        const iso = yr+'-'+mBR[2]+'-'+mBR[1];
        const hora = mBR[4] || horaStr; // hora embutida na própria data tem prioridade
        return hora ? iso+'T'+String(hora).trim() : iso;
      }
      const mISO = s.match(/^(\d{4})[-\/](\d{2})[-\/](\d{2})(?:[ T](\d{1,2}:\d{2}(?::\d{2})?))?/);
      if (mISO) {
        const hora = mISO[4] || horaStr;
        return s.substring(0,10) + (hora ? 'T'+String(hora).trim() : '');
      }
      const asNum = Number(s.replace(',','.'));
      if (!isNaN(asNum) && asNum > 25569 && asNum < 73050) {
        return new Date(Math.round((asNum-25569)*86400*1000)).toISOString().substring(0,10);
      }
      return null;
    }
    function parseRows(rows, tipo) {
      if (!rows.length) return [];
      const hdr = Object.keys(rows[0]);
      const idx = {};
      hdr.forEach(h => { idx[_embNorm(h)] = h; });
      const resolve = (...aliases) => {
        for (const a of aliases) { const k = idx[_embNorm(a)]; if (k !== undefined) return k; }
        return null;
      };
      // ── Pré-resolve as chaves reais — uma vez, não por linha ──
      const K = {
        canal:    resolve('Page Type','Domain','page type','network','Canal','canal','Rede Social','rede social','Rede','rede','Channel','channel','Source','source','Source Name','source name','Platform','platform','Plataforma','plataforma','Media Type','media type','Tipo de Mídia','tipo de midia','Tipo de Media','tipo de media','Fonte','fonte'),
        data:     resolve('Date','date','data','created','Data da menção','data da mencao','Data','Data da Menção','Data da publicação','data da publicacao','Data de publicação'),
        hora:     resolve('Hora do post','hora do post','Hora','hora'),
        link:     resolve('Url','url','link','Link da menção','link da mencao','Link da publicação','link da publicacao','Link do post','link do post','Link original','link original','Link','Post URL','post url','Permalink','permalink','URL da publicação','url da publicacao'),
        imagem:   resolve('Media Url','media url','Image Url','image url','Thumbnail Url','thumbnail url','Media Urls','media urls'),
        autor:    resolve('Author','Full Name','author','full name','perfil','username','Publicador','publicador','Nome do perfil','nome do perfil','Nome do publicador','nome do publicador','Nickname','nickname','Handle','handle','Twitter Handle','twitter handle','Autor Nome','autor nome','Autor','autor','Nome do veículo','nome do veiculo','Veículo','veiculo'),
        conteudo: resolve('Full Text','full text','Content','content','conteudo','texto','Publicação','Publicacao','publicacao','Conteúdo','Mensagem','message','Snippet','snippet','Título','titulo'),
        sentimento: resolve('Sentiment','sentiment','Polaridade','polaridade','Sentimento','sentimento','Classificação','classificacao','Avaliação','avaliacao','Valoração','valoracao'),
        // seguidores: por rede — BrandWatch tem colunas específicas por canal
        seguidores_x:  resolve('X Followers','Twitter Followers','Author Followers Count','Author Followers'),
        seguidores_ig: resolve('Instagram Followers'),
        seguidores_yt: resolve('Youtube Subscriber Count'),
        seguidores_li: resolve('Linkedin Followers','Linkedin Connections'),
        seguidores_tk: resolve('Tiktok Followers'),
        seguidores_bs: resolve('Bluesky Followers'),
        seguidores_pa: resolve('Potential Audience','potential audience','Facebook Fans','seguidores','Seguidores','followers','Followers','Total_Seguidores','Seguidores/Inscritos','seguidores/inscritos'),
        curtidas:   resolve('Total_Curtidas','X Likes','Instagram Likes','Facebook Likes','Likes','likes','curtidas','Curtidas','Curtidas/Gostei','curtidas/gostei','Curtidas / Gostei','curtidas / gostei','Gostei','gostei'),
        comentarios:resolve('Total_Comentarios','X Replies','Instagram Comments','Facebook Comments','Comments','comments','comentarios','Comentários','Comentarios'),
        compartilhamentos: resolve('Total_Compartilhamentos','X Reposts','Facebook Shares','Shares','shares','compartilhamentos','Compartilhamentos','Retweets','retweets','Partilhas','partilhas'),
        reacoes:    resolve('Reactions','reactions','Reações','reacoes','Outras Reações','Total de Reações','total de reacoes','Outras Reacoes','Total de Reacoes','Outras Reações (Amor, Haha, Uau, Triste, Raiva)'),
        visualizacoes: resolve('Views','views','Visualizações','visualizacoes','Vizualizações','vizualizacoes'),
        totalInter: resolve(
          'Reactions, Comments & Shares', 'Reactions, Comments & Shares (Sum)',
          'Reactions, Comments and Shares', 'Total Interactions (Sum)',
          'Interações (absoluto)', 'Interações (Sum)', 'Interacoes (absoluto)',
          'Engagement Score', 'engagement score', 'Total Interactions',
          'Interações', 'interacoes', 'engagements', 'Total Interações',
          'total interacoes', 'Total de Interações', 'total de interacoes',
          'Interações Totais', 'interacoes totais', 'Total', 'total'
        ),
        alcance:    resolve('Reach','reach','Alcance','alcance'),
      };
      // ── Temas (classificação já feita no Reputaition): cada grupo de tema vira
      //    uma COLUNA própria (ex.: "ESPORTES", "NATUREZA, ECOTURISMO E AVENTURA")
      //    e o valor da célula, quando preenchida, é o subtema encontrado naquela
      //    publicação (ex.: "OUTROS ESPORTES"). Não existe uma única coluna "Tema"
      //    — é preciso achar, por exclusão, quais colunas do cabeçalho são essas
      //    (mesma lógica já usada no Reputaition/CENA pra cruzar a mini base). ──
      const FIXAS_NORM_EMB = new Set([
        'hora do post','data da mencao','link da mencao','id plataforma','link do perfil',
        'publicacao','publicador','nome do perfil','fonte','titulo','polaridade',
        'tipo publicador','abordagem','formato','marca','alcance','canal','uf',
        'tipo de midia','programa','curtidas','comentarios','visualizacoes','reacoes',
        'compartilhamentos','seguidores','total interacoes','valoracao',
        'mensagens-chave','mensagens chave','grupos de publicadores','porta-vozes',
        'porta vozes','justificativas','tier','vp','ms','escena','cena',
        'sentimento','classificacao','avaliacao','idioma','conteudo','texto',
        'content','message','snippet','url','link','date','author','full name',
        'engagement score','total interactions','reach',
        'reactions, comments & shares','reactions, comments & shares (sum)',
        'reactions, comments and shares','total interactions (sum)',
        'interacoes (absoluto)','interacoes (sum)','interacoes','interactions',
      ].map(_embNorm));
      const colsTemaEmb = hdr.filter(h => !FIXAS_NORM_EMB.has(_embNorm(h)) && !/^p\./i.test(h.trim()));
      return rows.map(r => {
        const gv = key => { if (!key) return null; const v = r[key]; if (v===undefined||v===null) return null; const s = String(v).trim(); return s===''?null:s; };
        const obj = {};
        obj.fonte  = tipo;
        obj.canal  = canonRede(gv(K.canal));
        obj.data   = parseDateCustom(gv(K.data), gv(K.hora));
        obj.link_publicacao = gv(K.link);

        const temasAchados = [];

          canalNormEmb === 'tiktok'                             ? K.seguidores_tk :

        obj.seguidores = (segColEmb ? toFloat(gv(segColEmb)) : null) ?? toFloat(gv(K.seguidores_pa));
        obj.curtidas   = toFloat(gv(K.curtidas));
        obj.comentarios= toFloat(gv(K.comentarios));
        obj.compartilhamentos = toFloat(gv(K.compartilhamentos));
        const reacoes      = toFloat(gv(K.reacoes));
        const visualizacoes= toFloat(gv(K.visualizacoes));
        const alcanceRaw   = toFloat(gv(K.alcance));
        // Coluna "Alcance"/"Reach" do Reputaition já vem tratada (20% do máximo
        // de seguidores por usuário, sem duplicata) — usa direto, sem recalcular
        // a partir de seguidores. Guarda separado p/ os cálculos de KPI usarem
        // esse valor quando disponível em vez de reaplicar a fórmula 20%×seguidores.
        obj.alcance = alcanceRaw;

          obj.interacoes = parts.length ? parts.reduce((a,b)=>a+b,0) : null;

  /* ── "Dia do relatório" com recorte às 6h (não meia-noite) ──
     Convenção do time ("recorte é 6h do dia anterior até 6h de hoje"): o
     relatório do dia D cobre das 6h de D-1 até as 6h de D. Então: post com
     hora >= 6h cai no relatório do DIA SEGUINTE (ainda está dentro da janela
     que só fecha às 6h de D+1); post com hora < 6h fica no relatório do
     PRÓPRIO dia de calendário (é a ponta da manhã antes do fechamento).
     Sem hora registrada, não desloca — mais seguro que assumir. ── */
  function _embDiaRelatorio(dataISO) {
    if (!dataISO) return null;
    const m = String(dataISO).match(/^(\d{4})-(\d{2})-(\d{2})(?:T(\d{1,2}):(\d{2}))?/);
    if (!m) return null;
    const [, y, mo, d, h, min] = m;
    const dt = new Date(Date.UTC(+y, +mo-1, +d));
    // Desloca para o dia seguinte se hora > 6h00 (06:01+).
    // Exatamente 06:00:00 ainda pertence ao recorte do dia corrente.
    if (h !== undefined) {
      const hNum = parseInt(h, 10);
      const mNum = min !== undefined ? parseInt(min, 10) : 0;
      if (hNum > 6 || (hNum === 6 && mNum > 0)) dt.setUTCDate(dt.getUTCDate() + 1);
    }
    return dt.toISOString().substring(0,10);
  }

  /* ── Cálculo de KPIs a partir das rows acumuladas ──

     _embDiaRelatorio), não o dia de calendário puro — uma base coletada das
     14h de um dia até as 2h da madrugada seguinte é UM ÚNICO recorte, mesmo
     cruzando a meia-noite. Sentimento, top canal, top 3 posts e a amostra
     que vai pro prompt da IA usam o PERÍODO INTEIRO acumulado (`rows`), não
     só o recorte mais recente — antes, posts de recortes anteriores eram
     completamente ignorados na análise/destaques, mesmo sendo relevantes. ── */
  /* ── Chave estável pra casar um post com uma imagem anexada manualmente —
       mesma fórmula usada no botão de anexar (renderEmbraturDiario) e aqui
       no cálculo, senão o anexo "solta" do post a cada recálculo de KPIs. ── */
  function _embChaveImagemPost(handle, texto, link) {
    return link || ((handle||'')+'|'+(texto||'').substring(0,40));
  }
  /* ── Normaliza um link de publicação pra usar como chave de agrupamento —
       remove barra final, query string (?utm_source=...) e força minúsculas,
       senão a mesma publicação importada mais de uma vez (ou com pequenas
       variações de URL entre uploads) vira dois "posts" diferentes no
       agrupamento, e cada um fica só com parte dos dados (curtidas numa
       entrada, interações/alcance na outra). ── */
  function _embNormLink(link) {
    if (!link) return '';
    return String(link).trim().toLowerCase().replace(/[?#].*$/, '').replace(/\/+$/, '');
  }
  function _embChavePost(nome, conteudo, link) {
    const linkNorm = _embNormLink(link);
    return linkNorm || ((nome||'')+'|'+(conteudo||'').substring(0,40));

  /* ── Alcance de uma publicação: usa a coluna "Alcance"/"Reach" do
       Reputaition quando presente — já vem tratada (20% do máximo de
       seguidores por usuário, sem duplicata). Só recai no cálculo manual
       (20% dos seguidores) quando a base não tem essa coluna (Brandwatch
       bruto). Evita reaplicar os 20% em cima de um valor que já é 20%. ── */
  function _embAlcanceBasis(r) {
    return (r.alcance != null && r.alcance > 0) ? r.alcance : (r.seguidores || 0) * 0.2;
  }

  /* ── Redes acompanhadas nos "Destaques de redes sociais" (card por rede) ── */
  const EMB_REDES_DESTAQUE = [
    { chave: 'facebook',  label: 'Facebook',  match: ['facebook','fb','facebook_page','facebook_public','facebook_group','facebook_user'] },
    { chave: 'x',         label: 'Twitter/X', match: ['x','twitter','tweet'] },
    { chave: 'instagram', label: 'Instagram', match: ['instagram','ig','instagram_public','instagram_business'] },
    { chave: 'youtube',   label: 'YouTube',   match: ['youtube','yt'] },
  ];
  /* ── A partir de uma lista de posts já agrupados (um item por publicação,
       com {canal, alcance, inter, nome/handle, conteudo, link, imagem}),
       monta, pra cada rede acompanhada, o post de maior alcance e o de
       maior interação — ou null quando a rede não teve posts no período. ── */
  function _embCalcRedesDestaque(postsArr, mkPost) {
    const out = {};
    EMB_REDES_DESTAQUE.forEach(rede => {
      const doRede = postsArr.filter(([,v]) => {
        const c = (v.canal||'').toLowerCase();
        return rede.match.includes(c) || c.includes(rede.chave);
      });
      if (!doRede.length) { out[rede.chave] = { label: rede.label, semPosts: true, maiorAlcance: null, maiorInteracao: null, poolAlcance: [], poolInteracao: [] }; return; }
      const poolAlcance   = doRede.slice().sort((a,b)=>(b[1].alcance||b[1].alc||0)-(a[1].alcance||a[1].alc||0))
        .map(p => mkPost(p, (p[1].alcance||p[1].alc||0) > 0 ? fmtNum(Math.round(p[1].alcance||p[1].alc||0)) : '—'));
      const poolInteracao = doRede.slice().sort((a,b)=>(b[1].inter||0)-(a[1].inter||0))
        .map(p => mkPost(p, (p[1].inter||0) > 0 ? fmtNum(p[1].inter) : '—'));
      out[rede.chave] = {
        label: rede.label, semPosts: false,
        maiorAlcance: poolAlcance[0], maiorInteracao: poolInteracao[0],
        poolAlcance, poolInteracao,
      };
    });
    return out;
  }
  /* ── Filtra os posts excluídos ("x" no card) de cada pool de rede social e
       promove o próximo do ranking pro lugar — mesmo mecanismo do Top 3
       (excludedTop3/_embExcluirTop3), aplicado por rede/métrica. ── */
  function _embAplicaExclRedes(redesDestaque, exclSet) {
    if (!redesDestaque || !exclSet || !exclSet.size) return redesDestaque;
    const out = {};
    Object.keys(redesDestaque).forEach(k => {
      const r = redesDestaque[k];
      if (!r || r.semPosts) { out[k] = r; return; }
      const escolhe = pool => (pool||[]).find(it => !exclSet.has(_embChaveImagemPost(it.handle, it.texto, it.link))) || null;
      out[k] = { ...r, maiorAlcance: escolhe(r.poolAlcance), maiorInteracao: escolhe(r.poolInteracao) };
    });
    return out;
  }
  /* ── Frequência real de temas, a partir da coluna já classificada no
       Reputaition ("Assunto Principal"/"Tema") — não é estimativa da IA. ── */
  function _embCalcTemasFreq(rows, limite) {
    limite = limite || 8;
    const cont = {};
    let comTema = 0;
    rows.forEach(r => {
      const bruto = (r.tema || '').trim();
      if (!bruto) return;
      // "SEM TEMA" é o rótulo do Reputaition pra publicação sem tema identificado —
      // não é um assunto de conversa, então não entra no gráfico/nuvem.
      const partes = bruto.split(/[;,]/).map(s => s.trim()).filter(s => s && _embNorm(s) !== 'sem tema');
      if (!partes.length) return;
      comTema++;
      partes.forEach(t => { cont[t] = (cont[t] || 0) + 1; });
    });
    const total = comTema || 1;
    return Object.entries(cont)
      .sort((a,b) => b[1]-a[1])
      .slice(0, limite)
      .map(([nome, count]) => ({ nome, count, pct: Math.round((count/total)*100) }));
  }
  function _embCalcKPIs(rows, imagensManuais) {
    imagensManuais = imagensManuais || {};
    if (!rows || !rows.length) return null;

    // Dia de relatório de cada linha.
    // PRIORIDADE: usa r._dataRel (calculado no momento do upload e persistido no D1)
    // quando disponível — é a fonte de verdade estável. Só recalcula via
    // _embDiaRelatorio quando _dataRel não existe (ex: post manual recém-adicionado
    // ainda não sincronizado com o D1).
    const diasPorLinha = rows.map(r => ({
      r,
      dia: r._dataRel || _embDiaRelatorio(r.data),
    }));
    const dias = diasPorLinha.map(x => x.dia).filter(Boolean).sort();

    // dataRef = dia mais recente com posts na base (ou dataFim se configurado).
    // Lógica anterior (maior volume) causava bug "dia anterior": se D-1 tinha muito
    // mais posts que hoje, D-1 vencia e o relatório ficava preso no dia errado.
    // PRIORIDADE: se dataFim está configurado no state, usa como âncora fixa.
    const diasUnicosOrdenados = [...new Set(dias)].sort();
    const volPorDia = {};
    dias.forEach(d => { volPorDia[d] = (volPorDia[d] || 0) + 1; });
    const _dataFimConfig = _embState[_embPaisSel]?.dataFim || '';
    // Sem config: sempre usa o dia mais recente com posts como dataRef.
    // Lógica anterior (maior volume) causava bug "UK dia anterior": se D-1 tinha 232
    // posts e hoje tem 10, D-1 vencia — mas o operador já subiu a base de hoje e quer
    // ver hoje como referência. O dia mais recente é sempre a intenção do usuário.
    const dataRef = _dataFimConfig && diasUnicosOrdenados.includes(_dataFimConfig)
      ? _dataFimConfig
      : (diasUnicosOrdenados[diasUnicosOrdenados.length - 1] || '');

    // D-1 = dia imediatamente anterior ao dataRef com posts (ignora outliers futuros)
    const diasAntesDeRef = diasUnicosOrdenados.filter(d => d < dataRef);
    const dataD1 = diasAntesDeRef.length ? diasAntesDeRef[diasAntesDeRef.length - 1] : null;

    // Menções do recorte (dia de relatório == dia de referência)
    const rowsHoje = diasPorLinha.filter(x => x.dia === dataRef).map(x => x.r);
    const rowsD1   = dataD1 ? diasPorLinha.filter(x => x.dia === dataD1).map(x => x.r) : [];

    const mencoes    = rowsHoje.length;
    const mencoesD1  = rowsD1.length;
    const varMencoes = mencoesD1 > 0 ? Math.round(((mencoes - mencoesD1) / mencoesD1) * 100) : null;

    // Interações e alcance do recorte
    const interacoes = rowsHoje.reduce((s,r) => s + (r.interacoes||0), 0);
    const interD1    = rowsD1.reduce((s,r) => s + (r.interacoes||0), 0);
    const varInter   = interD1 > 0 ? Math.round(((interacoes - interD1) / interD1) * 100) : null;

    // Alcance = maior valor de alcance tratado por publicador (Reputaition),
    // ou 20% dos seguidores únicos como fallback (sem duplicatas)
    const segsUnicosPub = {};
    rowsHoje.forEach(r => {
      const pub = r.nome_publicador || ('__anonimo__' + (r.canal||'') + (r.link_publicacao||''));
      const val = _embAlcanceBasis(r);
      if (val > (segsUnicosPub[pub] || 0)) segsUnicosPub[pub] = val;
    });
    const alcance    = Math.round(Object.values(segsUnicosPub).reduce((s,v) => s+v, 0));
    const engMedio   = mencoes > 0 ? Math.round(interacoes / mencoes) : 0;

    // Alcance e engajamento médio do D-1 (mesma lógica, p/ comparativo %)
    const segsUnicosPubD1 = {};
    rowsD1.forEach(r => {
      const pub = r.nome_publicador || ('__anonimo__' + (r.canal||'') + (r.link_publicacao||''));
      const val = _embAlcanceBasis(r);
      if (val > (segsUnicosPubD1[pub] || 0)) segsUnicosPubD1[pub] = val;
    });
    const alcanceD1   = Math.round(Object.values(segsUnicosPubD1).reduce((s,v) => s+v, 0));
    const varAlcance  = alcanceD1 > 0 ? Math.round(((alcance - alcanceD1) / alcanceD1) * 100) : null;
    const engMedioD1  = mencoesD1 > 0 ? Math.round(interD1 / mencoesD1) : 0;
    const varEngMedio = engMedioD1 > 0 ? Math.round(((engMedio - engMedioD1) / engMedioD1) * 100) : null;

    // ── Sentimento e top canal: só do dia de referência (rowsHoje) ──
    // Usar `rows` (90 dias) misturava posts antigos com sentimento classificado,
    // distorcendo o donut do dia atual (bug "China sem sentimento / percentual errado").
    const rowsPeriodo = rowsHoje;

    // Sentimento do dia de referência — 4 categorias separadas
    const comSent    = rowsPeriodo.filter(r => r.sentimento);
    const posCount   = comSent.filter(r => r.sentimento === 'positivo').length;
    const favCount   = comSent.filter(r => r.sentimento === 'favoravel').length;
    const negCount   = comSent.filter(r => r.sentimento === 'negativo').length;
    const desfavCount= comSent.filter(r => r.sentimento === 'desfavoravel').length;
    const tot        = comSent.length || 1;
    const semSent    = rowsPeriodo.length - comSent.length;
    // Percentuais calculados apenas sobre posts classificados (tot = comSent.length).
    // O último valor é calculado como resto para garantir soma exata de 100%.
    const sentPos    = Math.round((posCount    / tot) * 100);
    const sentFav    = Math.round((favCount    / tot) * 100);
    const sentNeg    = Math.round((negCount    / tot) * 100);
    const sentDesfav = 100 - sentPos - sentFav - sentNeg;

    // Top canal (dia de referência)
    const canalCount = {};
    rowsPeriodo.forEach(r => { const c = r.canal||'desconhecido'; canalCount[c] = (canalCount[c]||0)+1; });
    const topCanalArr = Object.entries(canalCount).sort((a,b)=>b[1]-a[1]);
    const topCanal    = topCanalArr.length ? topCanalArr[0][0] : '—';
    const topCanalPct = topCanalArr.length ? Math.round((topCanalArr[0][1] / rowsPeriodo.length) * 100) : 0;

    // Volume 7 dias — agrupa pelo DIA DE RELATÓRIO (corte 6h), não calendário cru
    const volByDate = {};
    diasPorLinha.forEach(({dia}) => {
      if (!dia) return;
      volByDate[dia] = (volByDate[dia]||0) + 1;
    });
    const datasUnicas = Object.keys(volByDate).sort();
    const ultimas7 = datasUnicas.slice(-7);
    const vol7 = Array(7).fill(0).map((_, i) => {
      const d = ultimas7[i - (7 - ultimas7.length)];
      return d ? (volByDate[d]||0) : 0;
    });

    // Top 3 alcance e interação — só do dia de referência (rowsHoje).
    // Antes usava rowsPeriodo (período acumulado), o que fazia posts de dias
    // anteriores aparecerem no Top 3 do relatório corrente (bug "post do dia 22").
    // Agrupa por POST (link, ou handle+texto quando não há link), não por
    // publicador — antes agrupava por nome_publicador, o que misturava vários
    // posts do mesmo perfil em um único card quando o publicador postava mais
    // de uma vez no período (bug "natgeo 269M": o alcance vinha do máximo entre
    // TODOS os posts do perfil no período, enquanto resumo/link vinham de outro
    // post distinto — nenhum número real correspondia ao post exibido).
    const byPublicador = {};
    rowsHoje.forEach(r => {
      const nome  = r.nome_publicador || '—';
      const chave = _embChavePost(nome, r.conteudo, r.link_publicacao);
      if (!byPublicador[chave]) byPublicador[chave] = {
        nome, inter: 0, alcance: _embAlcanceBasis(r), canal: r.canal||'',
        conteudo: r.conteudo||'', link: r.link_publicacao||'', imagem: r.imagem||'',
      };
      byPublicador[chave].inter   += (r.interacoes||0);
      byPublicador[chave].alcance  = Math.max(byPublicador[chave].alcance, _embAlcanceBasis(r));
      if (!byPublicador[chave].conteudo && r.conteudo) byPublicador[chave].conteudo = r.conteudo;
      if (!byPublicador[chave].link && r.link_publicacao) byPublicador[chave].link = r.link_publicacao;
      if (!byPublicador[chave].imagem && r.imagem) byPublicador[chave].imagem = r.imagem;
    });
    const pubArr = Object.entries(byPublicador);
    const mkPost = ([,v], val) => {
      const handle = '@'+v.nome;
      const texto  = v.conteudo.substring(0,80);
      const link   = v.link || '';
      const chave  = _embChaveImagemPost(handle, texto, link);
      return {
        handle, texto, val, link,
        imagem: imagensManuais[chave] || v.imagem || '',
      };
    };
    const topPoolAlcance   = pubArr.slice().sort((a,b)=>b[1].alcance-a[1].alcance).slice(0,10)
      .map(p => mkPost(p, p[1].alcance > 0 ? fmtNum(Math.round(p[1].alcance)) : '—'));
    const topPoolInteracao = pubArr.slice().sort((a,b)=>b[1].inter-a[1].inter).slice(0,10)
      .map(p => mkPost(p, p[1].inter > 0 ? fmtNum(p[1].inter) : '—'));
    const top3alcance   = topPoolAlcance.slice(0,3);
    const top3interacao = topPoolInteracao.slice(0,3);

    // Destaques por rede social (Facebook/Twitter-X/Instagram/YouTube) — maior
    // alcance e maior interação de CADA rede, só do dia de referência.
    const redesDestaque = _embCalcRedesDestaque(pubArr, mkPost);
    // Frequência real de temas (coluna já classificada no Reputaition), só do dia de referência.
    const temasFreq = _embCalcTemasFreq(rowsHoje);

    // Amostra de conteúdo para o prompt da IA (top 20 por interação, só do dia de referência)
    const amostra = rowsHoje
      .slice()
      .sort((a,b) => (b.interacoes||0)-(a.interacoes||0))
      .slice(0,20)
      .map(r => ({ canal: r.canal, pub: _embHandlePub(r.link_publicacao, r.nome_publicador), texto: (r.conteudo||'').substring(0,200), inter: r.interacoes||0, data: r.data||'', link: r.link_publicacao||'', tema: r.tema||'' }));

    return {
      data: dataRef,
      periodoInicio: datasUnicas[0] || dataRef,
      periodoFim: dataRef,
      mencoes, varMencoes,
      interacoes, varInter,
      alcance: fmtNum(alcance),
      _alcanceCalc: alcance,
      varAlcance,
      engMedio, varEngMedio, sentPos, sentFav, sentNeg, sentDesfav, semSent,
      topCanal, topCanalPct,
      vol7, top3alcance, top3interacao, topPoolAlcance, topPoolInteracao,
      redesDestaque, temasFreq,
      amostra
    };
  }

  /* ── Wrapper: calcula KPIs, aplica alcanceAdj e filtra Top 3 excluídos ── */
  function _embCalcEAplicaKPIs(rows, imagensManuais, pais) {
    pais = pais || _embPaisSel;
    const kpis = _embCalcKPIs(rows, imagensManuais);
    const adj = _embState[pais]?.alcanceAdj;
    if (adj !== null && adj !== undefined) {
      kpis.alcance = fmtNum(adj);
    }
    // Filtra posts excluídos do Top 3 e promove o próximo da pool
    const excl = new Set(_embState[pais]?.excludedTop3 || []);
    if (excl.size > 0) {
      kpis.top3alcance   = (kpis.topPoolAlcance||[]).filter(it => !excl.has(_embChaveImagemPost(it.handle, it.texto, it.link))).slice(0,3);
      kpis.top3interacao = (kpis.topPoolInteracao||[]).filter(it => !excl.has(_embChaveImagemPost(it.handle, it.texto, it.link))).slice(0,3);
    }
    // Idem para os Destaques por rede social (Facebook/Twitter-X/Instagram/YouTube)
    const exclRedes = new Set(_embState[pais]?.excludedRedes || []);
    if (exclRedes.size > 0) {
      kpis.redesDestaque = _embAplicaExclRedes(kpis.redesDestaque, exclRedes);
    }
    return kpis;
  }

  function _embExcluirTop3(chave) {
    if (!_embState[_embPaisSel]) return;
    const ex = _embState[_embPaisSel].excludedTop3 || [];
    if (!ex.includes(chave)) ex.push(chave);
    _embState[_embPaisSel].excludedTop3 = ex;
    const st = _embState[_embPaisSel];
    st.kpis = _embCalcEAplicaKPIs(st.rows, st.imagensManuais);
    renderEmbraturDiario();
  }

  function _embRestaurarTop3() {
    if (!_embState[_embPaisSel]) return;
    _embState[_embPaisSel].excludedTop3 = [];
    const st = _embState[_embPaisSel];
    st.kpis = _embCalcEAplicaKPIs(st.rows, st.imagensManuais);
    renderEmbraturDiario();
  }

  /* ── Exclui um post do card "Destaques por rede social" e promove o
       próximo do ranking daquela rede — mesmo mecanismo do Top 3, mas
       funciona tanto no diário (kpis em cache no _embState) quanto no
       semanal (recalculado a cada render, sem cache). ── */
  function _embExcluirRede(chave, ctx) {
    if (ctx === 'semanal') {
      const st = _embStateSem[_embSemanalPais];
      if (!st) return;
      const ex = st.excludedRedes || [];
      if (!ex.includes(chave)) ex.push(chave);
      st.excludedRedes = ex;
      renderEmbraturSemanal();
      return;
    }
    const st = _embState[_embPaisSel];
    if (!st) return;
    const ex = st.excludedRedes || [];
    if (!ex.includes(chave)) ex.push(chave);
    st.excludedRedes = ex;
    st.kpis = _embCalcEAplicaKPIs(st.rows, st.imagensManuais);
    renderEmbraturDiario();
  }

  /* ── Formata variação com sinal ── */
  function _embFmtVar(v) {
    if (v === null || v === undefined) return '';
    return (v >= 0 ? '+' : '') + v + '%';
  }

  /* ── Gera prompt real com dados calculados ──
     Estrutura: prompt-mãe (contexto compartilhado) + 6 blocos de instrução
     específicos por campo, porque os campos têm dependências entre si
     (ex.: Tendências não deve repetir o que já foi dito em Análise do dia)
     e isso só funciona se a IA tiver o contexto completo do papel da
     Embratur e a diferença de função entre cada campo. ── */
  function _embGerarPrompt(paisCod, kpis, textoExtra) {
    const p = EMBRATUR_PAISES[paisCod];
    const linhas = (kpis.amostra||[]).map((a,i) =>
      `[${i+1}] ${a.data ? a.data.substring(0,10)+' | ' : ''}${a.canal||'?'} | @${a.pub||'?'} | ${a.inter} interações${a.tema ? ' | tema: '+a.tema : ''}${a.link ? ' | link: '+a.link : ''} | "${a.texto}"`
    ).join('\n');
    const vol7linha = (kpis.vol7||[]).join(', ');
    const temasLinha = (kpis.temasFreq && kpis.temasFreq.length)
      ? `Temas monitorados no dia (classificação já feita no Reputaition, % sobre publicações com tema identificado): ${kpis.temasFreq.map(t => `${t.nome} (${t.pct}%)`).join(', ')}`
      : 'Temas monitorados no dia: nenhuma publicação do dia tinha tema classificado na base.';

    return `Você atua como um analista de inteligência de mercado e consultor estratégico especializado em turismo internacional e social listening, prestando suporte para a Embratur (Agência Brasileira de Promoção Internacional do Turismo).\n\nREGRA DE IDIOMA: escreva TODOS os textos da resposta em português do Brasil, independentemente do idioma das publicações analisadas ou do país de origem (ex.: mesmo analisando publicações em espanhol, francês ou inglês sobre ${p.nome}, a análise deve sair inteira em português). Apenas os @handles e URLs citados permanecem no idioma/formato original.\n\nO público leitor deste relatório é formado por gestores e corpo técnico da Embratur. Eles utilizam esta análise para embasar campanhas de marketing internacional, parcerias, priorização de mercados e ações de prevenção e resposta a narrativas que impactem o turismo. Seu tom deve ser altamente profissional, diplomático, construtivo e sugestivo.\n\nDIRETRIZES DE TOM E RIGOR ANALÍTICO (Siga atentamente):\n\nSeja objetivo e preciso: baseie suas análises estritamente nos dados apresentados. Se o volume for baixo ou o dado for inconclusivo, reporte isso com transparência e naturalidade, sem forçar interpretações.\n\nUse linguagem simples e acessível: Escreva de forma clara e direta. Não use palavras rebuscadas, termos acadêmicos ou expressões como "lacuna", "vácuo", "mitigar" ou "capitalizar". Prefira frases curtas e termos do dia a dia da gestão (como "espaço", "melhorar", "aproveitar"). O objetivo é que qualquer pessoa entenda o texto na primeira leitura.\n\nEvite superlativos sem respaldo (ex: "crescimento expressivo", "sucesso notável"). Prefira descrever o cenário com neutralidade, usando os números como base.\n\nAdote uma postura consultiva: ao apontar lacunas ou riscos, faça-o de maneira propositiva, indicando como a Embratur pode atuar diante do cenário, em vez de focar em "falhas" ou "perdas".\n\nCite sempre pelo @handle: ao referenciar qualquer publicador ou conta da lista de publicações, use obrigatoriamente o @handle exato (ex: @sportricolore, @AnabellaMarvy). Nunca substitua o handle pelo nome real da pessoa. Se houver link disponível na lista (campo "link:" na publicação), adicione-o logo após no formato @handle (https://url-do-post). URL pura, sem colchetes nem markdown. EXEMPLOS — CORRETO: @pinknews (https://www.instagram.com/p/abc123/). ERRADO: @pinknews ([https://www.instagram.com/p/abc123/]). ERRADO: @pinknews ([link](https://url)). CRÍTICO: utilize SOMENTE links que aparecem explicitamente no campo "link:" da lista TOP 20. NUNCA construa, adivinhe ou invente uma URL — se a publicação não tiver "link:" na lista, cite só o @handle sem URL.\n\nVocê receberá os dados de monitoramento do dia de referência: ${kpis.periodoFim}. Os KPIs e as publicações listadas abaixo são exclusivamente desse dia — não de um acumulado histórico. O volume dos últimos 7 dias é fornecido apenas como contexto de tendência e deve ser usado somente no campo Tendências (campo 6).\n\nSua análise deve responder, de forma fluida no texto, à seguinte questão central: "Como essa percepção sobre o Brasil, a partir de ${p.nome}, influencia o potencial do país como destino turístico neste mercado?"\n\nDADOS DISPONÍVEIS:\n\nMenções: ${kpis.mencoes} (${_embFmtVar(kpis.varMencoes)} vs D-1)\nInterações: ${fmtNum(kpis.interacoes)} (${_embFmtVar(kpis.varInter)} vs D-1)\nClassificação de sentimento:\nPositivo: ${kpis.sentPos}% | Negativo: ${kpis.sentNeg}% | Favorável: ${kpis.sentFav}% | Desfavorável: ${kpis.sentDesfav}%\n(Nota: "Favorável" e "Desfavorável" são rótulos distintos de "Positivo" e "Negativo" — ambos os pares devem ser mencionados na análise quando seus percentuais forem relevantes)\nTop canal: ${kpis.topCanal} (${kpis.topCanalPct}% das menções)\nVolume dos últimos 7 dias (mais antigo → mais recente): ${vol7linha}\n(Use estes números apenas no campo Tendências — não nos demais campos.)\n\nTOP 20 PUBLICAÇÕES do dia ${kpis.periodoFim} (por interação) — quando presente, o campo "tema:" de cada publicação já vem da classificação do Reputaition, use-o como reforço da lista "Temas monitorados no dia" acima:\n${linhas}\n\n${textoExtra ? 'CONTEXTO ADICIONAL:\\n' + textoExtra + '\\n\\n' : ''}Com base em todo o contexto acima, escreva os 6 campos abaixo. Cada campo tem uma FUNÇÃO DIFERENTE — não repita entre campos a mesma informação com palavras diferentes.\n\n1. DESTAQUE DO DIA\nFunção: Destacar o fato, publicação ou narrativa de maior relevância no período para a imagem turística do Brasil em ${p.nome}.\nCritérios: (1) Conteúdos que associem o Brasil a segmentos turísticos específicos (praia, ecoturismo, cultura, etc.); (2) Fontes influentes (mídia especializada, criadores de conteúdo, autoridades); (3) Tração orgânica relevante.\nFormato OBRIGATÓRIO: cite diretamente a publicação mais relevante da lista usando o @handle exato. Estrutura: "O post de @handle (https://link-do-post) gerou [o que aconteceu e como dialoga com o turismo do Brasil]." A URL vem logo após o @handle, entre parênteses, sem colchetes. Não use o nome real da pessoa — use sempre o @handle.\n\n2. ATENÇÃO\nFunção: Mapear narrativas, eventos ou padrões que demandem acompanhamento cauteloso por seu potencial impacto na imagem turística do Brasil em ${p.nome}.\nCritérios: Menções a temas sensíveis (segurança, questões climáticas, saúde pública), crises localizadas em destinos específicos ou desinformação com potencial de alcance.\nFormato: 1 a 2 frases citando o tema e seu potencial de tração (baixo/médio/alto). Se a narrativa vier de uma conta específica da lista, cite-a com @handle (https://link). Caso o cenário esteja tranquilo, registre que "O monitoramento não identificou narrativas sensíveis com impacto na imagem turística no período".\n\n3. ANÁLISE DO DIA\nFunção: Analisar o cenário do dia de referência (${kpis.periodoFim}), conectando os números do dia (volume, sentimento, alcance) com a narrativa de fundo sobre o Brasil como destino turístico em ${p.nome} — é a seção mais interpretativa do relatório. IMPORTANTE: foque exclusivamente no que aconteceu hoje, sem generalizar para o período histórico acumulado — a análise de tendência está reservada para o campo 6.\nFormato: até 2 parágrafos. Integre ao texto pelo menos 2 citações de publicações da lista no formato @handle (https://link), de forma fluida — não como lista. Parágrafo 1 — o que dominou a conversa no dia (tipo de conteúdo, fonte, tom geral), conectando aos números de sentimento e volume do dia. Parágrafo 2 — o que esse padrão revela sobre a percepção do Brasil como destino: reforça narrativas existentes? Traz algo novo? É anomalia?\nEvite linguagem de relatório genérico — escreva como análise estratégica, sempre amarrando o dado ao impacto turístico.\n\n4. DESAFIOS\nFunção: Identificar espaços na narrativa atual onde a atuação da Embratur pode ser inserida ou fortalecida para melhorar resultados futuros.\nCritérios: Observe se há conversas positivas sobre o Brasil lideradas exclusivamente por terceiros (indicando espaço para aproximação e endosso institucional), se há concentração em um único destino (oportunidade para diversificação) ou se temas estratégicos promovidos pela agência estão ausentes das menções orgânicas.\nFormato: 1 a 2 frases, no padrão "[Aspecto ou lacuna observada na narrativa] + [Como isso representa um espaço para atuação e desenvolvimento de estratégias pela Embratur]". Caso não haja um desafio claro nos dados do dia, indique isso de forma sutil.\n\n5. OPORTUNIDADES\nFunção: Recomendar caminhos de ação pragmáticos e construtivos que a Embratur pode avaliar para aproveitar o cenário observado.\nCritérios: As sugestões devem ser executáveis e inspiradas nos dados do dia (ex: avaliar aproximação com um perfil que gerou engajamento positivo; sugerir pautas específicas para PR com base no interesse demonstrado).\nFormato: 1 a 2 frases, no padrão "[Sugestão de ação] + [Racional que a torna oportuna com base no monitoramento de hoje]". Se o volume de dados for muito incipiente para gerar uma recomendação sólida, recomende apenas a manutenção do monitoramento.\n\n6. TENDÊNCIAS\nFunção: Avaliar a direção em que a percepção do Brasil está caminhando neste mercado a médio prazo, utilizando o histórico recente.\nCritérios: Analise os dados dos últimos 7 dias. Mudanças reais exigem consistência (vários dias na mesma direção de tema, perfil ou sentimento).\nFormato: 1 parágrafo objetivo. Caso haja uma tendência consistente, aponte-a e indique como ela pode orientar o planejamento da agência. Caso o histórico mostre apenas oscilações pontuais ou baixo volume, esclareça que o cenário ainda está em formação e indique quais indicadores continuarão sendo monitorados nos próximos dias para confirmar possíveis padrões.\n\n7. ANÁLISE DE TEMAS\nFunção: Analisar os temas monitorados que mais apareceram no dia, usando OBRIGATORIAMENTE a lista real fornecida acima em "Temas monitorados no dia", e conectar isso ao que representa para a imagem turística do Brasil em ${p.nome} — não é só descrever números, é interpretar o que esse padrão de temas revela sobre a conversa do mercado.\nCritérios: Se a linha "Temas monitorados no dia" acima listar 1 ou mais temas com percentual (formato "NOME (X%)"), você DEVE citar pelo nome exato e o percentual de pelo menos os 2-3 temas mais frequentes dessa lista — é PROIBIDO escrever que não há temas classificados quando a lista contém itens. A frase "a base do dia não trouxe publicações classificadas por tema" SÓ pode ser usada se a linha acima disser explicitamente que nenhuma publicação tinha tema classificado. Não invente temas que não estejam na lista.\nCITAÇÃO OBRIGATÓRIA: para pelo menos 2 dos temas mais frequentes citados, encontre na lista TOP 20 uma publicação cujo campo "tema:" bata com aquele tema e cite-a no formato @handle (https://link-do-post), da mesma forma que nos outros campos — isso ancora a análise num exemplo real, não só no percentual abstrato. Se nenhuma publicação da lista tiver aquele tema específico marcado, não invente uma citação; siga sem ela para esse tema.\nFormato: 1 parágrafo (3-5 frases), linguagem simples, conectando pelo menos 2 citações de publicações reais aos temas mencionados, sem repetir números já ditos em outros campos.\n\nResponda APENAS o JSON abaixo, em português do Brasil (não copie o idioma das publicações analisadas), sem markdown, sem texto fora das chaves. Quando citar uma publicação específica, use o formato @perfil (https://link-do-post) — URL pura, sem colchetes, sem markdown, só o endereço direto. CORRETO: @sportricolore (https://twitter.com/sportricolore/statuses/123). ERRADO: @sportricolore ([https://twitter.com/...]). ERRADO: @sportricolore ([link](https://url)). Se a publicação não tiver link na lista TOP 20, cite apenas o @perfil sem URL — NUNCA invente ou construa uma URL. Use somente links presentes explicitamente no campo "link:" da lista acima. Cite fontes/perfis reais das publicações acima sempre que possível:\n{\n  "destaque": "...",\n  "atencao": "...",\n  "analise": "...",\n  "desafios": "...",\n  "oportunidades": "...",\n  "tendencias": "...",\n  "analise_temas": "..."\n}`;

  }

  /* ── Anexar print manualmente num post do Top 3 ──
     A base do Reputaition/manual não tem coluna de imagem (não tem como
     "pegar" uma imagem que não existe na fonte) — então cada post do Top 3
     Alcance/Interação ganha um botão pra colar/anexar um print à mão. A
     imagem é redimensionada no navegador (máx. 480px de largura, JPEG ~70%)
     antes de guardar em base64 no localStorage, pra não pesar igual a base
     bruta de texto pesava (ver _embCompactarRow). Fica amarrada ao post por
     uma chave estável (link, ou handle+texto se não tiver link) — assim
     sobrevive a recálculos de KPI e a reaberturas da página. ── */
  function _embEscAttr(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function _embResizeImagem(file, maxW, cb) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const w = Math.max(1, Math.round(img.width * scale));
        const h = Math.max(1, Math.round(img.height * scale));
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        cb(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.onerror = () => cb(null);
      img.src = e.target.result;
    };
    reader.onerror = () => cb(null);
    reader.readAsDataURL(file);
  }
  function _embAnexarImagemManual(chave, inputEl) {
    const file = inputEl.files && inputEl.files[0];

    if (!file.type.startsWith('image/')) { showToast('⚠️ Selecione um arquivo de imagem.'); inputEl.value=''; return; }

      if (!dataUrl) { showToast('❌ Não consegui ler essa imagem.'); return; }

      if (!_embState[_embPaisSel].imagensManuais) _embState[_embPaisSel].imagensManuais = {};
      _embState[_embPaisSel].imagensManuais[chave] = dataUrl;

      // Persiste a imagem direto na row correspondente no D1 (não no config)
      // A chave é o link da publicação — busca a row pelo link
      const rows = _embState[_embPaisSel]?.rows || [];

        (_embChaveImagemPost('@' + (r.nome_publicador||''), (r.conteudo||'').substring(0,80), r.link_publicacao||'') === chave));

      if (_embState[_embPaisSel].rows) {

  /* ── Anexo/remoção de print unificado pros cards de Destaques por rede —

       do D1 via /api/ekklesia/embratur-base com o país explícito no payload,

  function _embAcharRowPorChave(rows, chave) {
    return (rows || []).findIndex(r =>

    if (!id || !dataRel) return;

      method: 'POST',
      headers: { 'Content-Type': 'application/json' },

  }
  function _embAnexarImagemRede(chave, inputEl, ctx) {
    if (ctx !== 'semanal') { _embAnexarImagemManual(chave, inputEl); return; }
    const file = inputEl.files && inputEl.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) { showToast('⚠️ Selecione um arquivo de imagem.'); inputEl.value=''; return; }
    _embResizeImagem(file, 480, dataUrl => {

      const rows = _embStateSem[_embSemanalPais]?.rows || [];

      const rows = _embState[_embPaisSel]?.rows || [];

  /* ── Busca automática de imagens via og:image ──

  async function _embBuscarImagensAutomaticas() {
    const kpis = _embState[_embPaisSel]?.kpis;
    if (!kpis) { showToast('⚠️ Suba a base do dia primeiro.'); return; }

    // Candidatos: os posts dos Destaques por rede social (4 redes × alcance/
    // interação) — o Top 3 único saiu do relatório, então a busca automática
    // passa a mirar exatamente os cards que o cliente vê.

    const candidatos = Object.values(rd)
      .filter(r => r && !r.semPosts)

      vistos.add(chave);

    if (!unicos.length) { showToast('✅ Todos os posts dos Destaques por rede já têm imagem (ou não têm link pra buscar).'); return; }

    const btn    = document.getElementById('embBuscarImgBtn');

    if (btn) btn.disabled = true;

    let achadas = 0, falhas = 0;
    for (let i = 0; i < unicos.length; i++) {
      const it = unicos[i];
      if (status) status.textContent = `Buscando ${i+1}/${unicos.length}…`;
      try {
        const res  = await fetch('/api/ekklesia/embratur-preview?url=' + encodeURIComponent(it.link));
        const data = await res.json();
        if (data.ok && data.imagem) {
          const chave = _embChaveImagemPost(it.handle, it.texto, it.link);
          if (!_embState[_embPaisSel].imagensManuais) _embState[_embPaisSel].imagensManuais = {};
          _embState[_embPaisSel].imagensManuais[chave] = data.imagem;
          // Persiste a imagem na row correspondente do D1
          const rows = _embState[_embPaisSel]?.rows || [];
          const rowIdx = rows.findIndex(r =>
            (r.link_publicacao && r.link_publicacao === it.link) ||
            (_embChaveImagemPost('@' + (r.nome_publicador||''), (r.conteudo||'').substring(0,80), r.link_publicacao||'') === chave)
          );
          if (rowIdx >= 0) {

    _embSaveConfig();
    renderEmbraturDiario();

  let _embSemanalToken = localStorage.getItem('embratur_semanal_token') || null;

  function _embSemSet(key, val) {

  function _embSemBuildJSON() {
    const pub = i => {
      const obj = {
        plataforma: _embSemV(`p${i}_plat`), perfil: _embSemV(`p${i}_perfil`),
        resumo: _embSemV(`p${i}_resumo`), alcance: _embSemV(`p${i}_alcance`),

        link: _embSemV(`p${i}_link`),
      };

    };
    return {
      pais: _embSemanalPais, periodo: _embSemV('periodo'),
      resumo_executivo: _embSemV('resumo'),
      numeros: {
        mencoes: _embSemV('n_men'), mencoes_delta: _embSemV('n_men_d'), mencoes_delta_positivo: _embSemV('n_men_up', true),
        interacoes: _embSemV('n_int'), interacoes_delta: _embSemV('n_int_d'), interacoes_delta_positivo: _embSemV('n_int_up', true),
        alcance: _embSemV('n_alc'), alcance_delta: _embSemV('n_alc_d'), alcance_delta_positivo: _embSemV('n_alc_up', true),
        engaj_medio: _embSemV('n_eng'), engaj_delta: _embSemV('n_eng_d'), engaj_delta_positivo: _embSemV('n_eng_up', true),
        sentimento_positivo: +_embSemV('n_sp', 0), sentimento_favoravel: +_embSemV('n_sf', 0), sentimento_desfavoravel: +_embSemV('n_sdf', 0), sentimento_negativo: +_embSemV('n_sg', 0),
        sentimento_delta_pp: _embSemV('n_sdp'),
      },
      repercussao: { repercutiu_bem: _embSemV('rep_bem'), ponto_de_atencao: _embSemV('rep_atc') },
      temas: [0,1,2].map(i => ({ nome: _embSemV(`t${i}_n`), volume_pct: +_embSemV(`t${i}_p`, 0), sentimento: _embSemV(`t${i}_s`, 'positivo') })),
      temas_analise: _embSemV('temas_analise'),
      top_publicacoes: [{ papel:'alcance', ...pub(0) }, { papel:'engajamento', ...pub(1) }, { papel:'atencao', ...pub(2) }],
      ganchos:  { status: _embSemV('g_st','agir'),     titulo: _embSemV('g_tit'), paragrafo_1: _embSemV('g_p1'), paragrafo_2: _embSemV('g_p2'), angulo_sugerido: _embSemV('g_ang') },
      sensiveis:{ status: _embSemV('s_st','planejar'), texto:  _embSemV('s_txt'), orientacao_editorial: _embSemV('s_ori') },
      observar: { status: _embSemV('o_st','monitorar'),texto:  _embSemV('o_txt') },
      ressalvas: _embSemV('ressalvas'),
      canais: (_embSemCalcKPIsSemana(_embSemanalPais)?.canais || []).slice(0, 8).map(([c]) => c),
      redesDestaque: _embSemCalcKPIsSemana(_embSemanalPais)?.redesDestaque || null,

    };

  function _embSemImport() {
    const raw = (document.getElementById('semImportArea')?.value || '').trim();
    if (!raw) { showToast('Cole o JSON primeiro.'); return; }
    let d;
    try { d = JSON.parse(raw); } catch(e) { showToast('❌ JSON inválido: ' + e.message); return; }
    const s = (k, v) => _embSemSet(k, (v !== undefined && v !== null) ? v : '');
    s('periodo', d.periodo); s('resumo', d.resumo_executivo);
    const n = d.numeros || {};
    s('n_men', n.mencoes);   s('n_men_d', n.mencoes_delta);   s('n_men_up', n.mencoes_delta_positivo !== false);
    s('n_int', n.interacoes);s('n_int_d', n.interacoes_delta);s('n_int_up', n.interacoes_delta_positivo !== false);
    s('n_alc', n.alcance);   s('n_alc_d', n.alcance_delta);   s('n_alc_up', n.alcance_delta_positivo !== false);
    s('n_eng', n.engaj_medio);s('n_eng_d', n.engaj_delta);    s('n_eng_up', n.engaj_delta_positivo !== false);
    s('n_sp', n.sentimento_positivo || 0); s('n_sf', n.sentimento_favoravel || 0); s('n_sdf', n.sentimento_desfavoravel || 0); s('n_sg', n.sentimento_negativo || 0); s('n_sdp', n.sentimento_delta_pp);
    const r = d.repercussao || {};
    s('rep_bem', r.repercutiu_bem); s('rep_atc', r.ponto_de_atencao);
    (d.temas || []).slice(0,3).forEach((t,i) => { s(`t${i}_n`,t.nome); s(`t${i}_p`,t.volume_pct); s(`t${i}_s`,t.sentimento); });
    s('temas_analise', d.temas_analise);
    // top_publicacoes NÃO vem mais da IA — o Top 3 (alcance/engajamento/atenção)
    // já foi preenchido pelo cálculo automático do HUB (semKpis.top3) e a IA
    // reescrevia por cima com posts errados, então o campo foi removido do
    // schema do prompt e não é mais aplicado aqui.
    const g = d.ganchos || {};
    s('g_st',g.status||'agir'); s('g_tit',g.titulo); s('g_p1',g.paragrafo_1); s('g_p2',g.paragrafo_2); s('g_ang',g.angulo_sugerido);
    const sv = d.sensiveis || {};
    s('s_st',sv.status||'planejar'); s('s_txt',sv.texto); s('s_ori',sv.orientacao_editorial);
    const o = d.observar || {};
    s('o_st',o.status||'monitorar'); s('o_txt',o.texto);
    s('ressalvas', d.ressalvas);
    renderEmbraturSemanal();
    showToast('✅ Campos preenchidos!');
  }

  /* ── Limpa os campos auto-populados a partir da base e força recálculo —
       usado tanto pelo botão "Recalcular" quanto ao trocar o período (datas
       do topo), já que os campos só se auto-preenchem quando vazios e senão
       "grudam" no valor da vez em que foram calculados. ── */
  function _embSemRecalcular() {
    ['n_men','n_men_d','n_int','n_int_d','n_alc','n_alc_d','n_eng','n_eng_d'].forEach(k => _embSemSet(k, ''));
    [0,1,2].forEach(i => { ['plat','perfil','resumo','curtidas'].forEach(f => _embSemSet(`p${i}_${f}`, '')); });
    renderEmbraturSemanal();
  }

  function _embSemMudarPais(cod) {
    _embSemanalPais = cod;
    _embPaisSel = cod; // sync so CSV upload handlers target the right country
    localStorage.setItem('embratur_pais_sel', cod);
    renderEmbraturSemanal();
    _embCarregarD1Semanal(cod);
  }

  function _embSemCalcKPIsSemana(pais) {
    const rows = _embStateSem[pais]?.rows || [];
    if (!rows.length) return null;

    // Recorte da SEMANAL é por dia de calendário (00h–23h59), diferente do
    // DIÁRIO (que usa _dataRel com corte às 6h para não quebrar coletas no
    // meio da madrugada). Usar _dataRel aqui inflava/deslocava dias — uma
    // semana de 7 dias virava 8 "buckets" e o fallback de 7 dias descartava
    // o mais antigo, fazendo a contagem de menções ficar menor que o total
    // de posts da base. Ver conversa com Daniel/Brena em 02/07/2026.
    const getDia = r => (r.data || '').substring(0, 10);

    // Datas únicas ordenadas — mesma lógica do diário
    const todasDatas = [...new Set(rows.map(getDia).filter(Boolean))].sort();

    // Período explícito selecionado no topo da aba (dataIni/dataFim). Sem
    // seleção, cai no fallback antigo: últimas 7 datas com dados carregados
    // como "semana atual" — heurística que mistura dados de semanas
    // diferentes quando a base acumulada tem lacunas, causando divergência
    // nos números de menções/interações/alcance mostrados vs. o esperado.
    const dataIni = _embSemV('dataIni');
    const dataFimSel = _embSemV('dataFim');
    let currDates, prevDates;
    if (dataIni && dataFimSel && dataIni <= dataFimSel) {
      currDates = new Set(todasDatas.filter(d => d >= dataIni && d <= dataFimSel));
      const diasAntes = todasDatas.filter(d => d < dataIni);
      const nDias = currDates.size || 7;
      prevDates = new Set(diasAntes.slice(-nDias));
    } else {
      currDates = new Set(todasDatas.slice(-7));
      prevDates = new Set(todasDatas.length >= 8 ? todasDatas.slice(-14, -7) : []);
    }

    const rowsPeriodo = dateSet => dateSet.size ? rows.filter(r => dateSet.has(getDia(r))) : rows;

    const calcPeriod = dateSet => {
      const rs = rowsPeriodo(dateSet);
      if (!rs.length) return null;
      const mencoes    = rs.length;
      const interacoes = rs.reduce((s, r) => s + (r.interacoes || 0), 0);
      const segs = {};
      rs.forEach(r => {
        const pub = r.nome_publicador || r.link_publicacao || '__anon__';
        const val = _embAlcanceBasis(r);
        if (val > (segs[pub] || 0)) segs[pub] = val;
      });
      const alcance  = Math.round(Object.values(segs).reduce((s, v) => s + v, 0));
      const engMedio = mencoes > 0 ? Math.round(interacoes / mencoes) : 0;
      return { mencoes, interacoes, alcance, engMedio };
    };

    const curr = calcPeriod(currDates);
    const prev = prevDates.size ? calcPeriod(prevDates) : null;

    const pct  = (c, p) => (p && p > 0) ? Math.round(((c - p) / p) * 100) : null;
    const fmtD = n => n === null ? null : (n >= 0 ? `+${n}% vs. anterior` : `${n}% vs. anterior`);

    const deltas = prev ? {
      mencoes:    { txt: fmtD(pct(curr.mencoes,    prev.mencoes)),    up: curr.mencoes    >= prev.mencoes    },
      interacoes: { txt: fmtD(pct(curr.interacoes, prev.interacoes)), up: curr.interacoes >= prev.interacoes },
      alcance:    { txt: fmtD(pct(curr.alcance,    prev.alcance)),    up: curr.alcance    >= prev.alcance    },
      engMedio:   { txt: fmtD(pct(curr.engMedio,   prev.engMedio)),   up: curr.engMedio   >= prev.engMedio   },
    } : null;

    // Canais e top3 usam SÓ as publicações do período atual (currDates) —
    // antes usavam toda a base acumulada (todas as semanas já carregadas),
    // o que fazia o "top 3" e a lista de canais não baterem com os números
    // de menções/interações/alcance mostrados para a semana selecionada.
    const rsAtual = rowsPeriodo(currDates);
    const canais = {};
    rsAtual.forEach(r => { const c = r.canal || '—'; canais[c] = (canais[c] || 0) + 1; });
    // Agrupa por POST, não por publicador — mesma correção do diário. Antes
    // (`nome_publicador` como chave) o Top Publicações da semanal misturava
    // vários posts do mesmo perfil: alcance vinha do máximo entre todos os
    // posts do publicador no período, curtidas/comentários somavam todos os
    // posts juntos, e resumo/link vinham de um post ainda diferente (o de
    // maior interação isolada) — nenhum campo do card batia com um post real.
    const byPub = {};
    rsAtual.forEach(r => {
      const n = r.nome_publicador || '—';
      const chave = _embChavePost(n, r.conteudo, r.link_publicacao);
      if (!byPub[chave]) byPub[chave] = { nome: n, inter: 0, curtidas: 0, coments: 0, seg: r.seguidores || 0, alc: 0, canal: r.canal || '', conteudo: r.conteudo || '', link_publicacao: r.link_publicacao || '', imagem: r.imagem || '', sent: '', _bestInter: -1 };
      byPub[chave].inter    += (r.interacoes  || 0);
      byPub[chave].curtidas += (r.curtidas    || 0);
      byPub[chave].coments  += (r.comentarios || 0);
      byPub[chave].seg       = Math.max(byPub[chave].seg, r.seguidores || 0);
      byPub[chave].alc       = Math.max(byPub[chave].alc, _embAlcanceBasis(r));
      if (!byPub[chave].imagem && r.imagem) byPub[chave].imagem = r.imagem;
      if ((r.conteudo || '').length > (byPub[chave].conteudo || '').length) byPub[chave].conteudo = r.conteudo;
      if (r.link_publicacao && (r.interacoes || 0) >= byPub[chave]._bestInter) {
        byPub[chave].link_publicacao = r.link_publicacao;
        byPub[chave]._bestInter = r.interacoes || 0;
      }
      if (r.sentimento) byPub[chave].sent = r.sentimento;
    });

    // Top 3 usa papéis distintos (alcance / engajamento / atenção) — antes
    // ordenava tudo por interações, então o slot "alcance" podia mostrar um
    // post que não era o de maior alcance (bug "alcance incorreto no Top 3").
    // O slot "atenção" é o post de sentimento negativo/desfavorável com maior
    // alcance (não o segundo maior em interações) — se não houver nenhum post
    // negativo no período, cai de volta para o critério antigo (interações).
    const byPubArr   = Object.entries(byPub);
    const isNegativo = v => v.sent === 'negativo' || v.sent === 'desfavoravel';
    const topAlcance = byPubArr.slice().sort((a, b) => b[1].alc - a[1].alc)[0];
    const restante1  = byPubArr.filter(([n]) => !topAlcance || n !== topAlcance[0]);
    const topEngaj   = restante1.slice().sort((a, b) => b[1].inter - a[1].inter)[0];
    const restante2  = restante1.filter(([n]) => !topEngaj || n !== topEngaj[0]);
    const topAtencao = restante2.filter(([, v]) => isNegativo(v)).sort((a, b) => b[1].alc - a[1].alc)[0]
                     || restante2.slice().sort((a, b) => b[1].inter - a[1].inter)[0];
    const top3 = [topAlcance, topEngaj, topAtencao].filter(Boolean);

    // Destaques por rede social — mesma lógica do diário, usando byPubArr (posts do período atual).
    const mkPostSem = ([,v], val) => ({
      handle: '@'+(v.nome||'—'), texto: (v.conteudo||'').substring(0,80), val,
      link: v.link_publicacao || '', imagem: v.imagem || '',
    });
    const redesDestaque = _embAplicaExclRedes(_embCalcRedesDestaque(byPubArr, mkPostSem), new Set(_embStateSem[pais]?.excludedRedes || []));
    // Frequência real de temas (coluna já classificada no Reputaition), só do período atual.
    const temasFreq = _embCalcTemasFreq(rsAtual);

    return {
      ...curr,
      canais: Object.entries(canais).sort((a, b) => b[1] - a[1]),
      top3,
      redesDestaque, temasFreq,
      deltas,
      nSemanas: todasDatas.length,
      rowsPeriodo: rsAtual,
    };
  }

  function _embSemGerarDadosPrompt() {
    const pais    = _embSemanalPais;
    const pi      = EMBRATUR_PAISES_SEM[pais];
    const periodo = _embSemV('periodo') || '(preencher período)';
    const kpis    = _embSemCalcKPIsSemana(pais);
    // Usa só as publicações do período calculado (kpis.rowsPeriodo) — antes
    // despejava TODA a base acumulada (todas as semanas já carregadas) no
    // prompt, fazendo a IA contar/analisar posts fora da semana cujos números
    // já apareciam nas MÉTRICAS CALCULADAS acima, gerando divergência.
    const rows    = kpis?.rowsPeriodo || _embStateSem[pais]?.rows || [];
    const fN = n => n >= 1000000 ? (n/1000000).toFixed(1).replace('.',',')+' M'
                  : n >= 1000    ? (n/1000).toFixed(1).replace('.',',')+' k'
                  : String(n);
    const SEP = '='.repeat(60);

    const fmtDelta = d => d ? ` (${d.txt || '—'})` : '';

    // ── Instrução + schema JSON (começa o arquivo) ──
    let txt = `${SEP}
INSTRUÇÃO PARA A IA — LEIA ANTES DE ANALISAR
${SEP}
Você é um analista de social listening da Embratur. Analise os dados abaixo e retorne EXCLUSIVAMENTE um bloco JSON válido, sem texto antes ou depois, sem markdown, sem explicações.

REGRA DE IDIOMA: escreva TODOS os textos da resposta em português do Brasil, independentemente do idioma das publicações analisadas ou do país de origem (ex.: mesmo analisando publicações em espanhol, francês ou inglês sobre a Espanha/França/EUA, a análise deve sair inteira em português). Apenas os @handles e URLs citados permanecem no idioma/formato original.

REGRA OBRIGATÓRIA DE CITAÇÃO: em "resumo_executivo", "repercussao.repercutiu_bem", "repercussao.ponto_de_atencao", "sensiveis.texto" e "observar.texto", sempre que você mencionar ou exemplificar algo com base em uma publicação específica da lista "PUBLICAÇÕES DA SEMANA" abaixo, cite-a no formato @handle (https://link-do-post) — usando o @handle exato e a URL exata do campo "link:" daquela publicação, logo após o handle, entre parênteses, sem colchetes e sem markdown. Ex.: "O post de @sportricolore (https://twitter.com/sportricolore/statuses/123) gerou grande repercussão." Nunca invente ou construa uma URL — se a publicação citada não tiver link na lista, cite só o @handle sem URL. Cada assunto/tema diferente que você mencionar dentro de um campo precisa da sua própria citação — não basta citar 1 publicação e depois seguir citando outros 2-3 assuntos sem @handle nenhum. Especificamente em "resumo_executivo", que normalmente cobre vários assuntos em parágrafos distintos, cite pelo menos 1 publicação por assunto/parágrafo, não apenas 1 no campo inteiro.
NUNCA formate a URL como link markdown ([texto](url)) nem duplique a URL dentro do parênteses — a URL deve aparecer UMA ÚNICA VEZ, crua, sem colchetes. Errado: "@sportricolore ([https://twitter.com/sportricolore/statuses/123](https://twitter.com/sportricolore/statuses/123))". Certo: "@sportricolore (https://twitter.com/sportricolore/statuses/123)". Também não adicione marcadores de citação como "[cite: 1, 2]" — eles não existem nos dados fornecidos e não devem aparecer na resposta.

REGRA DE FORMATAÇÃO: "resumo_executivo" deve vir com os parágrafos separados por uma linha em branco (\\n\\n) — nunca em um bloco único corrido.

O JSON deve seguir exatamente este schema (preencha todos os campos com base nos dados):

{
  "pais": "${pais}",
  "periodo": "${periodo}",
  "resumo_executivo": "parágrafo 1 resumindo a semana, citando pelo menos 1 publicação real da lista no formato @handle (https://link-do-post)\\n\\nparágrafo 2, citando publicações quando fizer sentido\\n\\nparágrafo 3 (opcional)",
  "numeros": {

  },

    { "nome": "tema 3", "volume_pct": 25, "sentimento": "negativo" }
  ],
  "temas_analise": "1 parágrafo (3-5 frases) analisando os temas mais frequentes da semana e o que isso indica para a percepção do Brasil no mercado — cite pelo menos 2 publicações reais da lista (que tenham o tema correspondente) no formato @handle (https://link-do-post), ancorando a análise em exemplos concretos, não só nos percentuais",
