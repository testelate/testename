Valores permitidos para "status": "agir", "monitorar", "planejar"
Valores permitidos para "sentimento" nos temas: "positivo", "favoravel", "desfavoravel", "negativo"
SE a seção "TEMAS REAIS DA SEMANA (Reputaition)" abaixo tiver dados, use EXATAMENTE esses temas e percentuais no campo "temas" (não invente números) — sua única tarefa nesse caso é escolher o "sentimento" de cada um e escrever "temas_analise". Se não houver dados reais, estime "temas" a partir da amostra de publicações como antes.
NÃO inclua um campo "top_publicacoes" na resposta — o Top 3 (maior alcance / maior engajamento / atenção) é calculado automaticamente pelo HUB a partir dos dados brutos, com critério mais preciso do que a leitura da lista abaixo.
Os campos de delta (mencoes_delta, interacoes_delta, etc.) podem ser preenchidos com os valores calculados abaixo ou deixados como "—" se não houver histórico.
sentimento_positivo + sentimento_favoravel + sentimento_desfavoravel + sentimento_negativo devem somar 100.

${SEP}
DADOS DA SEMANA
${SEP}
PAÍS: ${pi.nome}
PERÍODO: ${periodo}

MÉTRICAS CALCULADAS:\n`;
    if (kpis) {
      txt += `- Menções: ${fN(kpis.mencoes)}${fmtDelta(kpis.deltas?.mencoes)}\n`;
      txt += `- Interações: ${fN(kpis.interacoes)}${fmtDelta(kpis.deltas?.interacoes)}\n`;
      txt += `- Alcance estimado: ${fN(kpis.alcance)}${fmtDelta(kpis.deltas?.alcance)}\n`;
      txt += `- Engajamento médio por post: ${kpis.engMedio}${fmtDelta(kpis.deltas?.engMedio)}\n`;
      txt += `\nCANAIS COM MAIS VOLUME:\n`;
      kpis.canais.slice(0,6).forEach(([c,n]) => { txt += `- ${c}: ${n} posts\n`; });
    } else {
      txt += `- (base não carregada)\n`;
    }
    txt += `\n`;

    // Temas já classificados no Reputaition (dados reais, não estimativa)
    if (kpis?.temasFreq?.length) {
      txt += `TEMAS REAIS DA SEMANA (Reputaition — coluna "Assunto Principal"/"Tema", % sobre publicações com tema identificado):\n`;
      kpis.temasFreq.forEach(t => { txt += `- ${t.nome}: ${t.pct}% (${t.count} publicações)\n`; });
      txt += `\n`;
    }

    // ── Publicações completas para contexto da IA ──
    if (rows.length) {
      txt += `${SEP}\nPUBLICAÇÕES DA SEMANA — ${rows.length} posts (ordenados por interações)\n${SEP}\n\n`;
      const sorted = [...rows].sort((a,b) => (b.interacoes||0) - (a.interacoes||0));
      sorted.forEach((r, idx) => {
        txt += `[${idx+1}] `;
        if (r.canal)           txt += `${r.canal} | `;
        if (r.nome_publicador) txt += `@${r.nome_publicador} | `;
        if (r.seguidores)      txt += `${fN(r.seguidores)} seguidores | `;
        if (r.interacoes)      txt += `${fN(r.interacoes)} interações | `;
        if (r.data)            txt += `${r.data.split('T')[0]}`;
        txt += '\n';
        if (r.conteudo)        txt += `${r.conteudo.trim()}\n`;
        if (r.tema)            txt += `tema: ${r.tema}\n`;
        if (r.link_publicacao) txt += `link: ${r.link_publicacao}\n`;
        txt += '\n';
      });
    }

    // ── Reforço final da regra de citação, logo antes da IA gerar o JSON —
    // a instrução lá no topo do prompt fica longe demais depois da lista de
    // publicações, e a IA "esquece" e volta a formatar a URL como link
    // markdown duplicado (@handle ([url](url))). Repetir aqui, perto de onde
    // a resposta é gerada, segue o mesmo padrão do prompt do Diário
    // (_embGerarPrompt), que já reforça a regra duas vezes. ──
    txt += `${SEP}\nLEMBRETE FINAL ANTES DE RESPONDER\n${SEP}\nResponda inteiramente em português do Brasil, mesmo que as publicações analisadas estejam em espanhol, inglês, francês ou outro idioma — não copie o idioma das publicações.\nNÃO escreva "resumo_executivo", "repercussao.repercutiu_bem", "repercussao.ponto_de_atencao", "sensiveis.texto" ou "observar.texto" apenas com texto genérico ("diversos perfis", "vários usuários comentaram") — isso NÃO é uma citação. Cite pelo menos 1 publicação real e específica da lista TOP 20 em cada um desses campos, sempre que houver dados suficientes. No "resumo_executivo" em especial, NÃO cite só 1 publicação e siga o resto do texto (2-3 outros assuntos/parágrafos) sem nenhuma citação — cada assunto diferente citado precisa da sua própria publicação real.\nAo citar uma publicação, use SEMPRE o formato @handle (https://link-do-post) — URL crua, uma única vez, sem colchetes, sem link markdown, sem "[cite: ...]" ou qualquer outro marcador.\nCERTO: @sportricolore (https://twitter.com/sportricolore/statuses/123)\nERRADO: @sportricolore ([https://twitter.com/sportricolore/statuses/123](https://twitter.com/sportricolore/statuses/123))\nERRADO: @sportricolore ([link](https://twitter.com/sportricolore/statuses/123))\nERRADO: @sportricolore (https://twitter.com/sportricolore/statuses/123) [cite: 1, 2]\nERRADO: "Diversos perfis compartilharam e celebraram..." (sem nenhum @handle)\nResponda APENAS o JSON, sem markdown, sem texto fora das chaves.\n\n`;

    // ── Mostra preview na textarea ──
    const area = document.getElementById('semPromptOutput');
    if (area) { area.value = txt; area.style.display = ''; }

    // Download automático junto com o "Gerar"
    _embSemFazerDownload(txt, pais, periodo, rows.length);
  }

  function _embSemBaixarTxt() {
    const pais    = _embSemanalPais;
    const periodo = _embSemV('periodo') || '(preencher período)';
    const rows    = _embStateSem[pais]?.rows || [];
    // Reutiliza a geração completa do prompt e força o download
    const area = document.getElementById('semPromptOutput');
    const txt  = area?.value;
    if (txt) {
      _embSemFazerDownload(txt, pais, periodo, rows.length);
    } else {
      // Se ainda não gerou, gera agora
      _embSemGerarDadosPrompt();
    }
  }

  function _embSemFazerDownload(txt, pais, periodo, nRows) {
    const nomePeriodo = (periodo||'sem-periodo').replace(/\s+/g, '_').replace(/[^\w\-]/g, '');
    const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `embratur-semanal-${pais}-${nomePeriodo}.txt`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    showToast(`✅ TXT baixado — ${nRows} publicações incluídas!`);
  }

  function _embSemToggleHistorico() {
    const body    = document.getElementById('semHistoricoBody');
    const chevron = document.getElementById('semHistoricoChevron');
    if (!body) return;
    const open = body.style.display === 'none';
    body.style.display    = open ? '' : 'none';
    if (chevron) chevron.textContent = open ? '▲' : '▼';
  }

  function _embCompressImg(dataUrl, maxW, quality) {
    return new Promise(resolve => {
      if (!dataUrl || !dataUrl.startsWith('data:image')) { resolve(dataUrl); return; }
      const img = new Image();
      img.onload = () => {
        const scale = (img.width > maxW) ? maxW / img.width : 1;
        const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', quality || 0.72));
      };
      img.onerror = () => resolve(dataUrl);
      img.src = dataUrl;
    });
  }

  function _embSemImgUpload(i, file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async e => {
      const compressed = await _embCompressImg(e.target.result, 640, 0.72);
      _embSemSet(`p${i}_img`, compressed);
      const thumb = document.getElementById(`semPubThumb${i}`);
      if (thumb) {
        thumb.innerHTML = `<img src="${compressed}" style="width:100%;height:100%;object-fit:cover;display:block;border-radius:0;">
          <input type="file" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;" onchange="_embSemImgUpload(${i},this.files[0])">`;
      }
    };
    reader.readAsDataURL(file);
  }

  async function _embSemPublicar() {
    const d = _embSemBuildJSON();
    if (!d.periodo) { showToast('Preencha o período antes de publicar.'); return; }
    const btn = document.getElementById('semPublishBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Publicando…'; }
    try {
      const res  = await fetch('/api/ekklesia/embratur-semanal-share', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...d, token: _embSemanalToken || undefined }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'erro');
      _embSemanalToken = data.token;
      localStorage.setItem('embratur_semanal_token', _embSemanalToken);
      const url = location.origin + '/pages/embratur-semanal-share.html?token=' + _embSemanalToken;
      navigator.clipboard.writeText(url).catch(() => {});
      showToast('✅ Link copiado!');
      renderEmbraturSemanal();
    } catch(e) {
      showToast('❌ Erro: ' + e.message);
      if (btn) { btn.disabled = false; btn.textContent = 'Publicar link'; }
    }
  }

  function _embSemNovoLink() {
    _embSemanalToken = null;
    localStorage.removeItem('embratur_semanal_token');
    showToast('🔄 Próxima publicação gerará novo link.');
    renderEmbraturSemanal();
  }

  async function fetchControleStatus(data, tipo) {
    try {
      localStorage.setItem('ekklesia_data_rel', data);
      const res = await fetch(`/api/ekklesia/embratur-controle?data=${data}&tipo=${tipo}`);
      if (!res.ok) return;
      const rows = await res.json();
      rows.forEach(row => {
        const selEl  = document.getElementById(`ctrl-${tipo}-${row.pais}-status`);
        const respEl = document.getElementById(`ctrl-${tipo}-${row.pais}-resp`);
        if (selEl)  selEl.value  = row.status      || 'pendente';
        if (respEl) respEl.value = row.responsavel || '';
      });
    } catch(e) {}
  }

  function _embOnControleChange(tipo, pais, el) {
    const respEl = document.getElementById(`ctrl-${tipo}-${pais}-resp`);
    const data = tipo === 'diario' ? window._embCtrlDataDiario : window._embCtrlDataSemanal;
    fetch('/api/ekklesia/embratur-controle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tipo_relatorio: tipo, data_ref: data, pais, status: el.value, responsavel: respEl?.value || '' }),
    }).catch(() => {});
  }

  function _embOnControleRespBlur(tipo, pais, el) {
    const selEl = document.getElementById(`ctrl-${tipo}-${pais}-status`);
    const data = tipo === 'diario' ? window._embCtrlDataDiario : window._embCtrlDataSemanal;
    fetch('/api/ekklesia/embratur-controle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tipo_relatorio: tipo, data_ref: data, pais, status: selEl?.value || 'pendente', responsavel: el.value }),
    }).catch(() => {});
  }

  function renderEmbraturSemanal() {
    const tb = document.getElementById('tabBody');
    const p  = _embSemanalPais;
    const pi = EMBRATUR_PAISES_SEM[p] || { nome: p, emoji: '🌎' };
    const eh = s => String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const vi = (k, d2) => eh(_embSemV(k, d2 !== undefined ? d2 : ''));

    // ── Auto-popular KPIs a partir da base carregada ──
    const semKpis = _embSemCalcKPIsSemana(p);
    if (semKpis) {
      const fN = n => n >= 1000000 ? (n/1000000).toFixed(1).replace('.',',')+' M'
                    : n >= 1000    ? (n/1000).toFixed(1).replace('.',',')+' k'
                    : String(n);
      if (!_embSemV('n_men')) _embSemSet('n_men', fN(semKpis.mencoes));
      if (!_embSemV('n_int')) _embSemSet('n_int', fN(semKpis.interacoes));
      if (!_embSemV('n_alc')) _embSemSet('n_alc', fN(semKpis.alcance));
      if (!_embSemV('n_eng')) _embSemSet('n_eng', String(semKpis.engMedio));
      // Auto-popular variações a partir da semana anterior (se houver 2 semanas de dados)
      if (semKpis.deltas) {
        if (!_embSemV('n_men_d') && semKpis.deltas.mencoes.txt)    { _embSemSet('n_men_d', semKpis.deltas.mencoes.txt);    _embSemSet('n_men_up', semKpis.deltas.mencoes.up);    }
        if (!_embSemV('n_int_d') && semKpis.deltas.interacoes.txt) { _embSemSet('n_int_d', semKpis.deltas.interacoes.txt); _embSemSet('n_int_up', semKpis.deltas.interacoes.up); }
        if (!_embSemV('n_alc_d') && semKpis.deltas.alcance.txt)    { _embSemSet('n_alc_d', semKpis.deltas.alcance.txt);    _embSemSet('n_alc_up', semKpis.deltas.alcance.up);    }
        if (!_embSemV('n_eng_d') && semKpis.deltas.engMedio.txt)   { _embSemSet('n_eng_d', semKpis.deltas.engMedio.txt);   _embSemSet('n_eng_up', semKpis.deltas.engMedio.up);   }
      }
      // Auto-popular top publicações (sobrescreve "—" placeholder mas respeita valor manual)
      const semEmpty = v => !v || v === '—';
      semKpis.top3.forEach(([,v], i) => {
        if (semEmpty(_embSemV(`p${i}_plat`)))     _embSemSet(`p${i}_plat`,     v.canal || '');
        if (semEmpty(_embSemV(`p${i}_perfil`)))   _embSemSet(`p${i}_perfil`,   '@' + v.nome + (v.seg ? ' · ' + fN(v.seg) : ''));
        if (semEmpty(_embSemV(`p${i}_link`)))     _embSemSet(`p${i}_link`,     v.link_publicacao || '');
        if (semEmpty(_embSemV(`p${i}_resumo`)))   _embSemSet(`p${i}_resumo`,   (v.conteudo || '').substring(0, 120));
        // Curtidas: só preenche com dado real de curtidas. Antes, quando a base
        // não trazia coluna de curtidas pro post, caía no total de interações
        // (curtidas+comentários+compartilhamentos) e isso aparecia rotulado como
        // "Curtidas" — bug identificado no post do @natgeo (mostrava 128,6k de
        // "curtidas" que na verdade eram as interações totais do post).
        if (semEmpty(_embSemV(`p${i}_curtidas`))) _embSemSet(`p${i}_curtidas`, v.curtidas > 0 ? fN(v.curtidas) : '—');
        // Mesmo raciocínio para comentários: 0 aqui pode ser "sem dado" (coluna
        // ausente na base) em vez de "zero comentários reais" — mostrar '—' evita
        // afirmar um zero que não é garantido.
        if (semEmpty(_embSemV(`p${i}_coments`)))  _embSemSet(`p${i}_coments`,  v.coments  > 0 ? fN(v.coments)  : '—');
        if (semEmpty(_embSemV(`p${i}_alcance`)))  _embSemSet(`p${i}_alcance`,  v.alc      > 0 ? fN(Math.round(v.alc)) : '—');
      });

              const d = new Date((ds||'').substring(0,10)+'T12:00:00');
              if (isNaN(d)) return ds||'sem data';
              const day = d.getDay();
              d.setDate(d.getDate() + (day===0?-6:1-day));

  function _embSelectPais(codigo) {
    _embPaisSel = codigo;

    // enquanto o D1 ainda está carregando. O render mostra tela vazia até _embCarregarD1 terminar.
    if (_embState[_embPaisSel]) {
      _embState[_embPaisSel].kpis = null;
    }
    renderEmbraturDiario();
    _embAtualizarBtnPublicar();
    _embCarregarD1();
  }

  function _embAtualizarBtnPublicar() {
    const kpis = _embState[_embPaisSel]?.kpis;
    const btn  = document.getElementById('publishBtn');
    if (!btn) return;
    btn.style.display = kpis ? 'inline-flex' : 'none';
    const lbl = document.getElementById('publishBtnLabel');
    if (lbl) lbl.textContent = 'Publicar link';
    // Não sobrescreve o onclick se a aba semanal estiver ativa
    if (typeof tabAtual === 'undefined' || tabAtual !== 'semanal') {
      btn.onclick = () => window.embPublicar && window.embPublicar();
    }
  }

  /* ── Salva texto editorial ── */
  function _embSaveTexto(id, val) {
    if (!_embState[_embPaisSel]) _embState[_embPaisSel] = {};
    if (!_embState[_embPaisSel].textos) _embState[_embPaisSel].textos = {};
    _embState[_embPaisSel].textos[id] = val;
    _embSaveConfig();
  }

  function _embSaveHoraJanela() {
    if (!_embState[_embPaisSel]) _embState[_embPaisSel] = {};
    _embState[_embPaisSel].horaInicio = document.getElementById('embHoraInicio')?.value || '06:01';
    _embState[_embPaisSel].horaFim    = document.getElementById('embHoraFim')?.value    || '06:00';
    _embState[_embPaisSel].dataInicio = document.getElementById('embDataInicio')?.value || '';
    _embState[_embPaisSel].dataFim    = document.getElementById('embDataFim')?.value    || '';
    _embSaveConfig();
  }

  function _embSaveAlcanceAdj() {
    if (!_embState[_embPaisSel]) _embState[_embPaisSel] = {};
    const raw = document.getElementById('embAlcanceAdj')?.value || '';
    const num = raw.trim() === '' ? null : parseInt(raw.replace(/\D/g,''), 10) || null;
    _embState[_embPaisSel].alcanceAdj = num;
    // Atualiza o kpis.alcance em memória para refletir no payload imediatamente
    if (_embState[_embPaisSel].kpis) {
      const kpis = _embState[_embPaisSel].kpis;
      const base = kpis._alcanceCalc !== undefined ? kpis._alcanceCalc : 0;
      kpis.alcance = fmtNum(num !== null ? num : base);
    }
    _embSaveConfig();
    showToast('✅ Alcance ajustado manualmente.');
  }

  /* ── Upload e processamento da base ── */
  function _embHandleDrop(e) {
    e.preventDefault();
    document.getElementById('embUploadZone').classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (f) _embHandleFile(f);
  }

  /* ── Chave de deduplicação — combina vários campos pra reduzir colisão.
       Quando link+conteúdo+data vêm todos vazios (ex.: export do Reputaition,
       cujas colunas têm nomes diferentes do Brandwatch), cair só nesses 3
       campos faz TODAS as linhas caírem na mesma chave e a deduplicação
       descarta quase a base inteira como "duplicata" — foi exatamente o bug
       relatado (base de 10 virando 1). Aqui complementamos com canal,
       publicador, seguidores e interações; se mesmo assim a chave ficar
       vazia (linha sem nenhum campo reconhecido), usamos um sufixo aleatório
       pra NUNCA tratar como duplicata por engano — preferimos o risco raro
       de uma duplicata real entrar de novo do que perder dados de verdade. ── */
  function _embChaveDedup(r) {
    // Chave de identidade do post — deve ser idêntica à lógica de _embIdRow
    // para que memória e D1 concordem sobre o que é "o mesmo post".
    // NÃO inclui seguidores/interacoes: Brandwatch re-exporta os mesmos tweets
    // com engagement atualizado, o que causava "fantasmas" em memória (contados como
    // posts diferentes) que nunca chegavam ao D1 (INSERT OR IGNORE pela PK = link).
    if (r.link_publicacao) return 'L|' + r.link_publicacao;
    const dataLimpa = (r.data || '').replace(/T00:00:00$/, '').replace(/T07:00:00$/, '');
    const base = (r.nome_publicador || '') + '|' + (r.conteudo || '').substring(0, 60) + '|' + (dataLimpa || r.data || '') + '|' + (r.canal || '');
    return base.replace(/\|/g, '') ? ('C|' + base) : ('R|' + Math.random().toString(36).slice(2));
  }
  // tipo: 'diario' (default) ou 'semanal' — decide em qual base a linha entra.
  // Diário e Semanal têm bases independentes desde que passaram a ser
  // separadas (ver plano "Separar a base do Semanal da base do Diário");
  // antes disso um upload feito numa aba contava também na outra.
  function _embAcumularRows(parsedOriginal, tipo) {
    tipo = tipo === 'semanal' ? 'semanal' : 'diario';
    const store = tipo === 'semanal' ? _embStateSem : _embState;
    const parsed = parsedOriginal.map(_embCompactarRow);
    const existing = (store[_embPaisSel]?.rows) || [];

    // Mapa por chave de identidade — permite upsert de engagement
    // sem criar linhas fantasma que o D1 nunca vai guardar
    const existingMap = new Map(existing.map(r => [_embChaveDedup(r), r]));

    const novas = [];       // posts genuinamente novos (vão ao D1)
    const atualizadas = []; // posts já existentes com engagement maior (vão ao D1 com force=true)

    parsed.forEach(r => {
      const key = _embChaveDedup(r);
      const existente = existingMap.get(key);
      if (!existente) {
        existingMap.set(key, r);
        novas.push(r);
      } else {
        // Upsert de engagement: mantém o maior valor (ou aceita override se post manual)
        let mudou = false;
        if (r._manual) {
          existente.interacoes = r.interacoes;
          existente.seguidores = r.seguidores;
          if (r.sentimento) existente.sentimento = r.sentimento;
          if (r.conteudo) existente.conteudo = r.conteudo;
          if (r.canal) existente.canal = r.canal;
          if (r._dataRel) existente._dataRel = r._dataRel;
          existente._manual = true;
          mudou = true;
        } else {
          if ((r.interacoes || 0) > (existente.interacoes || 0)) { existente.interacoes = r.interacoes; mudou = true; }
          if ((r.seguidores || 0) > (existente.seguidores || 0)) { existente.seguidores = r.seguidores; mudou = true; }
          if ((r.curtidas || 0) > (existente.curtidas || 0)) { existente.curtidas = r.curtidas; mudou = true; }
          if ((r.comentarios || 0) > (existente.comentarios || 0)) { existente.comentarios = r.comentarios; mudou = true; }
          if ((r.compartilhamentos || 0) > (existente.compartilhamentos || 0)) { existente.compartilhamentos = r.compartilhamentos; mudou = true; }
          if (!existente.tema && r.tema) { existente.tema = r.tema; mudou = true; }
        }
        if (mudou) atualizadas.push(existente);
      }
    });

    if (!store[_embPaisSel]) store[_embPaisSel] = {};
    store[_embPaisSel].rows = [...existingMap.values()];

    // Persiste novas rows no D1 (fire-and-forget)
    if (novas.length) _embSincronizarD1(novas, tipo);
    // Atualiza engagement de rows existentes (force=true para sobrescrever)
    if (atualizadas.length) _embSincronizarD1Forca(atualizadas, tipo);

    if (tipo === 'semanal') {
      // Sem KPIs "grudados": qualquer mudança na base semanal força recálculo
      // na hora, senão o card de menções/interações/alcance fica com o valor
      // de antes do upload enquanto só a legenda "(de X na base)" atualiza.
      _embSemRecalcular();
    } else {
      _embState[_embPaisSel].kpis = _embCalcEAplicaKPIs(_embState[_embPaisSel].rows, _embState[_embPaisSel].imagensManuais);
      _embSaveConfig();
      _embAtualizarBtnPublicar();
      renderEmbraturDiario();
    }

    return { adicionadas: novas.length, duplicadas: parsed.length - novas.length - atualizadas.length, atualizadas: atualizadas.length };
  }

  // ID estável de uma row — usa link quando disponível, senão concatena campos.
  // Remove sufixos de hora artificiais de r.data para que o id seja consistente
  // independente de quando a row foi criada (antes ou depois dos fixes de hora).
  function _embIdRow(r) {
    if (r.link_publicacao) return r.link_publicacao;
    const dataLimpa = (r.data || '').replace(/T00:00:00$/, '').replace(/T07:00:00$/, '');
    // substring(0,60) alinhado com _embChaveDedup — evita divergência de chave
    return (r.nome_publicador || '') + '|' + (r.conteudo || '').substring(0, 60) + '|' + (dataLimpa || r.data || '');
  }

  // Persiste rows no D1. Usa r._dataRel (calculado em _embCompactarRow) como
  // data_rel definitiva — consistente com o que _embCalcKPIs usa para separar dias.
  // Salva data sem sufixo artificial (T00:00:00) para manter o D1 limpo.
  async function _embSincronizarD1(rows, tipo) {
    tipo = tipo === 'semanal' ? 'semanal' : 'diario';
    // Separa rows com imagem base64 das sem imagem — imagens vão em requests individuais
    // para evitar estourar o limite de 1MB do Cloudflare Workers no bulk payload.
    const semImagem  = [];
    const comImagem  = [];
    rows.forEach(r => {
      if (r.imagem && r.imagem.startsWith('data:')) comImagem.push(r);
      else semImagem.push(r);
    });

    const montarPayload = arr => arr.map(r => {
      const hoje = new Date().toISOString().substring(0, 10);
      const dataRel = r._dataRel || _embDiaRelatorio(r.data) || ((r.data || '').substring(0, 10) || hoje);
      const dataSalvar = (r.data || '').replace(/T00:00:00$/, '') || r.data;
      const rSalvar = dataSalvar !== r.data ? { ...r, data: dataSalvar } : r;
      const id = _embIdRow(r);
      return { ...rSalvar, id, data_rel: dataRel };
    }).filter(r => r.data_rel);

    let falhas = 0;

    // Salva rows sem imagem em bulk
    const payloadSem = montarPayload(semImagem);
    if (payloadSem.length) {
      try {
        const res = await fetch('/api/ekklesia/embratur-base', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pais: _embPaisSel, rows: payloadSem, tipo }),
        });
        const data = await res.json().catch(() => null);
        if (!res.ok || data?.erros?.length) { falhas += payloadSem.length; console.warn('embratur-base sync error:', data); }
      } catch(e) { falhas += payloadSem.length; console.warn('embratur-base sync error:', e); }
    }

    // Salva rows com imagem individualmente (cada uma pode ter 50-100KB de base64)
    for (const r of comImagem) {
      const payload = montarPayload([r]);
      if (!payload.length) continue;
      try {
        const res = await fetch('/api/ekklesia/embratur-base', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pais: _embPaisSel, rows: payload, tipo }),
        });
        const data = await res.json().catch(() => null);
        if (!res.ok || data?.erros?.length) { falhas++; console.warn('embratur-base sync image error:', data); }
      } catch(e) { falhas++; console.warn('embratur-base sync image error:', e); }
    }

    if (falhas > 0 && typeof showToast === 'function') {
      showToast(`⚠️ ${falhas} publicação(ões) não foram salvas no banco — tente sincronizar novamente.`);
    }
  }

  // Persiste rows no D1 com force=true (INSERT OR REPLACE) — usado para upsert de engagement.
  async function _embSincronizarD1Forca(rows, tipo) {
    if (!rows || !rows.length) return;
    tipo = tipo === 'semanal' ? 'semanal' : 'diario';
    const hoje = new Date().toISOString().substring(0, 10);
    const payload = rows.map(r => {
      const dataRel = r._dataRel || _embDiaRelatorio(r.data) || ((r.data || '').substring(0, 10) || hoje);
      const dataSalvar = (r.data || '').replace(/T00:00:00$/, '') || r.data;
      const rSalvar = dataSalvar !== r.data ? { ...r, data: dataSalvar } : r;
      const id = _embIdRow(r);
      return { ...rSalvar, id, data_rel: dataRel };
    }).filter(r => r.data_rel);
    if (!payload.length) return;
    // Separa com/sem imagem (mesma lógica de _embSincronizarD1)
    const semImg = payload.filter(r => !(r.imagem && r.imagem.startsWith('data:')));
    const comImg = payload.filter(r =>  (r.imagem && r.imagem.startsWith('data:')));
    if (semImg.length) {
      try {
        await fetch('/api/ekklesia/embratur-base', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pais: _embPaisSel, rows: semImg, force: true, tipo }),
        });
      } catch(e) { console.warn('embratur-base force-sync error:', e); }
    }
    for (const r of comImg) {
      try {
        await fetch('/api/ekklesia/embratur-base', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pais: _embPaisSel, rows: [r], force: true, tipo }),
        });
      } catch(e) { console.warn('embratur-base force-sync image error:', e); }
    }
  }


  /* ── Migração forçada do D1 ──
     Reenvia todas as rows em memória (já com datas corrigidas em T00:00:00)
     usando INSERT OR REPLACE, sobrescrevendo registros antigos que ainda têm
     T07:00:00 no campo data. Use quando o número de menções não bater com a
     planilha após atualizar o código. ── */
  async function _embMigrarD1() {
    const rows = _embState[_embPaisSel]?.rows;
    if (!rows || !rows.length) { showToast('⚠️ Nenhuma publicação em memória para migrar.'); return; }
    if (!confirm('Isso vai recalcular e corrigir as datas de ' + rows.length + ' publicações.\nUse quando o número de menções não bater com a planilha.\n\nContinuar?')) return;
    showToast('🔄 Corrigindo datas…');

    // 1) Recalcula _dataRel correto para cada row IGNORANDO o valor em memória
    //    (que pode ter vindo do D1 corrompido).
    //    - Posts manuais: dia de calendário escolhido pelo usuário (sem recorte 6h)
    //    - Posts de upload: normaliza T07:00:00 artificial → T00:00:00 antes de calcular
    const rowsCorrigidas = rows.map(r => {
      let dataParaCalculo = (r.data || '');
      if (/^\d{4}-\d{2}-\d{2}T07:00:00/.test(dataParaCalculo)) {
        dataParaCalculo = dataParaCalculo.substring(0, 10) + 'T00:00:00';
      }
      const dataRel = r._manual
        ? dataParaCalculo.substring(0, 10)
        : (_embDiaRelatorio(dataParaCalculo) || dataParaCalculo.substring(0, 10));
      const dataSalvar = (r.data || '').replace(/T00:00:00$/, '').replace(/T07:00:00$/, '') || r.data;
      return { ...r, data: dataSalvar || r.data, _dataRel: dataRel };
    });

    // 2) Aplica direto na memória e recalcula KPIs — a UI corrige imediatamente
    _embState[_embPaisSel].rows = rowsCorrigidas;
    _embState[_embPaisSel].kpis = _embCalcEAplicaKPIs(rowsCorrigidas, _embState[_embPaisSel].imagensManuais);
    renderEmbraturDiario();
    showToast('✅ Datas corrigidas em memória. Sincronizando com o banco…');

    // 3) Persiste no D1 com INSERT OR REPLACE — separa imagens base64 do bulk
    const semImagem = rowsCorrigidas.filter(r => !r.imagem || !r.imagem.startsWith('data:'));
    const comImagem = rowsCorrigidas.filter(r => r.imagem && r.imagem.startsWith('data:'));

    const mkPayload = arr => arr.map(r => ({ ...r, id: _embIdRow(r), data_rel: r._dataRel })).filter(r => r.data_rel);

    // Bulk para rows sem imagem
    if (semImagem.length) {
      fetch('/api/ekklesia/embratur-base', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pais: _embPaisSel, rows: mkPayload(semImagem), force: true }),
      }).then(res => res.json()).then(data => {
        showToast('✅ Banco sincronizado — ' + (data.inseridas || 0) + ' registros atualizados.');
      }).catch(e => showToast('⚠️ UI corrigida, mas erro ao salvar no banco: ' + e.message));
    }

    // Individual para rows com imagem
    for (const r of comImagem) {
      const p = mkPayload([r]);
      if (!p.length) continue;
      fetch('/api/ekklesia/embratur-base', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pais: _embPaisSel, rows: p, force: true }),
      }).catch(() => {});
    }
  }

  // Carrega histórico do D1 e funde com localStorage (D1 é fonte de verdade)
  // Carrega base do D1 (fonte de verdade) — substitui rows em memória.
  // Também carrega config (textos, hora, imagens) do D1 para o estado local.
  async function _embCarregarD1() {
    try {
      // Carrega config primeiro para ter dataInicio/dataFim disponíveis ao buscar a base
      const resConfig = await fetch('/api/ekklesia/embratur-config?pais=' + encodeURIComponent(_embPaisSel));
      const dataConfig = await resConfig.json();

      // Aplica config ao state imediatamente (antes de buscar a base)
      if (dataConfig.ok && dataConfig.config) {
        const c = dataConfig.config;
        if (!_embState[_embPaisSel]) _embState[_embPaisSel] = {};
        if (c.textos)                          _embState[_embPaisSel].textos        = c.textos;
        if (c.horaInicio !== undefined)        _embState[_embPaisSel].horaInicio    = c.horaInicio;
        if (c.horaFim    !== undefined)        _embState[_embPaisSel].horaFim       = c.horaFim;
        if (c.dataInicio !== undefined)        _embState[_embPaisSel].dataInicio    = c.dataInicio;
        if (c.dataFim    !== undefined)        _embState[_embPaisSel].dataFim       = c.dataFim;
        if (c.alcanceAdj !== undefined)        _embState[_embPaisSel].alcanceAdj    = c.alcanceAdj;
        if (c.contextoExtra !== undefined)     _embState[_embPaisSel].contextoExtra = c.contextoExtra;
        if (c.imagensManuais)                  _embState[_embPaisSel].imagensManuais = c.imagensManuais;
      }

      // Sempre busca o máximo de 90 dias — dataInicio/dataFim são o período do
      // relatório atual (exibição), não o limite histórico do banco. Usar o período
      // de exibição como janela de fetch causava perda de publicações acumuladas de
      // semanas anteriores a cada F5 (ex: config com 7 dias → banco retornava só 9 dias
      // e 1300 posts viravam 500).
      const _urlBase = '/api/ekklesia/embratur-base?pais=' + encodeURIComponent(_embPaisSel) + '&dias=90&tipo=diario';

      const resBase  = await fetch(_urlBase);
      const dataBase = await resBase.json();

      // Migração: normaliza datas sem hora real para T00:00:00
      // Cobre dois casos:
      //   1) data veio como YYYY-MM-DD puro (nunca teve hora)
      //   2) data veio com T07:00:00 — sufixo artificial do código antigo que causava
      //      deslocamento de +1 dia e retroativos. Substituímos por T00:00:00.
      // Datas com hora real (ex: T14:32:00, T09:15:00) são mantidas intactas.
      const rows = (dataBase.rows || []).map(r => {
        // Garante _dataRel a partir do campo _dataRel já existente (vem como r._dataRel do worker)
        // Normaliza data: remove T07:00:00 artificial do código antigo
        if (r.data) {
          if (/^\d{4}-\d{2}-\d{2}$/.test(r.data)) {
            r.data += 'T00:00:00';
          } else if (/^\d{4}-\d{2}-\d{2}T07:00:00/.test(r.data)) {
            r.data = r.data.substring(0, 10) + 'T00:00:00';
          }
        }
        // _dataRel: usa o que veio do D1 (r._dataRel) se disponível,
        // senão deriva do campo data já normalizado
        if (!r._dataRel) {
          r._dataRel = _embDiaRelatorio(r.data) || (r.data || '').substring(0, 10);
        }
        return r;
      });

      if (!_embState[_embPaisSel]) _embState[_embPaisSel] = {};

      // Rows: substituição completa (D1 é fonte de verdade)
      if (dataBase.ok && rows.length) {
        const seen = new Set();
        const deduped = rows.filter(r => { const k = _embChaveDedup(r); if (seen.has(k)) return false; seen.add(k); return true; });
        _embState[_embPaisSel].rows = deduped;
      } else if (dataBase.ok) {
        _embState[_embPaisSel].rows = [];
      }

      // Recalcula KPIs com os dados frescos
      _embState[_embPaisSel].kpis = _embCalcEAplicaKPIs(
        _embState[_embPaisSel].rows || [],
        _embState[_embPaisSel].imagensManuais
      );
      _embAtualizarBtnPublicar();
      if (tabAtual === 'diario') renderEmbraturDiario();
    } catch (e) {
      console.warn('embratur-base load error:', e);
    }
  }

  /* ── Carrega a base do Semanal (tipo='semanal') — espelha _embCarregarD1,
       mas grava em _embStateSem (nunca em _embState) e nunca chama
       renderEmbraturDiario(), pra não misturar as duas bases nem forçar a
       troca de aba visível enquanto o fetch está em andamento. ── */
  async function _embCarregarD1Semanal(pais) {
    pais = pais || _embSemanalPais;
    try {
      const _urlBase = '/api/ekklesia/embratur-base?pais=' + encodeURIComponent(pais) + '&dias=90&tipo=semanal';
      const resBase  = await fetch(_urlBase);
      const dataBase = await resBase.json();

      const rows = (dataBase.rows || []).map(r => {
        if (r.data) {
          if (/^\d{4}-\d{2}-\d{2}$/.test(r.data)) {
            r.data += 'T00:00:00';
          } else if (/^\d{4}-\d{2}-\d{2}T07:00:00/.test(r.data)) {
            r.data = r.data.substring(0, 10) + 'T00:00:00';
          }
        }
        if (!r._dataRel) {
          r._dataRel = _embDiaRelatorio(r.data) || (r.data || '').substring(0, 10);
        }
        return r;
      });

      if (!_embStateSem[pais]) _embStateSem[pais] = {};

      if (dataBase.ok && rows.length) {
        const seen = new Set();
        const deduped = rows.filter(r => { const k = _embChaveDedup(r); if (seen.has(k)) return false; seen.add(k); return true; });
        _embStateSem[pais].rows = deduped;
      } else if (dataBase.ok) {
        _embStateSem[pais].rows = [];
      }

      if (tabAtual === 'semanal' && pais === _embSemanalPais) renderEmbraturSemanal();
    } catch (e) {
      console.warn('embratur-base (semanal) load error:', e);
    }
  }

  /* ── Acha a linha de cabeçalho real, pulando metadados que o export
       "Bulk Mentions Download" do Brandwatch coloca antes da tabela
       (5 linhas tipo "Report:", "Brand:", "From:", "To:", "Label:", cada
       uma com só 2 células preenchidas, + 1 linha vazia). Sem isso, o
       código lia "Report:"/"Bulk Mentions Download" como se fossem nomes
       de coluna, e NENHUM campo real era reconhecido — foi o caso
       relatado (0 publicações / 0 fotos casadas por link). ── */
  function _embLinhasDeAOA(aoa) {
    if (!aoa || !aoa.length) return [];
    let headerIdx = 0;
    for (let i = 0; i < Math.min(aoa.length, 20); i++) {
      const row = aoa[i] || [];
      const nonEmpty = row.filter(c => c !== '' && c !== null && c !== undefined);
      const primeira = String(row[0]||'').trim();
      if (nonEmpty.length >= 4 && !primeira.endsWith(':')) { headerIdx = i; break; }
    }
    const headerRow = (aoa[headerIdx]||[]).map(h => String(h||'').trim());
    return aoa.slice(headerIdx+1).map(row => {
      const obj = {};
      headerRow.forEach((h,i) => { if (h) obj[h] = (row[i] !== undefined && row[i] !== null) ? row[i] : ''; });
      return obj;
    });
  }

  /* ── Lê um CSV/XLSX e devolve as linhas brutas (array de objetos) ──
     Extraído de _embHandleFile pra ser reaproveitado também por
     _embHandleFileImagens (upload só-pra-imagens, abaixo). Lê como matriz
     bruta (sem assumir que a linha 0 é o cabeçalho) e deixa _embLinhasDeAOA
     achar onde a tabela de fato começa. ── */
  async function _embLerArquivoBruto(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    let aoa;
    if (ext === 'csv') {
      aoa = await new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = e => {
          const r = Papa.parse(e.target.result, { header:false, skipEmptyLines:true });
          res(r.data);
        };
        reader.onerror = rej;
        reader.readAsText(file, 'UTF-8');
      });
    } else {
      aoa = await new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = e => {
          const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
          const ws = wb.Sheets[wb.SheetNames[0]];
          res(XLSX.utils.sheet_to_json(ws, {header:1, defval:'', blankrows:false}));
        };
        reader.onerror = rej;
        reader.readAsArrayBuffer(file);
      });
    }
    return _embLinhasDeAOA(aoa);
  }

  async function _embHandleFiles(files) {
    if (!files || !files.length) return;
    const status = document.getElementById('embUploadStatus');
    let totalAdicionadas = 0, totalDuplicadas = 0;
    for (let i = 0; i < files.length; i++) {
      if (status) status.innerHTML = `<span class="spinner"></span> Processando ${i+1}/${files.length}: ${files[i].name}…`;
      try {
        const rawRows = await _embLerArquivoBruto(files[i]);
        const parsed  = parseRows(rawRows, 'brandwatch');
        if (!parsed.length) { showToast(`⚠️ ${files[i].name}: nenhuma publicação reconhecida.`); continue; }
        const { adicionadas, duplicadas, atualizadas: upd } = _embAcumularRows(parsed, tabAtual === 'semanal' ? 'semanal' : 'diario');
        totalAdicionadas += adicionadas;
        totalDuplicadas  += duplicadas;
      } catch(e) {
        showToast(`❌ ${files[i].name}: ${e.message}`);
      }
    }
    if (status) status.textContent = '';
    showToast(`✅ ${files.length} arquivo(s) — +${totalAdicionadas} publicações adicionadas (${totalDuplicadas} já existentes)`);
  }

  async function _embHandleFile(file) {
    if (!file) return;
    const status = document.getElementById('embUploadStatus');
    if (status) status.innerHTML = '<span class="spinner"></span> Processando…';
    try {
      const rawRows = await _embLerArquivoBruto(file);

      // Usa o parser Brandwatch já existente
      const parsed = parseRows(rawRows, 'brandwatch');
      if (!parsed.length) throw new Error('Nenhuma publicação reconhecida no arquivo.');

      const { adicionadas, duplicadas, atualizadas: upd } = _embAcumularRows(parsed, tabAtual === 'semanal' ? 'semanal' : 'diario');
      if (status) status.textContent = '';
      const updMsg = upd > 0 ? ` · ${upd} com engagement atualizado` : '';
      showToast(`✅ +${adicionadas} publicações adicionadas (${duplicadas} já existentes${updMsg})`);
    } catch(e) {
      if (status) status.textContent = '❌ ' + e.message;
      showToast('❌ Erro: ' + e.message);
    }
  }

  /* ── Upload "só pra imagens" — completa o campo `imagem` das publicações
       já acumuladas casando pelo link, sem sobrescrever nada que já exista
       (nem foto real já capturada, nem print anexado manualmente). Serve
       pra quando a base do dia veio do export do Reputaition (sem coluna de
       imagem) e o time tem a base bruta do Brandwatch da mesma coleta. ── */
  async function _embHandleFileImagens(file, ctx = 'diario') {
    if (!file) return;
    const semanal = ctx === 'semanal';
    const pais = semanal ? _embSemanalPais : _embPaisSel;
    const state = semanal ? _embStateSem[pais] : _embState[pais];
    const status = document.getElementById(semanal ? 'embUploadImgStatusSemanal' : 'embUploadImgStatus');
    if (status) status.innerHTML = '<span class="spinner"></span> Processando…';
    try {
      const rawRows = await _embLerArquivoBruto(file);
      const parsed  = parseRows(rawRows, 'brandwatch');
      if (!parsed.length) throw new Error('Nenhuma publicação reconhecida no arquivo.');

      const mapaImagens = {};
      parsed.forEach(r => {
        if (r.link_publicacao && r.imagem) mapaImagens[r.link_publicacao] = r.imagem;
      });

      const rowsAtuais = state?.rows || [];
      let completadas = 0;
      rowsAtuais.forEach(r => {
        if (!r.imagem && r.link_publicacao && mapaImagens[r.link_publicacao]) {
          r.imagem = mapaImagens[r.link_publicacao];
          _embPersistirImagemRow(pais, r, r.imagem, semanal ? 'semanal' : 'diario');
          completadas++;
        }
      });

      if (!completadas) {
        if (status) status.textContent = '⚠️ Nenhum link bateu com publicações já acumuladas (ou todas já tinham foto).';
        showToast('⚠️ Nenhuma foto nova encontrada por casamento de link.');
        return;
      }

      if (semanal) {
        renderEmbraturSemanal();
      } else {
        state.kpis = _embCalcEAplicaKPIs(state.rows, state.imagensManuais);
        _embSaveConfig();
        renderEmbraturDiario();
      }
      if (status) status.textContent = '';
      showToast(`✅ ${completadas} foto(s) completada(s) por link.`);
    } catch(e) {
      if (status) status.textContent = '❌ ' + e.message;
      showToast('❌ Erro: ' + e.message);
    }
  }

  // Limpa só o dia de referência atual (dataRef)
  function _embLimparHoje() {
    const kpis = _embState[_embPaisSel]?.kpis;
    const dataRef = kpis?.data;
    if (!dataRef) { showToast('⚠️ Sem dados para limpar.'); return; }
    if (!confirm('Limpar as publicações de ' + dataRef + ' para este país?')) return;
    const rows = _embState[_embPaisSel]?.rows || [];
    const novas = rows.filter(r => (r._dataRel || _embDiaRelatorio(r.data)) !== dataRef);
    _embState[_embPaisSel].rows = novas;
    _embState[_embPaisSel].kpis = novas.length ? _embCalcEAplicaKPIs(novas, _embState[_embPaisSel].imagensManuais) : null;

    fetch('/api/ekklesia/embratur-base?' + new URLSearchParams({ pais: _embPaisSel, data_rel: dataRef }), { method: 'DELETE' }).catch(() => {});

  // Mantido como nuclear — escondido atrás de confirmação dupla
  function _embLimparBase(tipo) {
    tipo = tipo === 'semanal' ? 'semanal' : 'diario';
    if (!confirm('Limpar TODA a base acumulada para este país? Isso não pode ser desfeito.')) return;
    if (!confirm('Tem certeza? Isso vai apagar todos os dias salvos.')) return;
    const pais  = tipo === 'semanal' ? _embSemanalPais : _embPaisSel;
    const store = tipo === 'semanal' ? _embStateSem : _embState;
    if (store[pais]) {
      const rows = store[pais]?.rows || [];
      const dias = [...new Set(rows.map(r => r._dataRel || _embDiaRelatorio(r.data)).filter(Boolean))];
      store[pais].rows = [];
      if (tipo === 'diario') { store[pais].kpis = null; _embSaveConfig(); }
      // Remove cada dia do D1
      dias.forEach(d => {
        fetch('/api/ekklesia/embratur-base?' + new URLSearchParams({ pais, data_rel: d, tipo }), { method: 'DELETE' }).catch(() => {});
      });
    }
    if (tipo === 'semanal') renderEmbraturSemanal(); else renderEmbraturDiario();
    showToast('🗑 Base completamente limpa.');
  }

  // Reset total: apaga base do dia, textos de IA e overrides do Top 3 — recomeça do zero
  function _embRecomecar(tipo) {
    tipo = tipo === 'semanal' ? 'semanal' : 'diario';
    if (!confirm('Recomeçar do zero? Isso apaga TODA a base acumulada, os textos gerados por IA e o Top 3 para este país. Não pode ser desfeito.')) return;
    if (!confirm('Tem certeza? Essa ação é irreversível.')) return;
    const pais  = tipo === 'semanal' ? _embSemanalPais : _embPaisSel;
    const store = tipo === 'semanal' ? _embStateSem : _embState;
    if (store[pais]) {
      const rows = store[pais]?.rows || [];
      const dias = [...new Set(rows.map(r => r._dataRel || _embDiaRelatorio(r.data)).filter(Boolean))];
      store[pais].rows = [];

      store[pais].excludedRedes = [];

        fetch('/api/ekklesia/embratur-base?' + new URLSearchParams({ pais, data_rel: d, tipo }), { method: 'DELETE' }).catch(() => {});

  /* ── Modal "Tratar base no Ekklesia for Social" ─────────────────
     Abre o Ekklesia genérico num iframe pra tratar/combinar fontes
     (Brandwatch, SuperMetrics, Stilingue, Apify, normalização, dedup…).
     Quando a pessoa clica em "Usar esta base", pedimos a base já
     filtrada (baseAtiva()) via postMessage e acumulamos no país ativo. */
  function _embAbrirEkklesiaSocial() {
    let modal = document.getElementById('embSocialModal');
    if (!modal) {
      modal = document.createElement('div');
      modal.id = 'embSocialModal';
      // z-index abaixo do toast (9999), pra avisos de erro/timeout ficarem visíveis
      modal.style.cssText = 'position:fixed;inset:0;z-index:9990;background:rgba(0,0,0,0.6);display:flex;flex-direction:column;';
      modal.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg);border-bottom:1px solid rgba(255,255,255,0.09);flex-shrink:0;gap:12px;flex-wrap:wrap;">
          <div style="font-size:12px;color:var(--text-secondary);flex:1;min-width:200px;">
            <strong style="color:var(--orange-2);">Ekklesia for Social</strong> — trate e combine as fontes, depois clique em <strong>"Usar esta base"</strong>.
            <div id="embSocialModalStatus" style="font-size:11px;color:var(--text-muted);margin-top:3px;"></div>
          </div>
          <div style="display:flex;gap:8px;flex-shrink:0;">
            <button class="emb-btn emb-btn-primary" style="font-size:11px;padding:7px 14px;" id="embUsarBaseBtn" onclick="_embUsarBaseTratada()">✅ Usar esta base</button>
            <button class="emb-btn emb-btn-sec" style="font-size:11px;padding:7px 14px;" onclick="_embFecharModalSocial()">✕ Fechar</button>
          </div>
        </div>
        <iframe id="embSocialIframe" style="flex:1;width:100%;border:none;background:#0a0a0a;"></iframe>
      `;
      document.body.appendChild(modal);
    }
    const statusEl = document.getElementById('embSocialModalStatus');
    if (statusEl) statusEl.textContent = '';
    modal.style.display = 'flex';

    /* ── Recarrega o ekklesia.html do zero a cada abertura ──
       O modal/iframe é criado uma única vez e reaproveitado entre aberturas
       (linha acima, `if (!modal)`). Sem isso, a base tratada lá dentro pra
       um país (ex.: França) continuava acumulada no iframe e "vazava" pro
       próximo país aberto nesse mesmo modal (ex.: Estados Unidos herdando
       os posts da França) — foi o bug relatado. Recarregar garante que cada
       abertura comece com uma base vazia, isolada por país. Trade-off: se
       fechar e reabrir o modal pro MESMO país sem ter clicado em "Usar esta
       base" antes, o que foi tratado lá dentro se perde — é intencional,
       evita misturar bases entre países por engano. ── */
    const iframe = document.getElementById('embSocialIframe');
    if (iframe) iframe.src = 'ekklesia.html?_t=' + Date.now();
  }

  function _embFecharModalSocial() {
    const modal = document.getElementById('embSocialModal');
    if (modal) modal.style.display = 'none';
    clearTimeout(window._embSolicitarBaseTimeout);
  }

  function _embUsarBaseTratada() {
    const iframe = document.getElementById('embSocialIframe');
    const btn    = document.getElementById('embUsarBaseBtn');
    const status = document.getElementById('embSocialModalStatus');
    if (!iframe || !iframe.contentWindow) return;
    if (btn)    { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Buscando base…'; }
    if (status) status.textContent = '';
    iframe.contentWindow.postMessage({ type: 'embratur:solicitar-base' }, '*');
    // Timeout de segurança — caso o Ekklesia ainda não tenha carregado/escutado
    // (ex: versão do ekklesia.html publicada ainda não tem esse listener)
    clearTimeout(window._embSolicitarBaseTimeout);
    window._embSolicitarBaseTimeout = setTimeout(() => {
      if (btn) { btn.disabled = false; btn.innerHTML = '✅ Usar esta base'; }
      if (status) status.innerHTML = '⚠️ Sem resposta do Ekklesia for Social. Confirme que o <code>ekklesia.html</code> publicado já tem a integração do Diário Embratur, e que a base já foi carregada lá dentro.';
      showToast('⚠️ Sem resposta do Ekklesia for Social — veja o aviso no topo do modal.');
    }, 6000);
  }

  window.addEventListener('message', function (ev) {
    if (!ev.data) return;
    const btn    = document.getElementById('embUsarBaseBtn');
    const status = document.getElementById('embSocialModalStatus');
    if (ev.data.type === 'embratur:base-pronta') {
      clearTimeout(window._embSolicitarBaseTimeout);
      if (btn) { btn.disabled = false; btn.innerHTML = '✅ Usar esta base'; }
      const rows = Array.isArray(ev.data.rows) ? ev.data.rows : [];
      if (!rows.length) {
        if (status) status.textContent = '⚠️ A base do Ekklesia for Social está vazia — suba/filtre alguma fonte lá antes de usar.';
        showToast('⚠️ A base tratada no Ekklesia for Social está vazia.');
        return;
      }
      const { adicionadas, duplicadas } = _embAcumularRows(rows, tabAtual === 'semanal' ? 'semanal' : 'diario');
      showToast(`✅ +${adicionadas} publicações trazidas do Ekklesia for Social (${duplicadas} já existentes)`);
      _embFecharModalSocial();
    } else if (ev.data.type === 'embratur:base-erro') {
      clearTimeout(window._embSolicitarBaseTimeout);
      if (btn) { btn.disabled = false; btn.innerHTML = '✅ Usar esta base'; }
      if (status) status.textContent = '❌ Erro ao obter base: ' + (ev.data.erro || '');
      showToast('❌ Erro ao obter base: ' + (ev.data.erro || ''));
    }
  });

  /* ── Copiar prompt com dados reais ── */
  function _embCopiarPrompt() {
    const kpis = _embState[_embPaisSel]?.kpis;
    if (!kpis) { showToast('⚠️ Suba a base do dia primeiro.'); return; }
    const extra = document.getElementById('embContextoExtra')?.value || '';

    _embState[_embPaisSel].contextoExtra = extra;

  /* ── Baixa um .txt com o prompt + a BASE COMPLETA do país ativo anexada.
       Útil quando a base é grande demais pra colar direto no Gemini —
       sobe o arquivo como anexo junto com o prompt. ── */
  /* ── Download da base consolidada (estado atual após remoções manuais) ── */
  function _embBaixarBaseConsolidada() {
    const rows = _embState[_embPaisSel]?.rows || [];
    if (!rows.length) { showToast('⚠️ Nenhuma publicação na base do país selecionado.'); return; }

    // Cabeçalho alinhado ao formato Brandwatch/Reputaition
    const header = ['Data', 'Canal', 'Publicador', 'Link', 'Interações', 'Seguidores', 'Sentimento', 'Conteúdo', 'Manual'];
    const dados = rows.map(r => [
      r.data || '',
      r.canal || '',
      r.nome_publicador || '',
      r.link_publicacao || '',
      r.interacoes || 0,
      r.seguidores || 0,
      r.sentimento || '',
      r.conteudo || '',
      r._manual ? 'Sim' : 'Não',
    ]);

    const ws = XLSX.utils.aoa_to_sheet([header, ...dados]);
    // Larguras sugeridas
    ws['!cols'] = [12,10,20,40,12,14,12,60,8].map(w => ({ wch: w }));
    const wb = XLSX.utils.book_new();
    const kpis = _embState[_embPaisSel]?.kpis;
    XLSX.utils.book_append_sheet(wb, ws, 'Base');
    const nome = 'embratur_' + _embPaisSel + '_' + (kpis?.data || 'base') + '_consolidada.xlsx';
    XLSX.writeFile(wb, nome);
    showToast('✅ Base consolidada exportada — ' + rows.length + ' publicações.');
  }

  function _embBaixarTXT() {
    const kpis = _embState[_embPaisSel]?.kpis;
    if (!kpis) { showToast('⚠️ Suba a base do dia primeiro.'); return; }
    const extra = document.getElementById('embContextoExtra')?.value || '';
    if (!_embState[_embPaisSel]) _embState[_embPaisSel] = {};
    _embState[_embPaisSel].contextoExtra = extra;
    _embSaveConfig();

    const prompt = _embGerarPrompt(_embPaisSel, kpis, extra);
    const rows   = _embState[_embPaisSel]?.rows || [];
    const linhasCompletas = rows.map((r, i) =>
      `[${i+1}] ${r.canal||'?'} | @${r.nome_publicador||'?'} | ${r.data||'?'} | ${r.interacoes||0} interações${r.tema ? ' | tema: '+r.tema : ''} | "${(r.conteudo||'').replace(/\s+/g,' ').trim()}"`
    ).join('\n');

    const txt = `${prompt}

═══════════════════════════════════════════
BASE COMPLETA — ${rows.length.toLocaleString('pt-BR')} publicações acumuladas
(anexo de referência — a IA pode consultar pra contexto/checagem além das top 20 acima)
═══════════════════════════════════════════
${linhasCompletas}
`;

    const p     = EMBRATUR_PAISES[_embPaisSel];
    const nome  = `embratur_${_embPaisSel}_${kpis.data||'dia'}.txt`;
    const blob  = new Blob([txt], { type: 'text/plain;charset=utf-8' });
    const url   = URL.createObjectURL(blob);
    const a     = document.createElement('a');
    a.href = url;
    a.download = nome;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    showToast(`⬇ ${nome} baixado — suba esse arquivo no Gemini junto com o pedido.`);
  }

  /* ── Importar resposta da IA ── */
  function _embImportarIA() {
    const ta  = document.getElementById('embIAResp');
    const raw = (ta?.value || '').trim();
    if (!raw) { showToast('⚠️ Cole a resposta do Gemini primeiro.'); return; }
    try {
      let cleaned = raw.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
      const m = cleaned.match(/\{[\s\S]*\}/);
      if (!m) throw new Error('JSON não encontrado');
      const obj = JSON.parse(m[0]);
      if (!_embState[_embPaisSel]) _embState[_embPaisSel] = {};
      if (!_embState[_embPaisSel].textos) _embState[_embPaisSel].textos = {};
      ['destaque','atencao','analise','desafios','oportunidades','tendencias','analise_temas'].forEach(k => {
        if (obj[k]) {
          _embState[_embPaisSel].textos[k] = obj[k];
          const el = document.getElementById('emb_txt_'+k);
          if (el) el.value = obj[k];
        }
      });
      _embSaveConfig();
      if (ta) ta.value = '';
      showToast('✅ Textos importados! Revise antes de publicar.');
    } catch(e) {
      showToast('❌ Formato não reconhecido: ' + e.message);
    }
  }

    const state  = _embState[paisCod] || {};

    const textos = state.textos || {};

      data: kpis.data,

      interacoes: fmtNum(kpis.interacoes),

      alcance: kpis.alcance,
      alcanceDelta: _embFmtVar(kpis.varAlcance),
      engMedio: String(kpis.engMedio),
      engMedioDelta: _embFmtVar(kpis.varEngMedio),
      sentPos: String(kpis.sentPos),
      sentFav: String(kpis.sentFav||0),
      sentNeg: String(kpis.sentNeg||0),
      sentDesfav: String(kpis.sentDesfav||0),

      topCanalPct: String(kpis.topCanalPct),

      horaFim:    _embState[paisCod]?.horaFim    || '06:00',

  /* ── Envia um país pra API — reaproveita o token salvo (atualiza o mesmo
       relatório) e guarda o token retornado pra próximas publicações ── */
  async function _embEnviarPais(paisCod) {
    const payload = _embMontarPayload(paisCod);
    if (!payload) throw new Error(`sem base/KPIs calculados`);
    const res  = await fetch('/api/ekklesia/embratur-share', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'erro ao publicar');
    if (data.token !== _embShareToken) {
      _embShareToken = data.token;
      localStorage.setItem('embratur_share_token', _embShareToken);
    }
    return location.origin + '/pages/embratur-diario-share.html?token=' + _embShareToken;
  }

  /* ── Publicar (ou atualizar) só o país ativo no link compartilhado ── */
  window.embPublicar = async function embPublicar() {
    const paisCod = _embPaisSel;
    if (!_embState[paisCod]?.kpis) { showToast('⚠️ Suba a base do dia antes de publicar.'); return; }

    const topBtn  = document.getElementById('publishBtn');
    const topLbl  = document.getElementById('publishBtnLabel');
    const bodyBtn = document.getElementById('embPublishBtn');
    const status  = document.getElementById('embPublishStatus');

    if (topBtn)  topBtn.disabled = true;
    if (topLbl)  topLbl.textContent = 'Publicando…';
    if (bodyBtn) { bodyBtn.disabled = true; bodyBtn.innerHTML = '<span class="spinner"></span> Publicando…'; }
    if (status)  status.textContent = '';

    try {
      const url = await _embEnviarPais(paisCod);
      await navigator.clipboard.writeText(url).catch(() => {});

      if (topLbl)  topLbl.textContent = '🔗 Abrir relatório';
      if (topBtn)  { topBtn.disabled = false; topBtn.onclick = () => window.open(url, '_blank'); }
      if (bodyBtn) { bodyBtn.disabled = false; bodyBtn.innerHTML = EMB_PUBLISH_BTN_DEFAULT_HTML; }
      if (status)  status.innerHTML = '<a href="' + url + '" target="_blank" style="color:var(--orange-2);font-size:11px;text-decoration:none;">🔗 Abrir relatório</a>';
      showToast('✅ Link copiado! Este link já exibe TODOS os países publicados até agora (não só ' + ((EMBRATUR_PAISES||{})[paisCod]?.nome || paisCod) + ').');
      renderEmbraturDiario(); // exibe o botão "Novo link" agora que existe um token
    } catch(e) {
      showToast('❌ Erro ao publicar: ' + e.message);
      if (status)  status.textContent = '';
      if (topBtn)  topBtn.disabled = false;
      if (topLbl)  topLbl.textContent = 'Publicar link';
      if (bodyBtn) { bodyBtn.disabled = false; bodyBtn.innerHTML = EMB_PUBLISH_BTN_DEFAULT_HTML; }
    }
  };

  /* ── Publica todos os países que já têm base + KPIs calculados, no mesmo link ── */
  window.embPublicarTodos = async function embPublicarTodos() {
    const candidatos = Object.keys(_embState).filter(c => _embState[c]?.kpis);
    if (!candidatos.length) { showToast('⚠️ Nenhum país com base/KPIs calculados ainda.'); return; }

    const status = document.getElementById('embPublishStatus');
    showToast(`📡 Publicando ${candidatos.length} país(es)…`);

    let url = null;
    const erros = [];
    for (const c of candidatos) {
      try { url = await _embEnviarPais(c); }
      catch(e) { erros.push(`${(EMBRATUR_PAISES[c]||{}).nome || c}: ${e.message}`); }
    }

    if (url) {
      await navigator.clipboard.writeText(url).catch(() => {});
      if (status) status.innerHTML = '<a href="' + url + '" target="_blank" style="color:var(--orange-2);font-size:11px;text-decoration:none;">🔗 Abrir relatório</a>';
    }
    if (erros.length) {
      showToast(`⚠️ Publicado com ${erros.length} erro(s): ${erros.join('; ')}`);
    } else {
      showToast(`✅ ${candidatos.length} país(es) publicados! Link copiado — um único link pra todos.`);
    }
    renderEmbraturDiario();
  };

  let _embPubsSortField = 'inter';
  let _embPubsSortAsc = false;

  function _embTogglePubsTable() {
    if (!_embState[_embPaisSel]) return;
    _embState[_embPaisSel].pubsTableOpen = !_embState[_embPaisSel].pubsTableOpen;
    const body = document.getElementById('embPubsTableBody');
    const chevron = document.getElementById('embPubsChevron');
    if (body) body.style.display = _embState[_embPaisSel].pubsTableOpen ? '' : 'none';
    if (chevron) chevron.textContent = _embState[_embPaisSel].pubsTableOpen ? '▲' : '▼';
  }

  function _embSortPubs(field) {
    if (_embPubsSortField === field) _embPubsSortAsc = !_embPubsSortAsc;
    else { _embPubsSortField = field; _embPubsSortAsc = false; }
    _embFiltrarPubsTable();
  }

  function _embFiltrarPubsTable() {
    const tbody = document.getElementById('embPubsTbody');
    if (!tbody) return;
    const kpis = _embState[_embPaisSel]?.kpis;
    const allRows = _embState[_embPaisSel]?.rows || [];
    if (!kpis) return;
    const dataRef = kpis.data;
    let rows = allRows.filter(r => (r._dataRel || _embDiaRelatorio(r.data)) === dataRef);
    // Filter
    const sentFilter = document.getElementById('embPubsFilterSent')?.value || '';
    const search = (document.getElementById('embPubsSearch')?.value || '').toLowerCase();
    if (sentFilter === '__sem__') rows = rows.filter(r => !r.sentimento);
    else if (sentFilter) rows = rows.filter(r => r.sentimento === sentFilter);
    if (search) rows = rows.filter(r => (r.nome_publicador||'').toLowerCase().includes(search));
    // Sort
    rows.sort((a,b) => {
      const av = _embPubsSortField === 'seg' ? (a.seguidores||0) : (a.interacoes||0);
      const bv = _embPubsSortField === 'seg' ? (b.seguidores||0) : (b.interacoes||0);
      return _embPubsSortAsc ? av - bv : bv - av;
    });
    tbody.innerHTML = _embPubsRowsHTML(rows);
  }

  function _embEditarSentimentoRow(rowId, newSentimento) {
    const rows = _embState[_embPaisSel]?.rows;
    if (!rows) return;
    const r = rows.find(r => _embIdRow(r) === rowId);
    if (!r) return;
    r.sentimento = newSentimento || null;
    _embState[_embPaisSel].pubsTableOpen = true;
    const st = _embState[_embPaisSel];
    st.kpis = _embCalcEAplicaKPIs(rows, st.imagensManuais);
    const id = _embIdRow(r);
    const dataRel = r._dataRel || _embDiaRelatorio(r.data) || (r.data||'').substring(0, 10);
    if (id && dataRel) {
      fetch('/api/ekklesia/embratur-base', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pais: _embPaisSel, rows: [{ ...r, id, data_rel: dataRel }], force: true }),
      }).catch(() => {});
    }
    renderEmbraturDiario();
    showToast('✅ Sentimento atualizado.');
  }

  function _embTrocarImagemRow(rowId, inputEl) {
    const file = inputEl.files && inputEl.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) { showToast('⚠️ Selecione um arquivo de imagem.'); inputEl.value = ''; return; }
    _embResizeImagem(file, 480, dataUrl => {
      inputEl.value = '';
      if (!dataUrl) { showToast('❌ Não consegui ler essa imagem.'); return; }
      const rows = _embState[_embPaisSel]?.rows;
      if (!rows) return;
      const r = rows.find(r => _embIdRow(r) === rowId);
      if (!r) return;
      r.imagem = dataUrl;
      const id = _embIdRow(r);
      const dataRel = r._dataRel || _embDiaRelatorio(r.data) || (r.data||'').substring(0, 10);
      if (id && dataRel) {
        fetch('/api/ekklesia/embratur-base', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pais: _embPaisSel, rows: [{ ...r, id, data_rel: dataRel }], force: true }),
        }).catch(() => {});
      }
      const st = _embState[_embPaisSel];
      st.kpis = _embCalcEAplicaKPIs(rows, st.imagensManuais);
      st.pubsTableOpen = true;
      renderEmbraturDiario();
      showToast('✅ Print atualizado.');
    });
  }

  function _embRemoverRow(rowId) {
    if (!confirm('Remover esta publicação da base de dados?')) return;
    const rows = _embState[_embPaisSel]?.rows;
    if (!rows) return;
    const idx = rows.findIndex(r => _embIdRow(r) === rowId);
    if (idx < 0) return;
    const r = rows[idx];
    const id = _embIdRow(r);
    if (id) {
      fetch(`/api/ekklesia/embratur-base?pais=${encodeURIComponent(_embPaisSel)}&id=${encodeURIComponent(id)}`, {
        method: 'DELETE',
      }).catch(() => {});
    }
    rows.splice(idx, 1);
    const st = _embState[_embPaisSel];
    st.kpis = _embCalcEAplicaKPIs(rows, st.imagensManuais);
    st.pubsTableOpen = true;
    renderEmbraturDiario();
    showToast('🗑️ Publicação removida da base.');
  }
