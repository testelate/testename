  /* ── Importa JSON do Apify X Profile Viewer e atualiza seguidores em massa ── */
  async function _embImportarApifyJSON(inputEl) {
    const file = inputEl?.files?.[0];
    inputEl.value = '';
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!Array.isArray(data) || !data.length) { showToast('⚠️ JSON inválido ou vazio.'); return; }

      // Monta mapa username → followers_count (case-insensitive)
      const mapa = {};
      data.forEach(p => {
        if (p.username && p.followers_count != null) {
          mapa[p.username.toLowerCase()] = p.followers_count;
        }
      });

      const rows = _embState[_embPaisSel]?.rows;
      if (!rows?.length) { showToast('⚠️ Nenhuma base carregada para este país.'); return; }

      let atualizadas = 0;
      const rowsParaSalvar = [];

      rows.forEach((r, idx) => {
        if (r.seguidores && r.seguidores > 0) return; // já tem seguidores
        const handle = (r.nome_publicador || '').toLowerCase();
        const followers = mapa[handle];
        if (followers == null) return;
        rows[idx].seguidores = followers;
        atualizadas++;
        rowsParaSalvar.push(rows[idx]);
      });

      if (!atualizadas) { showToast('ℹ️ Nenhum handle do JSON casou com publicações sem seguidores.'); return; }

      // Recalcula KPIs
      _embState[_embPaisSel].rows = rows;
      _embState[_embPaisSel].kpis = _embCalcEAplicaKPIs(rows, _embState[_embPaisSel].imagensManuais);
      _embSaveConfig();
      renderEmbraturDiario();
      showToast('✅ ' + atualizadas + ' publicações atualizadas com seguidores do Apify. Salvando no banco…');

      // Persiste todas as rows atualizadas no D1
      const payload = rowsParaSalvar.map(r => {
        const id = _embIdRow(r);
        const dataRel = r._dataRel || _embDiaRelatorio(r.data) || (r.data||'').substring(0,10);
        return { ...r, id, data_rel: dataRel };
      }).filter(r => r.data_rel);

      if (payload.length) {
        fetch('/api/ekklesia/embratur-base', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pais: _embPaisSel, rows: payload, force: true }),
        }).then(() => showToast('✅ Seguidores salvos no banco.')).catch(() => {});
      }
    } catch(e) {
      showToast('❌ Erro ao ler o JSON: ' + e.message);
    }
  }

  /* ── Copia handles sem seguidores para bulk import no Apify ── */
  let _embHandlesOffset = 0;
  function _embCopiarHandlesSemSegs() {
    const rows    = _embState[_embPaisSel]?.rows || [];
    const dataRef = _embState[_embPaisSel]?.kpis?.data;

    // Só as rows de hoje, sem seguidores, canal X
    const semSegs = rows.filter(r =>
      (!r.seguidores || r.seguidores === 0) &&
      r.canal && ['x','twitter','X','Twitter'].includes(r.canal) &&
      r.nome_publicador &&
      (!dataRef || (r._dataRel || _embDiaRelatorio(r.data)) === dataRef)
    );

    const porHandle = {};
    semSegs.forEach(r => {
      const h = r.nome_publicador;
      porHandle[h] = (porHandle[h] || 0) + (r.interacoes || 0);
    });

    const todos = Object.entries(porHandle)
      .sort((a, b) => b[1] - a[1])
      .map(([h]) => h);

    if (!todos.length) {
      showToast('⚠️ Nenhum handle do X sem seguidores encontrado para hoje.');
      _embHandlesOffset = 0;
      return;
    }

    if (_embHandlesOffset >= todos.length) _embHandlesOffset = 0;

    const lote      = todos.slice(_embHandlesOffset, _embHandlesOffset + 10);
    const proximo   = _embHandlesOffset + lote.length;
    const restantes = todos.length - proximo;
    const numLote   = Math.floor(_embHandlesOffset / 10) + 1;
    const totalLotes= Math.ceil(todos.length / 10);

    navigator.clipboard.writeText(lote.join('\n')).then(() => {
      const msg = `📋 Lote ${numLote}/${totalLotes}: ${lote.length} handles copiados`
        + (restantes > 0 ? ` — ${restantes} restantes, clique de novo para o lote ${numLote+1}.` : ' — todos copiados!');
      showToast(msg);
      _embHandlesOffset = proximo < todos.length ? proximo : 0;
    }, () => showToast('❌ Não foi possível copiar.'));
  }

  /* ── Corrigir dia do relatório de um post manual inline ── */
  function _embEditarDiaManual(rowId, novoDataRel) {
    if (!novoDataRel) return;
    const rows = _embState[_embPaisSel]?.rows;
    if (!rows) return;
    const idx = rows.findIndex(r => _embIdRow(r) === rowId);
    if (idx === -1) return;
    const r = rows[idx];
    if (!r._manual) return;
    r._dataRel = novoDataRel;
    r.data = novoDataRel + 'T00:00:00';
    _embState[_embPaisSel].rows = rows;
    _embState[_embPaisSel].kpis = _embCalcEAplicaKPIs(rows, _embState[_embPaisSel].imagensManuais);
    _embSaveConfig();
    // Persiste no D1
    const id = _embIdRow(r);
    fetch('/api/ekklesia/embratur-base', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pais: _embPaisSel, rows: [{ ...r, id, data_rel: novoDataRel }], force: true }),
    }).catch(() => {});
    renderEmbraturDiario();
    showToast('✅ Dia do relatório corrigido para ' + novoDataRel);
    // Reabre a lista após render
    setTimeout(() => {
      const l = document.getElementById('embListaPubs');
      const b = document.getElementById('embListaPubsBtn');
      if (l && b) { l.style.display = 'block'; b.textContent = '▲ ocultar lista'; }
    }, 0);
  }

  /* ── Preencher seguidores faltantes ── */
  function _embSalvarSeguidores(rowId) {
    const input = document.getElementById('embSegs_' + rowId);
    if (!input) return;
    const val = parseInt(input.value, 10);
    if (!val || val <= 0) { showToast('⚠️ Informe um valor válido.'); return; }
    const rows = _embState[_embPaisSel]?.rows;
    if (!rows) return;
    const idx = rows.findIndex(r => _embIdRow(r) === rowId);
    if (idx === -1) return;
    rows[idx].seguidores = val;
    _embState[_embPaisSel].rows = rows;
    _embState[_embPaisSel].kpis = _embCalcEAplicaKPIs(rows, _embState[_embPaisSel].imagensManuais);
    _embSaveConfig();
    // Atualiza no D1 também
    const r = rows[idx];
    const id = _embIdRow(r);
    const dataRel = r._dataRel || _embDiaRelatorio(r.data) || (r.data || '').substring(0, 10);
    console.log('[seguidores] salvando:', { id, dataRel, seguidores: r.seguidores, data: r.data });
    if (id && dataRel) {
      fetch('/api/ekklesia/embratur-base', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pais: _embPaisSel, rows: [{ ...r, id, data_rel: dataRel }], force: true }),
      }).catch(() => {});
    }
    renderEmbraturDiario();
    showToast('✅ Seguidores atualizados — KPIs recalculados.');
  }

  /* ── Remover publicação individual ── */
  function _embRemoverPublicacao(rowId) {
    const rows = _embState[_embPaisSel]?.rows;
    if (!rows) return;
    const idx = rows.findIndex(r => _embIdRow(r) === rowId);
    if (idx === -1) return;
    const removida = rows[idx];
    rows.splice(idx, 1);
    _embState[_embPaisSel].rows = rows;
    _embState[_embPaisSel].kpis = rows.length
      ? _embCalcEAplicaKPIs(rows, _embState[_embPaisSel].imagensManuais)
      : null;
    _embSaveConfig();
    // Remove do D1
    const id = _embIdRow(removida);
    fetch('/api/ekklesia/embratur-base?' + new URLSearchParams({ pais: _embPaisSel, id }), { method: 'DELETE' }).catch(() => {});
    renderEmbraturDiario();
    setTimeout(() => {
      const l = document.getElementById('embListaPubs');
      const b = document.getElementById('embListaPubsBtn');
      if (l && b) { l.style.display = 'block'; b.textContent = '▲ ocultar lista'; }
    }, 0);
  }

  /* ── Post manual ── */
  function _embAbrirModalPostManual() {
    // Pré-preenche com dataRef do país (kpis.data) — é o dia de relatório real calculado
    // a partir das rows acumuladas. Fallback para D-1 se ainda não houver base.
    const kpisData = _embState[_embPaisSel]?.kpis?.data;
    let iso = kpisData || '';
    if (!iso) {
      const d = new Date(); d.setDate(d.getDate() - 1);
      iso = d.toISOString().substring(0, 10);
    }
    document.getElementById('embManualData').value = iso;
    document.getElementById('embManualDataRel').value = iso;
    // Limpa campos anteriores (exceto datas)
    ['embManualLink','embManualHandle','embManualSeguidores','embManualInter','embManualTexto','embManualSentimento'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    document.getElementById('embManualRede').value = '';
    document.getElementById('embModalManual').classList.add('open');
  }

  function _embFecharModalPostManual() {
    document.getElementById('embModalManual').classList.remove('open');
  }

  function _embSalvarPostManual() {
    const link    = (document.getElementById('embManualLink').value || '').trim();
    const rede    = (document.getElementById('embManualRede').value || '').trim();
    const handle  = (document.getElementById('embManualHandle').value || '').trim().replace(/^@+/, '');
    const data    = (document.getElementById('embManualData').value || '').trim();
    const dataRel = (document.getElementById('embManualDataRel').value || '').trim() || data;
    const segs    = toFloat(document.getElementById('embManualSeguidores').value) || 0;
    const inter   = toFloat(document.getElementById('embManualInter').value) || 0;
    const texto   = (document.getElementById('embManualTexto').value || '').trim();

    const sentimento = (document.getElementById('embManualSentimento').value || '').trim();

    if (!link) { showToast('⚠️ O link da publicação é obrigatório.'); return; }
    if (!rede) { showToast('⚠️ Selecione a rede social.'); return; }
    if (!handle) { showToast('⚠️ Informe o handle / perfil.'); return; }

    const dataComHora = data ? (data + 'T00:00:00') : null;

    const row = {
      canal:           rede,
      nome_publicador: handle,
      data:            dataComHora,
      _dataRel:        dataRel || data,  // explícito — sem recorte de hora
      conteudo:        texto.substring(0, 220),
      link_publicacao: link,
      seguidores:      segs,
      interacoes:      inter,
      sentimento:      sentimento,
      imagem:          '',
      _manual:         true,
    };

    const resultado = _embAcumularRows([row], tabAtual === 'semanal' ? 'semanal' : 'diario');
    _embFecharModalPostManual();

    if (resultado.adicionadas > 0) {
      showToast('✅ Post manual adicionado — KPIs recalculados.');
    } else {
      showToast('ℹ️ Post ignorado — já existe uma publicação com esse link.');
    }
  }

  // Fecha modal ao clicar no backdrop — usa delegação no document
  // para não depender de o elemento já existir no DOM ao rodar o script
  document.addEventListener('click', function(e) {
    if (e.target && e.target.id === 'embModalManual') _embFecharModalPostManual();
  });

  /* ── LOGIN ── */
  const EMB_SENHA_HASH = '8b3d5b2e1f4a6c9d0e7f2a5b8c1d4e7f0a3b6c9d2e5f8a1b4c7d0e3f6a9b2c5'; // placeholder — comparação é local
  const EMB_SENHA      = 'embratur';

  function _embVerificarAcesso() {
    const ok = localStorage.getItem('emb_auth') === '1';
    document.getElementById('embLoginOverlay').style.display = ok ? 'none' : 'flex';
    document.getElementById('embConteudo').style.display     = ok ? 'flex' : 'none';
    if (ok) {
      renderEmbraturDiario();
      _embCarregarD1();
    }
  }

  function _embFazerLogin() {
    const val = (document.getElementById('embLoginInput').value || '').trim();
    if (val === EMB_SENHA) {
      localStorage.setItem('emb_auth', '1');
      _embVerificarAcesso();
    } else {
      const msg = document.getElementById('embLoginErro');
      msg.textContent = 'Senha incorreta.';
      document.getElementById('embLoginInput').value = '';
      document.getElementById('embLoginInput').focus();
      setTimeout(() => { msg.textContent = ''; }, 2500);
    }
  }

  document.addEventListener('DOMContentLoaded', function() {
    const inp = document.getElementById('embLoginInput');
    if (inp) inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') _embFazerLogin(); });
    _embVerificarAcesso();
  });

</script>

<!-- Modal: adicionar post manual -->
<div id="embModalManual">
  <div class="emb-modal-box">
    <p class="emb-modal-title">+ Adicionar publicação manualmente</p>

    <div class="emb-modal-field">
      <label class="emb-modal-label">Link da publicação <span class="emb-modal-required">*</span></label>
      <input id="embManualLink" class="emb-modal-input" type="url" placeholder="https://www.instagram.com/p/..." />
    </div>

    <div class="emb-modal-row">
      <div class="emb-modal-field">
        <label class="emb-modal-label">Rede social <span class="emb-modal-required">*</span></label>
        <select id="embManualRede" class="emb-modal-input">
          <option value="">Selecione…</option>
          <option value="instagram">Instagram</option>
          <option value="x">X / Twitter</option>
          <option value="facebook">Facebook</option>
          <option value="youtube">YouTube</option>
          <option value="tiktok">TikTok</option>
          <option value="linkedin">LinkedIn</option>
          <option value="threads">Threads</option>
        </select>
      </div>
      <div class="emb-modal-field">
        <label class="emb-modal-label">Handle / perfil <span class="emb-modal-required">*</span></label>
        <input id="embManualHandle" class="emb-modal-input" type="text" placeholder="@nomeDoCriador" />
      </div>
    </div>

    <div class="emb-modal-row" style="grid-template-columns:1fr 1fr;">
      <div class="emb-modal-field">
        <label class="emb-modal-label">Data de publicação</label>
        <input id="embManualData" class="emb-modal-input" type="date" />
      </div>
      <div class="emb-modal-field">
        <label class="emb-modal-label">Dia do relatório <span style="font-weight:400;opacity:.6;">(normalmente igual à data)</span></label>
        <input id="embManualDataRel" class="emb-modal-input" type="date" />
      </div>
    </div>
    <div class="emb-modal-row">
      <div class="emb-modal-field">
        <label class="emb-modal-label">Seguidores / alcance</label>
        <input id="embManualSeguidores" class="emb-modal-input" type="number" min="0" placeholder="0" />
      </div>
      <div class="emb-modal-field">
        <label class="emb-modal-label">Interações</label>
        <input id="embManualInter" class="emb-modal-input" type="number" min="0" placeholder="0" />
      </div>
    </div>

    <div class="emb-modal-row" style="grid-template-columns:1fr 1fr;">
      <div class="emb-modal-field">
        <label class="emb-modal-label">Sentimento</label>
        <select id="embManualSentimento" class="emb-modal-input">
          <option value="">Não classificado</option>
          <option value="Positivo">Positivo</option>
          <option value="Favoravel">Favorável</option>
          <option value="Desfavoravel">Desfavorável</option>
          <option value="Negativo">Negativo</option>
        </select>
      </div>
      <div class="emb-modal-field" style="align-self:end;">
        <label class="emb-modal-label" style="opacity:.55;font-size:9px;">Impacta o painel de sentimento do relatório</label>
      </div>
    </div>

    <div class="emb-modal-field">
      <label class="emb-modal-label">Texto / legenda</label>
      <textarea id="embManualTexto" class="emb-modal-input" rows="3" placeholder="Trecho da publicação…" style="resize:vertical;"></textarea>
    </div>

    <div class="emb-modal-actions">
      <button class="emb-btn emb-btn-sec" style="font-size:11px;padding:7px 14px;" onclick="_embFecharModalPostManual()">Cancelar</button>
      <button class="emb-btn" style="font-size:11px;padding:7px 16px;background:var(--orange-2,#FF6B35);border-color:var(--orange-2,#FF6B35);color:#fff;" onclick="_embSalvarPostManual()">Adicionar</button>
    </div>
  </div>
</div>

</div><!-- /embConteudo -->
</body>
</html>
