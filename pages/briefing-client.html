<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Diagnóstico personalizado — HUB.nexus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    :root {
      --orange: var(--accent); --orange-2: var(--accent-light);
      --bg: #f5ece0; --text: #3a1200; --sub: #7a4a30; --muted: #c09070;
      --glass: rgba(255,255,255,0.58); --border: rgba(180,100,40,0.18); --t: 0.22s ease;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
    .orb { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; }
    .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, var(--accent) 0%, transparent 65%); opacity: 0.22; top: -160px; right: -80px; animation: drift-1 14s ease-in-out infinite; }
    .orb-2 { width: 380px; height: 380px; background: radial-gradient(circle, #ff8800 0%, transparent 65%); opacity: 0.14; bottom: -100px; left: 60px; animation: drift-2 18s ease-in-out infinite; }
    @keyframes drift-1 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(-40px,28px)} 66%{transform:translate(18px,-20px)} }
    @keyframes drift-2 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(28px,-18px)} 66%{transform:translate(-18px,26px)} }

    header { position: fixed; top: 0; left: 0; right: 0; height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; background: rgba(255,255,255,0.55); backdrop-filter: blur(28px); border-bottom: 1px solid var(--border); z-index: 20; }
    .logo-wrap { display: flex; align-items: center; gap: 9px; }
    .logo-mark { width: 28px; height: 28px; background: linear-gradient(135deg, var(--orange), #cc3300); border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-mark svg { width: 14px; height: 14px; }
    .logo-name { font-size: 13px; font-weight: 500; color: var(--text); letter-spacing: -0.2px; }
    .logo-name span { color: var(--orange); }
    .header-badge { font-size: 11px; color: var(--sub); background: hsla(var(--theme-h),90%,50%,0.08); border: 1px solid hsla(var(--theme-h),90%,50%,0.16); border-radius: 50px; padding: 4px 12px; }

    .progress-bar-wrap { position: fixed; top: 56px; left: 0; right: 0; height: 3px; background: rgba(180,100,40,0.12); z-index: 19; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--orange), var(--orange-2)); transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }

    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 100px 24px 80px; position: relative; z-index: 1; }
    .q-card { width: 100%; max-width: 680px; animation: fadeUp 0.4s cubic-bezier(0.4,0,0.2,1); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .q-step { font-size: 11px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: var(--orange); margin-bottom: 10px; }
    .q-text { font-size: 28px; font-weight: 300; color: var(--text); line-height: 1.3; letter-spacing: -0.8px; margin-bottom: 8px; }
    .q-text strong { font-weight: 600; }
    .q-hint { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }
    .q-info { font-size: 12px; color: var(--sub); background: hsla(var(--theme-h),90%,50%,0.06); border: 1px solid hsla(var(--theme-h),90%,50%,0.14); border-radius: 10px; padding: 10px 14px; margin-bottom: 20px; line-height: 1.5; }
    .q-warn { font-size: 12px; color: #cc4400; background: rgba(255,60,0,0.06); border: 1px solid rgba(255,60,0,0.18); border-radius: 10px; padding: 10px 14px; margin-bottom: 20px; line-height: 1.5; }

    /* Product intro card */
    .product-intro { background: rgba(255,255,255,0.65); border: 1px solid var(--border); border-radius: 20px; padding: 28px; margin-bottom: 28px; backdrop-filter: blur(16px); }
    .product-intro-icon { font-size: 36px; margin-bottom: 12px; }
    .product-intro-title { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .product-intro-desc { font-size: 14px; color: var(--sub); line-height: 1.65; margin-bottom: 16px; }
    .product-intro-bullets { list-style: none; display: flex; flex-direction: column; gap: 7px; }
    .product-intro-bullets li { font-size: 13px; color: var(--sub); display: flex; align-items: flex-start; gap: 8px; }
    .product-intro-bullets li::before { content: '•'; color: var(--orange); font-weight: 700; flex-shrink: 0; margin-top: 1px; }
    .product-intro-time { display: inline-flex; align-items: center; gap: 5px; margin-top: 14px; padding: 5px 10px; background: hsla(var(--theme-h),90%,50%,0.08); border: 1px solid hsla(var(--theme-h),90%,50%,0.18); border-radius: 20px; font-size: 11px; color: var(--orange); }

    .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
    .option { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: var(--glass); border: 1px solid var(--border); border-radius: 14px; cursor: pointer; transition: all var(--t); backdrop-filter: blur(16px); }
    .option:hover { background: rgba(255,255,255,0.80); border-color: hsla(var(--theme-h),90%,50%,0.28); transform: translateX(4px); }
    .option.selected { background: rgba(255,255,255,0.90); border-color: hsla(var(--theme-h),90%,50%,0.50); box-shadow: 0 0 0 3px hsla(var(--theme-h),90%,50%,0.08); }
    .option.voxia-opt { border-color: hsla(var(--theme-h),90%,50%,0.22); background: hsla(var(--theme-h),90%,50%,0.03); }
    .option-key { width: 26px; height: 26px; border-radius: 8px; background: hsla(var(--theme-h),90%,50%,0.10); border: 1px solid hsla(var(--theme-h),90%,50%,0.22); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--orange); flex-shrink: 0; transition: all var(--t); }
    .option.selected .option-key { background: var(--orange); color: #fff; border-color: var(--orange); }
    .option-label { font-size: 14px; font-weight: 400; color: var(--text); line-height: 1.4; }
    .option-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .voxia-badge { display: inline-flex; align-items: center; gap: 4px; background: linear-gradient(90deg,hsla(var(--theme-h),90%,50%,0.15),rgba(180,0,255,0.08)); border: 1px solid hsla(var(--theme-h),90%,50%,0.28); border-radius: 6px; padding: 1px 7px; font-size: 10px; font-weight: 600; color: var(--orange); margin-left: 8px; }

    .check-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
    .check-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 18px; background: var(--glass); border: 1px solid var(--border); border-radius: 14px; cursor: pointer; transition: all var(--t); backdrop-filter: blur(16px); }
    .check-item:hover { background: rgba(255,255,255,0.78); border-color: hsla(var(--theme-h),90%,50%,0.24); }
    .check-item.checked { background: rgba(255,255,255,0.90); border-color: hsla(var(--theme-h),90%,50%,0.45); }
    .check-box { width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid hsla(var(--theme-h),90%,50%,0.35); background: hsla(var(--theme-h),90%,50%,0.05); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; transition: all var(--t); }
    .check-item.checked .check-box { background: var(--orange); border-color: var(--orange); }
    .check-box svg { width: 12px; height: 12px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; opacity: 0; transition: opacity var(--t); }
    .check-item.checked .check-box svg { opacity: 1; }
    .check-label { font-size: 14px; font-weight: 400; color: var(--text); line-height: 1.4; }
    .check-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .dynamic-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .dynamic-item { display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; }
    .dynamic-input { flex: 1; min-width: 120px; padding: 11px 14px; background: rgba(255,255,255,0.60); border: 1px solid var(--border); border-radius: 10px; font-size: 13px; color: var(--text); font-family: 'Inter', sans-serif; outline: none; transition: all var(--t); }
    .dynamic-input:focus { background: rgba(255,255,255,0.82); border-color: hsla(var(--theme-h),90%,50%,0.38); box-shadow: 0 0 0 3px hsla(var(--theme-h),90%,50%,0.07); }
    .dynamic-input.error { border-color: rgba(255,60,0,0.40) !important; }
    .dynamic-input.url { flex: 1.1; }
    .dynamic-remove { width: 30px; height: 30px; border-radius: 8px; background: rgba(255,60,0,0.07); border: 1px solid rgba(255,60,0,0.15); color: #cc3300; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all var(--t); font-family: 'Inter', sans-serif; margin-top: 4px; }
    .dynamic-remove:hover { background: rgba(255,60,0,0.14); }
    .add-btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; background: hsla(var(--theme-h),90%,50%,0.08); border: 1px dashed hsla(var(--theme-h),90%,50%,0.30); border-radius: 10px; font-size: 12px; color: var(--orange); cursor: pointer; font-family: 'Inter', sans-serif; transition: all var(--t); margin-bottom: 20px; }
    .add-btn:hover { background: hsla(var(--theme-h),90%,50%,0.14); }
    .cols2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 8px; }
    @media (max-width: 560px) { .cols2 { grid-template-columns: 1fr; } }
    .section-label { font-size: 12px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .counter-hint { font-size: 11px; color: var(--muted); margin-bottom: 14px; }

    /* Atributo com explicação */
    .attr-item { margin-bottom: 12px; }
    .attr-row { display: flex; align-items: center; gap: 8px; }
    .attr-explain { padding: 8px 12px; background: rgba(255,255,255,0.45); border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; font-size: 11px; color: var(--sub); line-height: 1.5; }
    .attr-explain-inp { width: 100%; background: transparent; border: none; outline: none; font-size: 11px; color: var(--sub); font-family: 'Inter', sans-serif; resize: none; line-height: 1.5; }
    .attr-explain-inp::placeholder { color: var(--muted); }
    .attr-name-inp { flex: 1; padding: 10px 13px; background: rgba(255,255,255,0.60); border: 1px solid var(--border); border-radius: 8px 8px 0 0; font-size: 13px; color: var(--text); font-family: 'Inter', sans-serif; outline: none; transition: all var(--t); }
    .attr-name-inp:focus { background: rgba(255,255,255,0.82); border-color: hsla(var(--theme-h),90%,50%,0.38); }
    .attr-name-inp.error { border-color: rgba(255,60,0,0.40) !important; }

    .prompt-add-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .prompt-add-row input { flex: 1; padding: 12px 16px; background: rgba(255,255,255,0.62); border: 1px solid var(--border); border-radius: 12px; font-size: 13px; color: var(--text); font-family: 'Inter', sans-serif; outline: none; transition: all var(--t); }
    .prompt-add-row input:focus { background: rgba(255,255,255,0.85); border-color: hsla(var(--theme-h),90%,50%,0.40); box-shadow: 0 0 0 3px hsla(var(--theme-h),90%,50%,0.08); }
    .prompt-add-row button { padding: 0 18px; background: hsla(var(--theme-h),90%,50%,0.12); border: 1px solid hsla(var(--theme-h),90%,50%,0.28); border-radius: 12px; font-size: 12px; font-weight: 500; color: var(--orange); cursor: pointer; font-family: 'Inter', sans-serif; transition: all var(--t); white-space: nowrap; }
    .prompt-add-row button:hover { background: hsla(var(--theme-h),90%,50%,0.22); }
    .prompt-card { padding: 12px 16px; background: rgba(255,255,255,0.55); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
    .prompt-card p { font-size: 13px; color: var(--text); line-height: 1.45; flex: 1; margin: 0; }
    .prompt-del { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; flex-shrink: 0; padding: 0 4px; transition: color var(--t); font-family: 'Inter', sans-serif; }
    .prompt-del:hover { color: #cc3300; }
    .error-msg { font-size: 12px; color: #cc3300; margin-top: 8px; background: rgba(255,60,0,0.06); border: 1px solid rgba(255,60,0,0.18); border-radius: 8px; padding: 8px 12px; }

    .review-box { background: rgba(255,255,255,0.55); border: 1px solid var(--border); border-radius: 16px; padding: 18px 20px; margin-bottom: 14px; }
    .review-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    .review-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 13px; }
    .review-key { color: var(--muted); min-width: 120px; flex-shrink: 0; }
    .review-val { color: var(--text); line-height: 1.45; }
    .review-tag { display: inline-block; padding: 2px 8px; background: hsla(var(--theme-h),90%,50%,0.10); border: 1px solid hsla(var(--theme-h),90%,50%,0.20); border-radius: 6px; font-size: 11px; color: var(--orange); margin: 2px 2px 0 0; }

    .free-wrap { position: relative; margin-bottom: 20px; }
    .free-input { width: 100%; min-height: 140px; padding: 16px 18px; background: var(--glass); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 16px; font-size: 14px; color: var(--text); font-family: 'Inter', sans-serif; outline: none; resize: vertical; transition: all var(--t); line-height: 1.6; }
    .free-input.single { min-height: 48px; resize: none; padding: 14px 18px; }
    .free-input::placeholder { color: var(--muted); }
    .free-input:focus { background: rgba(255,255,255,0.82); border-color: hsla(var(--theme-h),90%,50%,0.42); box-shadow: 0 0 0 3px hsla(var(--theme-h),90%,50%,0.08); }
    .free-input.limit-warn { border-color: rgba(200,80,0,0.50) !important; box-shadow: 0 0 0 3px rgba(200,80,0,0.09) !important; }
    .char-counter { display: flex; justify-content: flex-end; margin-top: 5px; font-size: 10px; color: var(--muted); transition: color .2s; }
    .char-counter.warn { color: #cc4400; font-weight: 600; }

    /* Card de pergunta aberta no estilo wizard */
    .q-field-card { background: rgba(255,255,255,0.60); border: 1.5px solid hsla(var(--theme-h),90%,50%,0.18); border-radius: 18px; padding: 22px 22px 16px; margin-bottom: 16px; backdrop-filter: blur(16px); transition: border-color .2s, box-shadow .2s; }
    .q-field-card:focus-within { border-color: hsla(var(--theme-h),90%,50%,0.45); box-shadow: 0 0 0 3px hsla(var(--theme-h),90%,50%,0.07); }
    .q-field-num { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--orange); margin-bottom: 6px; }
    .q-field-label { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 4px; line-height: 1.4; }
    .q-field-hint { font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
    .q-field-card .free-input { border: none; border-radius: 10px; background: rgba(255,255,255,0.55); box-shadow: inset 0 1px 3px rgba(180,100,40,0.07); min-height: 110px; font-size: 13px; }
    .q-field-card .free-input:focus { background: rgba(255,255,255,0.88); box-shadow: none; border: none; }

    /* Botão Finalizar — destaque total */
    .btn-finalizar { display: inline-flex; align-items: center; justify-content: center; gap: 10px; padding: 16px 36px; background: linear-gradient(135deg, var(--orange), #cc3300); border: none; border-radius: 14px; font-size: 15px; font-weight: 600; color: #fff; cursor: pointer; font-family: 'Inter', sans-serif; transition: all .22s; box-shadow: 0 6px 24px hsla(var(--theme-h),90%,50%,0.32); letter-spacing: -0.2px; width: 100%; margin-top: 8px; }
    .btn-finalizar:hover { transform: translateY(-2px); box-shadow: 0 10px 32px hsla(var(--theme-h),90%,50%,0.42); }
    .btn-finalizar:active { transform: translateY(0); }
    .btn-finalizar svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .finalizar-note { font-size: 11px; color: var(--muted); text-align: center; margin-top: 10px; line-height: 1.5; }

    /* Social links */
    .social-link-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .social-platform-tag { min-width: 90px; padding: 8px 10px; background: rgba(255,255,255,0.60); border: 1px solid var(--border); border-radius: 8px; font-size: 11px; font-weight: 600; color: var(--sub); text-align: center; }
    .social-link-inp { flex: 1; padding: 9px 13px; background: rgba(255,255,255,0.55); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; color: var(--text); font-family: 'Inter', sans-serif; outline: none; transition: all var(--t); }
    .social-link-inp:focus { background: rgba(255,255,255,0.82); border-color: hsla(var(--theme-h),90%,50%,0.38); }

    .nav-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .btn-next { display: inline-flex; align-items: center; gap: 7px; padding: 12px 24px; background: rgba(255,255,255,0.65); border: 1px solid hsla(var(--theme-h),90%,50%,0.35); border-radius: 12px; font-size: 13px; font-weight: 500; color: var(--accent-dark); cursor: pointer; font-family: 'Inter', sans-serif; transition: all var(--t); backdrop-filter: blur(12px); }
    .btn-next:hover { background: rgba(255,255,255,0.88); transform: translateY(-1px); box-shadow: 0 4px 16px hsla(var(--theme-h),90%,50%,0.12); }
    .btn-next svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .btn-back { padding: 12px 16px; background: transparent; border: 1px solid var(--border); border-radius: 12px; font-size: 13px; color: var(--muted); cursor: pointer; font-family: 'Inter', sans-serif; transition: all var(--t); }
    .btn-back:hover { background: rgba(255,255,255,0.55); color: var(--sub); }
    .nav-hint { font-size: 11px; color: var(--muted); margin-left: 4px; }

    .result-card { width: 100%; max-width: 660px; animation: fadeUp 0.5s cubic-bezier(0.4,0,0.2,1); }
    .result-icon { width: 56px; height: 56px; border-radius: 16px; background: hsla(var(--theme-h),90%,50%,0.12); border: 1px solid hsla(var(--theme-h),90%,50%,0.25); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
    .result-icon svg { width: 26px; height: 26px; fill: none; stroke: var(--orange); stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .result-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: var(--orange); margin-bottom: 10px; }
    .result-title { font-size: 32px; font-weight: 300; color: var(--text); letter-spacing: -1px; line-height: 1.2; margin-bottom: 16px; }
    .result-title strong { font-weight: 600; }
    .result-body { font-size: 14px; color: var(--sub); line-height: 1.75; margin-bottom: 28px; max-width: 500px; }
    .result-box { background: var(--glass); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 16px; padding: 20px 22px; margin-bottom: 24px; }
    .result-box-title { font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 12px; }
    .result-points { display: flex; flex-direction: column; gap: 10px; }
    .result-point { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: var(--sub); line-height: 1.5; }
    .rp-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--orange); flex-shrink: 0; margin-top: 6px; }
    .result-footer { font-size: 11px; color: var(--muted); line-height: 1.6; padding-top: 16px; border-top: 1px solid var(--border); }
    .result-footer a { color: var(--orange); text-decoration: none; }

    /* ── Botão de Ajuda flutuante ── */
    .help-fab { position: fixed; bottom: 72px; right: 20px; width: 42px; height: 42px; border-radius: 50%; background: var(--orange); border: none; cursor: pointer; box-shadow: 0 4px 16px hsla(var(--theme-h),90%,50%,0.40); display: flex; align-items: center; justify-content: center; z-index: 150; transition: all .2s; font-family: 'Inter', sans-serif; }
    .help-fab:hover { transform: scale(1.08); box-shadow: 0 6px 22px hsla(var(--theme-h),90%,50%,0.52); }
    .help-fab svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Painel de Ajuda ── */
    .help-panel-overlay { position: fixed; inset: 0; background: rgba(40,15,0,0.50); backdrop-filter: blur(10px); z-index: 400; display: flex; align-items: flex-end; justify-content: flex-end; padding: 0; animation: fadeInOverlay .2s ease; }
    @media (min-width: 600px) { .help-panel-overlay { align-items: center; justify-content: flex-end; padding: 24px; } }
    .help-panel { background: rgba(255,248,240,0.98); border: 1px solid hsla(var(--theme-h),90%,50%,0.18); border-radius: 24px 24px 0 0; width: 100%; max-width: 440px; max-height: 85vh; overflow-y: auto; padding: 28px 26px 36px; box-shadow: 0 -12px 48px rgba(80,20,0,0.18); animation: slideUpPanel .25s cubic-bezier(0.4,0,0.2,1); }
    @media (min-width: 600px) { .help-panel { border-radius: 24px; max-height: 80vh; animation: slideUpBox .22s cubic-bezier(0.4,0,0.2,1); } }
    @keyframes slideUpPanel { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .help-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
    .help-panel-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .help-close { background: none; border: none; cursor: pointer; padding: 4px; color: var(--muted); font-size: 20px; line-height: 1; font-family: 'Inter', sans-serif; transition: color .15s; }

    /* Tabs do painel */
    .help-tabs { display: flex; gap: 6px; margin-bottom: 20px; }

    .help-tab.active { background: var(--orange); border-color: var(--orange); color: #fff; }
    /* Tutorial steps */
    .tut-step { display: flex; gap: 14px; margin-bottom: 18px; align-items: flex-start; }
    .tut-num { width: 28px; height: 28px; border-radius: 50%; background: var(--orange); color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .tut-body h4 { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .tut-body p { font-size: 12px; color: var(--sub); line-height: 1.6; margin: 0; }
    .tut-tip { font-size: 11px; color: var(--orange); background: hsla(var(--theme-h),90%,50%,0.07); border: 1px solid hsla(var(--theme-h),90%,50%,0.18); border-radius: 7px; padding: 6px 10px; margin-top: 6px; display: inline-block; }
    /* FAQ */
    .faq-item { border-bottom: 1px solid var(--border); padding: 14px 0; }
    .faq-item:last-child { border-bottom: none; }
    .faq-q { font-size: 13px; font-weight: 500; color: var(--text); cursor: pointer; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; line-height: 1.45; }
    .faq-q .faq-icon { flex-shrink: 0; font-size: 16px; transition: transform .2s; margin-top: 1px; }
    .faq-item.open .faq-icon { transform: rotate(45deg); }
    .faq-a { font-size: 12px; color: var(--sub); line-height: 1.7; margin-top: 10px; display: none; }
    .faq-item.open .faq-a { display: block; }

    footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 32px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.45); backdrop-filter: blur(20px); border-top: 1px solid var(--border); z-index: 10; }
    .footer-text { font-size: 11px; color: var(--muted); }
    .footer-text a { color: var(--sub); text-decoration: none; }
    .footer-lock { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); }
    .footer-lock svg { width: 11px; height: 11px; fill: none; stroke: var(--muted); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .toast { position: fixed; bottom: 60px; right: 20px; background: rgba(20,10,2,0.92); border: 1px solid rgba(255,255,255,0.09); border-radius: 10px; padding: 10px 16px; font-size: 11px; color: rgba(255,210,180,0.9); z-index: 200; opacity: 0; transform: translateY(8px); transition: all 0.3s; pointer-events: none; max-width: 300px; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .divider { height: 1px; background: var(--border); margin: 20px 0; }
    /* Modal de confirmação de navegação */
    .confirm-overlay { position: fixed; inset: 0; background: rgba(40,15,0,0.55); backdrop-filter: blur(8px); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 24px; animation: fadeInOverlay .18s ease; }
    @keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
    .confirm-box { background: rgba(255,248,240,0.97); border: 1px solid hsla(var(--theme-h),90%,50%,0.22); border-radius: 20px; padding: 28px 28px 22px; max-width: 400px; width: 100%; box-shadow: 0 24px 64px rgba(80,20,0,0.22); animation: slideUpBox .22s cubic-bezier(0.4,0,0.2,1); }
    @keyframes slideUpBox { from { transform: translateY(18px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .confirm-icon { font-size: 28px; margin-bottom: 10px; }
    .confirm-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 8px; line-height: 1.3; }
    .confirm-desc { font-size: 13px; color: var(--sub); line-height: 1.6; margin-bottom: 8px; }
    .confirm-saved { font-size: 11px; color: #cc5500; background: hsla(var(--theme-h),90%,50%,0.07); border: 1px solid hsla(var(--theme-h),90%,50%,0.18); border-radius: 8px; padding: 7px 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 6px; }
    .confirm-actions { display: flex; gap: 10px; }
    .confirm-btn { flex: 1; padding: 11px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; font-family: 'Inter', sans-serif; cursor: pointer; transition: all .18s; }
    .confirm-btn-cancel { background: rgba(255,255,255,0.75); border: 1px solid rgba(180,100,40,0.22); color: var(--sub); }
    .confirm-btn-cancel:hover { background: rgba(255,255,255,0.95); }
    .confirm-btn-go { background: var(--orange); border: 1px solid var(--orange); color: #fff; box-shadow: 0 3px 12px hsla(var(--theme-h),90%,50%,0.28); }
    .confirm-btn-go:hover { background: #e55b00; transform: translateY(-1px); }
    /* ── Gerador de prompt de apoio ── */
    .prompt-gen-btn { display:flex;align-items:center;gap:6px;width:100%;padding:10px 14px;margin-bottom:10px;background:linear-gradient(135deg,hsla(var(--theme-h),90%,50%,0.08),hsla(var(--theme-h),90%,50%,0.04));border:1px dashed hsla(var(--theme-h),90%,50%,0.35);border-radius:12px;font-size:12px;font-weight:600;color:var(--orange);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;text-align:left; }
    .prompt-gen-btn:hover { background:hsla(var(--theme-h),90%,50%,0.13);border-style:solid; }
    .prompt-gen-modal { position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px); }
    .prompt-gen-box { background:#fff8f4;border-radius:18px;width:100%;max-width:580px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,0.18); }
    .prompt-gen-header { padding:18px 20px 14px;border-bottom:1px solid hsla(var(--theme-h),90%,50%,0.12);display:flex;align-items:flex-start;justify-content:space-between;gap:12px; }
    .prompt-gen-header-text h3 { font-size:14px;font-weight:700;color:var(--text);margin:0 0 3px; }
    .prompt-gen-header-text p { font-size:11px;color:var(--muted);margin:0;line-height:1.4; }
    .prompt-gen-close { background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0; }
    .prompt-gen-body { padding:16px 20px;overflow-y:auto;flex:1; }
    .prompt-gen-label { font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--orange);margin-bottom:8px; }
    .prompt-gen-textarea { width:100%;min-height:260px;padding:14px;background:#fff;border:1px solid hsla(var(--theme-h),90%,50%,0.2);border-radius:12px;font-size:12px;font-family:'Inter',sans-serif;color:var(--text);line-height:1.65;resize:vertical;outline:none;box-sizing:border-box; }
    .prompt-gen-textarea:focus { border-color:hsla(var(--theme-h),90%,50%,0.45);box-shadow:0 0 0 3px hsla(var(--theme-h),90%,50%,0.08); }
    .prompt-gen-footer { padding:12px 20px 16px;border-top:1px solid hsla(var(--theme-h),90%,50%,0.1);display:flex;gap:8px;align-items:center; }
    .prompt-gen-copy { flex:1;padding:10px;background:var(--orange);border:none;border-radius:10px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .15s; }
    .prompt-gen-copy:hover { opacity:.88; }
    .prompt-gen-copy.copied { background:#55aa66; }
    .prompt-gen-hint { font-size:11px;color:var(--muted);line-height:1.5;max-width:220px; }

    /* ── Avaliador de prompt ── */
    .prompt-eval-box { margin-top: 8px; margin-bottom: 4px; border-radius: 12px; overflow: hidden; border: 1px solid hsla(var(--theme-h),90%,50%,0.25); background: hsla(var(--theme-h),90%,50%,0.04); animation: fadeInEval .2s ease; }
    @keyframes fadeInEval { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
    .prompt-eval-loading { padding: 10px 14px; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
    .prompt-eval-loading::before { content:''; display:inline-block; width:10px; height:10px; border:2px solid hsla(var(--theme-h),90%,50%,0.3); border-top-color:var(--orange); border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .prompt-eval-content { padding: 10px 14px; }
    .prompt-eval-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .prompt-eval-label.good { color: #55aa66; }
    .prompt-eval-label.bad  { color: var(--orange); }
    .prompt-eval-suggestion { font-size: 12px; color: var(--text); line-height: 1.5; background: rgba(255,255,255,0.5); border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; font-style: italic; }
    .prompt-eval-reason { font-size: 11px; color: var(--muted); line-height: 1.4; margin-bottom: 8px; }
    .prompt-eval-actions { display: flex; gap: 6px; }
    .prompt-eval-use { padding: 5px 12px; background: hsla(var(--theme-h),90%,50%,0.15); border: 1px solid hsla(var(--theme-h),90%,50%,0.35); border-radius: 8px; font-size: 11px; font-weight: 600; color: var(--orange); cursor: pointer; font-family: 'Inter', sans-serif; transition: background .15s; }
    .prompt-eval-use:hover { background: hsla(var(--theme-h),90%,50%,0.28); }
    .prompt-eval-dismiss { padding: 5px 10px; background: none; border: 1px solid var(--border); border-radius: 8px; font-size: 11px; color: var(--muted); cursor: pointer; font-family: 'Inter', sans-serif; transition: color .15s; }
    .prompt-eval-dismiss:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <header>
    <div class="logo-wrap">
      <div class="logo-mark">
        <svg viewBox="0 0 15 15" fill="none">
          <rect x="1" y="1" width="5.5" height="5.5" rx="1.5" fill="white" opacity=".95"/>
          <rect x="8.5" y="1" width="5.5" height="5.5" rx="1.5" fill="white" opacity=".5"/>
          <rect x="1" y="8.5" width="5.5" height="5.5" rx="1.5" fill="white" opacity=".5"/>
          <rect x="8.5" y="8.5" width="5.5" height="5.5" rx="1.5" fill="white" opacity=".95"/>
        </svg>
      </div>
      <span class="logo-name">HUB<span>.</span>nexus</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <button id="btnSalvarRascunho" onclick="salvarRascunho()" title="Salvar progresso e continuar depois"
        style="display:none;align-items:center;gap:5px;
          background:var(--accent);color:#fff;border:none;border-radius:8px;
          padding:6px 13px;font-size:11px;font-weight:600;font-family:inherit;
          cursor:pointer;box-shadow:0 2px 8px hsla(var(--theme-h),90%,50%,0.35);transition:all .2s;white-space:nowrap;">
        <svg viewBox="0 0 24 24" style="width:12px;height:12px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;">
          <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
        </svg>
        Salvar e continuar depois
      </button>
      <div class="header-badge" id="headerBadge">Diagnóstico personalizado</div>
    </div>
  </header>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <main><div id="screen"></div></main>
  <footer>
    <div class="footer-text">Suas respostas são <strong>confidenciais</strong> e usadas apenas para personalizar nossa proposta. <a href="#">Política de privacidade</a></div>
    <div class="footer-lock">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      Conexão segura
    </div>
  </footer>
  <div class="toast" id="toast"></div>
  <div id="confirmOverlay" style="display:none;"></div>
  <button class="help-fab" onclick="openHelp()" title="Ajuda e dúvidas" id="helpFab">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
  </button>
  <div id="helpPanelOverlay" style="display:none;"></div>

  <script>
  /* ══════════════════════════════════════════════
     ESTADO GLOBAL
  ══════════════════════════════════════════════ */
  let navHistory = [];
  let current = 'abertura';
  let respostas = {};
  let produtoParam = null;

  // Estado Vox.ia — imagem/autoridade
  let vx = {
    tipo: '',           // 'marca' | 'porta-voz'
    empresa: '',
    site: '',
    objetivo_diagnostico: '',
    objetivos: [],
    concorrentes: [{ nome:'', site:'' }, { nome:'', site:'' }, { nome:'', site:'' }, { nome:'', site:'' }, { nome:'', site:'' }],
    atributos_pos: [{ nome:'', explicacao:'' }, { nome:'', explicacao:'' }, { nome:'', explicacao:'' }, { nome:'', explicacao:'' }, { nome:'', explicacao:'' }],
    atributos_neg: [{ nome:'', explicacao:'' }, { nome:'', explicacao:'' }, { nome:'', explicacao:'' }, { nome:'', explicacao:'' }, { nome:'', explicacao:'' }],
    narrativa: '',
    prompts_b: [],
    prompts_u: [],
    nuances: '',
    email: '',
  };

  // Estado Vox.ia — temático
  let vxt = {
    tema: '',
    objetivo_diagnostico: '',
    aprofundamento: '',
    partes_tema: '',
    objetivos: [],
    prompts: [],
    nuances: '',
    email: '',
  };

  let isErrataMode = false;
  let briefingId = null;
  let errataFields = {};
  let errataSequence = [];
  let currentErrataIdx = 0;

  /* ══════════════════════════════════════════════
     HELPERS
  ══════════════════════════════════════════════ */
  function makeTextarea(placeholder, storageKey, minHeight, isSingle) {
    const wrap = document.createElement('div');
    wrap.className = 'free-wrap';
    const ta = document.createElement(isSingle ? 'input' : 'textarea');
    ta.className = 'free-input' + (isSingle ? ' single' : '');
    ta.placeholder = placeholder;
    ta.value = respostas[storageKey] || '';
    if (!isSingle) {
      ta.maxLength = 500;
      ta.style.minHeight = (minHeight || 140) + 'px';
      // Contador de caracteres
      const counter = document.createElement('div');
      counter.className = 'char-counter';
      const updateCounter = () => {
        const rem = 500 - ta.value.length;
        counter.textContent = `${ta.value.length}/500`;
        counter.classList.toggle('warn', rem < 80);
        ta.classList.toggle('limit-warn', rem < 20);
      };
      ta.addEventListener('input', () => { if (storageKey) respostas[storageKey] = ta.value; updateCounter(); });
      updateCounter();
      wrap.appendChild(ta);
      wrap.appendChild(counter);
    } else {
      ta.addEventListener('input', () => { if (storageKey) respostas[storageKey] = ta.value; });
      wrap.appendChild(ta);
    }
    return { wrap, ta };
  }

  /* Cria um card estilo wizard para uma pergunta aberta */
  function mkFieldCard(num, label, hint, placeholder, storageKey) {
    const card = document.createElement('div');
    card.className = 'q-field-card';
    card.innerHTML = `
      <div class="q-field-num">Pergunta ${num}</div>
      <div class="q-field-label">${label}</div>
      ${hint ? `<div class="q-field-hint">${hint}</div>` : ''}
    `;
    const { wrap, ta } = makeTextarea(placeholder, storageKey, 110);
    card.appendChild(wrap);
    return { card, ta };
  }

  function mkCard(step, texto, hint) {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.innerHTML = `<div class="q-step">${step}</div><div class="q-text">${texto}</div><div class="q-hint">${hint}</div>`;
    return card;
  }

  function mkOptions(opts, stateKey, onClick) {
    const el = document.createElement('div');
    el.className = 'options';
    opts.forEach(op => {
      const div = document.createElement('div');
      div.className = 'option' + (respostas[stateKey] === op.label ? ' selected' : '') + (op.voxia ? ' voxia-opt' : '');
      div.innerHTML = `<div class="option-key">${op.key}</div><div>
        <div class="option-label">${op.label}${op.voxia ? '<span class="voxia-badge">✦ Vox.ia</span>' : ''}</div>
        ${op.desc ? `<div class="option-desc">${op.desc}</div>` : ''}</div>`;
      div.addEventListener('click', () => {
        respostas[stateKey] = op.label;
        el.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        div.classList.add('selected');
        if (onClick) setTimeout(() => onClick(op), 280);
      });
      el.appendChild(div);
    });
    return el;
  }

  function mkNextBtn(label) {
    const btn = document.createElement('button');
    btn.className = 'btn-next';
    btn.innerHTML = `${label} <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>`;
    return btn;
  }

  function mkBackBtn() {
    const btn = document.createElement('button');
    btn.className = 'btn-back';
    btn.textContent = '← Voltar';
    btn.addEventListener('click', goBack);
    return btn;
  }

  function addNav(card, showBack, backFn, nextFn, isChoice) {
    const nav = document.createElement('div');
    nav.className = 'nav-row';
    if (showBack) { const b = mkBackBtn(); if (backFn) b.addEventListener('click', backFn); nav.appendChild(b); }
    if (nextFn) { const n = mkNextBtn('Confirmar'); n.addEventListener('click', nextFn); nav.appendChild(n); }
    if (isChoice) { const h = document.createElement('span'); h.className = 'nav-hint'; h.textContent = 'ou clique em uma opção'; nav.appendChild(h); }
    card.appendChild(nav);
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(window._t);
    window._t = setTimeout(() => el.classList.remove('show'), 3500);
  }

  /* ══════════════════════════════════════════════
     PRODUCT INTRO CARD BUILDER
  ══════════════════════════════════════════════ */
  function mkProductIntro({ icon, titulo, descricao, bullets, tempo }) {
    const el = document.createElement('div');
    el.className = 'product-intro';
    el.innerHTML = `
      <div class="product-intro-icon">${icon}</div>
      <div class="product-intro-title">${titulo}</div>
      <div class="product-intro-desc">${descricao}</div>
      <ul class="product-intro-bullets">${bullets.map(b => `<li>${b}</li>`).join('')}</ul>
      ${tempo ? `<div class="product-intro-time">⏱ ${tempo}</div>` : ''}
    `;
    return el;
  }

  /* ══════════════════════════════════════════════
     FLUXO PRINCIPAL
  ══════════════════════════════════════════════ */
  const PRODUTO_ROUTES = {
    'voxia_imagem':         'vx_identificacao',
    'voxia_tema':           'vxt_identificacao',
    'mapa_narrativas':      'prod_mapa_narrativas',
    'mapa_influenciadores': 'prod_mapa_influenciadores',
    'netnografia':          'prod_netnografia',
  };


  function goTo(id) {
    // Mostra confirmação apenas se a tela atual tem campos de texto preenchidos
    // (não em telas de múltipla escolha onde o clique já é a própria resposta)
    const hasFilledFields = (() => {
      const screen = document.getElementById('screen');
      if (!screen) return false;
      const textareas = screen.querySelectorAll('textarea, input[type="text"], input:not([type])');
      return Array.from(textareas).some(el => el.value && el.value.trim().length > 10);
    })();

    // Só pede confirmação se: está no meio do fluxo + tem texto preenchido na tela
    if (navHistory.length > 0 && hasFilledFields) {
      showNavigationConfirm(() => _doGoTo(id));
    } else {
      _doGoTo(id);
    }
  }

  function _doGoTo(id) {
    if (isErrataMode) {
      currentErrataIdx++;
      if (currentErrataIdx < errataSequence.length) { navHistory.push(current); current = errataSequence[currentErrataIdx]; }
      else { finalizarErrata(); return; }
    } else {
      navHistory.push(current); current = id;
    }
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    // Toast de auto-save ao avançar
    if (navHistory.length > 1) {
      toast('✅ Progresso salvo — você pode voltar aqui depois');
    }
  }

  function showNavigationConfirm(onConfirm) {
    const ov = document.getElementById('confirmOverlay');
    ov.style.display = 'flex';
    ov.innerHTML = `
      <div class="confirm-overlay" onclick="if(event.target===this)closeConfirm()">
        <div class="confirm-box">

  // ── Avaliador de qualidade de prompt — validação local, sem API ──
  function avaliarPrompt(valor, tipo, empresa, container, onUsar) {
    container.innerHTML = '';
    if (!valor || valor.length < 10) return;

    const v = valor.trim();
    const vLow = v.toLowerCase();
    const empLow = (empresa || '').toLowerCase();

    // ── Regras baseadas em boas práticas de engenharia de prompts ──
    const problemas = [];

    // 1. Perguntas indutivas com validação sim/não (viés de complacência)
    const indutivos = [/^é verdade que/i, /^é correto (dizer|afirmar)/i, /^(é|foi) considerad[ao]/i, /^(é|foi) reconhecid[ao]/i, /^(tem sido|é) (visto|visto) como/i];
    if (indutivos.some(r => r.test(v))) {
      problemas.push({ tipo: 'indutivo', msg: 'Perguntas que começam com "É considerada…" ou "É verdade que…" tendem a induzir confirmação. Prefira começar com "Como", "Quais" ou "De que forma".' });
    }

    // 2. Superlativos absolutos sem critério (melhor, pior, mais X, menos X)
    const superlativos = /\b(o melhor|a melhor|os melhores|as melhores|o pior|a pior|o mais |a mais |o menos |a menos |número 1|#1)\b/i;
    if (superlativos.test(v)) {
      problemas.push({ tipo: 'superlativo', msg: 'Superlativos como "o melhor" ou "o mais confiável" sem critério de comparação forçam a IA a eleger um vencedor. Tente adicionar um contexto: "considerando X e Y".' });
    }

    // 3. Branded: pergunta não tem o nome da empresa
    if (tipo === 'branded' && empLow && !vLow.includes(empLow)) {
      problemas.push({ tipo: 'sem_empresa', msg: `O nome "${empresa}" precisa aparecer na pergunta para que a IA avalie especificamente a marca.` });
    }

    // 4. Unbranded: pergunta menciona a empresa
    if (tipo === 'unbranded' && empLow && vLow.includes(empLow)) {
      problemas.push({ tipo: 'tem_empresa', msg: `Remova "${empresa}" desta pergunta — o objetivo é medir presença orgânica no setor, sem citar a marca diretamente.` });
    }

    // 5. Pergunta muito curta / vaga (menos de 6 palavras)
    if (v.split(/\s+/).length < 6) {
      problemas.push({ tipo: 'vaga', msg: 'A pergunta está muito curta. Adicione contexto: setor, critério ou dimensão que deseja avaliar.' });
    }

    // 6. Unbranded singular sem critério ("Qual é o banco que...")
    if (tipo === 'unbranded' && /^qual é o\b/i.test(v) && !/considerando|em termos|em relação|comparando/i.test(v)) {
      problemas.push({ tipo: 'singular', msg: 'Perguntas no singular ("Qual é o banco que...") forçam a IA a escolher um único vencedor. Prefira o plural: "Quais bancos..." e adicione critérios de comparação.' });
    }

    // 7. Pergunta sem ponto de interrogação (pode ser afirmação, não pergunta)
    if (!v.includes('?')) {
      problemas.push({ tipo: 'nao_pergunta', msg: 'Certifique-se de que é uma pergunta — as IAs respondem melhor a interrogações claras.' });
    }

    if (problemas.length === 0) return; // Tudo certo, sem comentário

    // Exibe apenas o problema mais relevante
    const principal = problemas[0];

    // Gera sugestão de reformulação automática para casos simples
    let sugestao = '';
    if (principal.tipo === 'superlativo' && tipo === 'branded') {
      sugestao = v.replace(superlativos, '').replace(/\s+/g, ' ').trim();
      sugestao = `Como ${empresa} é avaliada ${sugestao.replace(/^(em|para|como|no|na)\s*/i, 'em termos de ')}?`;
    } else if (principal.tipo === 'singular' && tipo === 'unbranded') {
      sugestao = v.replace(/^qual é o\b/i, 'Quais são os principais').replace(/\?/, ' no Brasil?');
    } else if (principal.tipo === 'indutivo') {
      sugestao = v.replace(/^é verdade que\s*/i, 'De que forma ').replace(/^(é|foi) considerad[ao]\s*/i, 'Como é avaliad').replace(/\?/, ' pelo mercado?');
    }

    // Monta o card de sugestão
    const box = document.createElement('div'); box.className = 'prompt-eval-box';
    const inner = document.createElement('div'); inner.className = 'prompt-eval-content';

    const label = document.createElement('div');
    label.className = 'prompt-eval-label bad';
    label.innerHTML = '💡 Temos uma sugestão para você';
    inner.appendChild(label);

    const reason = document.createElement('div'); reason.className = 'prompt-eval-reason';
    reason.textContent = principal.msg; inner.appendChild(reason);

    if (sugestao && sugestao !== v) {
      const sug = document.createElement('div'); sug.className = 'prompt-eval-suggestion';
      sug.textContent = `"${sugestao}"`; inner.appendChild(sug);

      const actions = document.createElement('div'); actions.className = 'prompt-eval-actions';
      const useBtn = document.createElement('button'); useBtn.className = 'prompt-eval-use';
      useBtn.textContent = '↑ Usar esta versão';
      useBtn.addEventListener('click', () => { onUsar(sugestao); container.innerHTML = ''; });
      const dismissBtn = document.createElement('button'); dismissBtn.className = 'prompt-eval-dismiss';
      dismissBtn.textContent = 'Manter a minha';
      dismissBtn.addEventListener('click', () => { container.innerHTML = ''; });
      actions.appendChild(useBtn); actions.appendChild(dismissBtn); inner.appendChild(actions);
    } else {
      const dismissBtn = document.createElement('button'); dismissBtn.className = 'prompt-eval-dismiss';
      dismissBtn.textContent = 'Entendi';
      dismissBtn.addEventListener('click', () => { container.innerHTML = ''; });
      inner.appendChild(dismissBtn);
    }

    box.appendChild(inner); container.appendChild(box);
  }

    return `Você é um especialista em engenharia de prompts para análise de narrativas em IAs generativas.

Preciso de ajuda para criar perguntas abertas de qualidade sobre um tema específico, para serem testadas em modelos de IA como ChatGPT, Gemini e Copilot. O objetivo é capturar como as IAs entendem e representam este tema organicamente.

━━ SOBRE O TEMA ━━
Tema: ${tema}${aprofund ? `\nContexto / aprofundamento: ${aprofund}` : ''}${partes ? `\nAspectos do tema: ${partes}` : ''}${objs ? `\nObjetivos da análise: ${objs}` : ''}

━━ REGRAS OBRIGATÓRIAS ━━
• NÃO mencione marcas, empresas ou organizações específicas nas perguntas
• Use framing aberto: "O que", "Como", "Quais", "De que forma", "Por que"
• PROIBIDO: perguntas indutivas ("É verdade que...?", "É correto dizer...?")
• PROIBIDO: superlativos sem critério ("o melhor", "o mais importante")
• Cada pergunta deve ser neutra o suficiente para qualquer IA responder livremente
• Varie os ângulos: histórico, técnico, social, econômico, cultural
• Termine cada pergunta com "?"

━━ TAREFA ━━
Gere 25 perguntas temáticas abertas de alta qualidade sobre "${tema}" seguindo essas regras.

  function abrirModalGeradorTematico() {

      <p>Copie, cole em qualquer IA (ChatGPT, Gemini, Copilot…) e receba 25 perguntas prontas sobre o tema.</p>`;
    const closeBtn = document.createElement('button'); closeBtn.className = 'prompt-gen-close'; closeBtn.textContent = '×';

    body.appendChild(lbl); body.appendChild(ta); box.appendChild(body);

    const copyBtn = document.createElement('button'); copyBtn.className = 'prompt-gen-copy'; copyBtn.textContent = '📋 Copiar prompt';
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(texto).then(() => {
        copyBtn.textContent = '✓ Copiado!'; copyBtn.classList.add('copied');

      if (!allLinks.length) { toast('Informe ao menos um link de comunidade ou rede social.'); return false; }
      // Validate all filled links
      const invalid = allLinks.find(v => !isValidUrl(v.trim()));
      if (invalid) { toast(`Link inválido: "${invalid}" — deve começar com https://`); return false; }
      return true;
    });

  // Social links renderer (reusável)
  function isValidUrl(val) {
    const v = val.trim();
    if (!v) return true; // empty is ok (optional)
    // Must start with http:// or https://
    if (!/^https?:\/\//i.test(v)) return false;
    try { new URL(v); return true; } catch(e) { return false; }
  }

  function renderSocialLinks(card, stateKey, customLinks, validateUrls) {
    // stateKey stores: { 'Instagram': ['url1', 'url2'], 'LinkedIn': ['url1'], ... }
    respostas[stateKey] = respostas[stateKey] || {};
    const defaults = customLinks || [
      { label:'Instagram', placeholder:'https://instagram.com/...' },
      { label:'LinkedIn', placeholder:'https://linkedin.com/company/...' },
      { label:'X / Twitter', placeholder:'https://x.com/...' },
      { label:'Facebook', placeholder:'https://facebook.com/...' },
      { label:'YouTube', placeholder:'https://youtube.com/...' },
    ];

    const wrap = document.createElement('div'); wrap.style.marginBottom = '20px';

    defaults.forEach(item => {
      // Migrate old string format to array
      if (typeof respostas[stateKey][item.label] === 'string') {
        respostas[stateKey][item.label] = respostas[stateKey][item.label]
          ? [respostas[stateKey][item.label]] : [''];
      }
      if (!respostas[stateKey][item.label]) respostas[stateKey][item.label] = [''];

      const groupEl = document.createElement('div');
      groupEl.style.marginBottom = '10px';

      function renderGroup() {
        groupEl.innerHTML = '';
        const arr = respostas[stateKey][item.label];
        arr.forEach((val, idx) => {
          const row = document.createElement('div'); row.className = 'social-link-row';
          row.style.marginBottom = '4px';
          const tag = document.createElement('div'); tag.className = 'social-platform-tag';
          tag.textContent = idx === 0 ? item.label : '';
          tag.style.opacity = idx === 0 ? '1' : '0';

          const inp = document.createElement('input'); inp.className = 'social-link-inp';
          inp.placeholder = item.placeholder; inp.value = val;
          inp.addEventListener('input', () => {
            respostas[stateKey][item.label][idx] = inp.value;
            if (validateUrls && inp.value.trim() && !isValidUrl(inp.value.trim())) {
              inp.style.borderColor = 'rgba(255,60,0,0.45)';
              inp.title = 'Insira um link válido (ex: https://...)';
            } else {
              inp.style.borderColor = '';
              inp.title = '';
            }
          });

          row.appendChild(tag); row.appendChild(inp);

          // Remove button (only if more than 1)
          if (arr.length > 1) {
            const del = document.createElement('button');
            del.style.cssText = 'width:26px;height:26px;border-radius:6px;background:rgba(255,60,0,0.07);border:1px solid rgba(255,60,0,0.15);color:#cc3300;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:inherit;';
            del.textContent = '×';
            del.addEventListener('click', () => { respostas[stateKey][item.label].splice(idx, 1); renderGroup(); });
            row.appendChild(del);
          }

          groupEl.appendChild(row);
        });

        // "+ Adicionar" per platform
        const addBtn = document.createElement('button');
        addBtn.style.cssText = 'margin-left:98px;padding:3px 10px;background:hsla(var(--theme-h),90%,50%,0.06);border:1px dashed hsla(var(--theme-h),90%,50%,0.25);border-radius:6px;font-size:11px;color:var(--orange);cursor:pointer;font-family:inherit;transition:all .2s;';
        addBtn.textContent = '+ Adicionar outro ' + item.label;
        addBtn.onmouseenter = () => { addBtn.style.background = 'hsla(var(--theme-h),90%,50%,0.12)'; };
        addBtn.onmouseleave = () => { addBtn.style.background = 'hsla(var(--theme-h),90%,50%,0.06)'; };
        addBtn.addEventListener('click', () => { respostas[stateKey][item.label].push(''); renderGroup(); });
        groupEl.appendChild(addBtn);
      }

      renderGroup();
      wrap.appendChild(groupEl);
    });

    card.appendChild(wrap);

    // Return a validate function callers can use
    return {
      validate: () => {
        if (!validateUrls) return true;
        let ok = true;
        defaults.forEach(item => {
          (respostas[stateKey][item.label] || []).forEach(val => {
            if (val.trim() && !isValidUrl(val.trim())) ok = false;
          });
        });
        return ok;
      }
    };
  }

  /* ══════════════════════════════════════════════
     SALVAR NO D1
  ══════════════════════════════════════════════ */
  async function salvarBriefing(email, nome) {
    const TITULOS = {
      'voxia_imagem': 'Vox.IA — Imagem & Autoridade',
      'voxia_tema':   'Vox.IA — Análise Temática',
      'mapa_narrativas': 'Mapa de Narrativas',
      'mapa_influenciadores': 'Mapa de Influenciadores',
      'netnografia': 'Netnografia',
    };

    // Determine effective product — in errata mode produtoParam is null,
    // so we fall back to what was stored in respostas when the briefing was first created.
    const produtoEfetivo = produtoParam
      || respostas.produto
      || (respostas.tipo_vox === 'imagem' ? 'voxia_imagem' : null)
      || (respostas.tipo_vox === 'tema'   ? 'voxia_tema'   : null);

    // In errata mode, vx/vxt are already populated from init() restore.
    // Use the stored tipo_vox to decide which object to serialize.
    const tipoVox = respostas.tipo_vox || (vxt.tema ? 'tema' : vx.empresa ? 'imagem' : null);
    const isVoxTema   = produtoEfetivo === 'voxia_tema'   || tipoVox === 'tema';
    const isVoxImagem = produtoEfetivo === 'voxia_imagem' || tipoVox === 'imagem';

    const titulo = TITULOS[produtoEfetivo]
      || (isVoxImagem ? 'Vox.IA — Imagem & Autoridade'
        : isVoxTema   ? 'Vox.IA — Análise Temática'
        : { imprensa:'Monitoramento de Imprensa', redes:'Inteligência de Redes Sociais',
            diagnostico:'Diagnóstico Especial', bi:'Business Intelligence' }[respostas.trilha]
        || 'Diagnóstico Estratégico');

    let dadosRespostas;
    if (isVoxTema) {
      dadosRespostas = {
        tema: vxt.tema, objetivo_diagnostico: vxt.objetivo_diagnostico,
        aprofundamento: vxt.aprofundamento, partes_tema: vxt.partes_tema,
        objetivos: vxt.objetivos, prompts: vxt.prompts, nuances: vxt.nuances,
        produto: 'voxia_tema', tipo_vox: 'tema',
      };
    } else if (isVoxImagem) {
      dadosRespostas = {
        tipo: vx.tipo, empresa: vx.empresa, site: vx.site,
        objetivo_diagnostico: vx.objetivo_diagnostico,
        objetivos: vx.objetivos, narrativa: vx.narrativa,
        concorrentes: vx.concorrentes.filter(c => c.nome),
        atributos_pos: vx.atributos_pos.filter(a => a.nome),
        atributos_neg: vx.atributos_neg.filter(a => a.nome),
        prompts_b: vx.prompts_b, prompts_u: vx.prompts_u,
        nuances: vx.nuances,
        produto: 'voxia_imagem', tipo_vox: 'imagem',
      };
    } else {
      // Generic / other products — just send respostas as-is
      dadosRespostas = { ...respostas, produto: produtoEfetivo || respostas.produto };
    }

    const payload = {
      nome:         nome || (email ? email.split('@')[0] : 'Cliente'),
      email:        (email || '').toLowerCase().trim(),
      recomendacao: titulo,
      respostas:    dadosRespostas,
    };

    try {
      const method = isErrataMode ? 'PUT' : 'POST';
      const url    = isErrataMode ? `/api/briefing/${briefingId}` : '/api/briefing';
      // In errata mode, send which fields were corrected so the API
      // can build the historico snapshot even if errata was already cleared in D1
      const body   = isErrataMode
        ? { ...payload, errata: {}, lido: false, _errata_save: true, _campos_corrigidos: errataSequence }
        : payload;


      const resp = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!resp.ok) { const err = await resp.json().catch(()=>({})); console.warn('[salvarBriefing] error:', err); }
    } catch(e) { console.warn('[salvarBriefing] fetch error:', e); }
  }

  /* ── RASCUNHO: salva/restaura via D1 com token persistente ── */
  let rascunhoToken = null; // token do rascunho atual
  const RASCUNHO_LS_KEY = 'hub_rascunho_token'; // localStorage p/ lembrar o token

  function buildEstado() {
    return {
      current,
      navHistory,
      respostas: JSON.parse(JSON.stringify(respostas)),
      vx:  JSON.parse(JSON.stringify(vx)),
      vxt: JSON.parse(JSON.stringify(vxt)),
      produtoParam,
    };
  }

  function aplicarEstado(estado) {
    if (!estado) return false;
    current     = estado.current     || 'abertura';
    navHistory  = estado.navHistory  || [];
    respostas   = estado.respostas   || {};
    if (estado.vx)  Object.assign(vx,  estado.vx);
    if (estado.vxt) Object.assign(vxt, estado.vxt);
    if (estado.produtoParam) produtoParam = estado.produtoParam;
    return true;
  }

  async function salvarRascunho() {
    const btn = document.getElementById('btnSalvarRascunho');
    if (btn) { btn.textContent = '⏳ Salvando...'; btn.style.opacity = '.7'; btn.disabled = true; }

    try {
      const estado = buildEstado();
      let res, data;

      if (rascunhoToken) {
        // Atualiza rascunho existente
        res  = await fetch(`/api/rascunho/${rascunhoToken}`, {
          method:  'PUT',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ produto: produtoParam || 'generico', estado }),
        });
        data = await res.json();
      } else {
        // Cria novo rascunho
        res  = await fetch('/api/rascunho', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ produto: produtoParam || 'generico', estado }),
        });
        data = await res.json();
        if (data.token) {
          rascunhoToken = data.token;
          try { localStorage.setItem(RASCUNHO_LS_KEY, JSON.stringify({ token: rascunhoToken, produto: produtoParam, ts: Date.now() })); } catch(e) {}
        }
      }

      if (!data.ok) throw new Error(data.error || 'Erro desconhecido');

      // Monta link de retomada
      const base = window.location.origin + window.location.pathname;
      const link = `${base}?produto=${produtoParam || ''}&rascunho=${rascunhoToken}`;

      // Copia link e mostra modal
      try { await navigator.clipboard.writeText(link); } catch(e) {}
      mostrarModalRascunho(link);

    } catch(e) {
      toast('❌ Erro ao salvar. Verifique sua conexão.');
      console.error('Rascunho save error:', e);
    } finally {
      if (btn) { btn.textContent = '💾 Salvar e continuar depois'; btn.style.opacity = '1'; btn.disabled = false; }
    }
  }

  function mostrarModalRascunho(link) {
    // Remove modal anterior se existir
    document.getElementById('modalRascunho')?.remove();

    const overlay = document.createElement('div');
    overlay.id = 'modalRascunho';
    overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.45);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px;';

    overlay.innerHTML = `
      <div style="background:#fff;border-radius:20px;padding:28px;width:min(480px,100%);box-shadow:0 24px 60px rgba(0,0,0,0.2);position:relative;">
        <div style="font-size:28px;margin-bottom:12px;">✅</div>
        <div style="font-size:16px;font-weight:700;color:#3a1200;margin-bottom:6px;">Progresso salvo!</div>
        <div style="font-size:13px;color:#7a4a30;line-height:1.6;margin-bottom:20px;">
          Guarde o link abaixo para continuar de onde parou — em qualquer dispositivo, a qualquer momento. O link é válido por <strong>7 dias</strong>.
        </div>
        <div style="background:#f5ece0;border:1px solid rgba(180,100,40,0.2);border-radius:10px;padding:12px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px;">
          <code id="linkRascunho" style="font-size:11px;color:#3a1200;word-break:break-all;flex:1;line-height:1.5;">${link}</code>
          <button onclick="copiarLinkRascunho()" style="flex-shrink:0;padding:6px 12px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;" id="btnCopiarLink">Copiar</button>
        </div>
        <div style="font-size:11px;color:#c09070;margin-bottom:20px;">💡 O link já foi copiado para a área de transferência. Salve também por e-mail ou WhatsApp para não perder.</div>
        <button onclick="document.getElementById('modalRascunho').remove()" style="width:100%;padding:12px;background:#3a1200;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Continuar preenchendo</button>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  }

  function copiarLinkRascunho() {
    const link = document.getElementById('linkRascunho')?.textContent;
    if (!link) return;
    navigator.clipboard.writeText(link).then(() => {
      const btn = document.getElementById('btnCopiarLink');
      if (btn) { btn.textContent = '✓ Copiado!'; btn.style.background = '#55aa66'; setTimeout(() => { btn.textContent = 'Copiar'; btn.style.background = 'var(--accent)'; }, 2000); }
    });
  }

  async function restaurarRascunhoRemoto(token) {
    try {
      const res  = await fetch(`/api/rascunho/${token}`);
      if (!res.ok) return false;
      const data = await res.json();
      if (!data.ok || !data.estado) return false;
      rascunhoToken = token;
      return aplicarEstado(data.estado);
    } catch(e) { return false; }
  }

        { q: 'Preciso responder tudo de uma vez?', a: 'Não. Use o botão <strong>"Salvar e continuar depois"</strong> no topo da página para salvar e gerar um link de retorno. Você pode terminar em outro momento.' },
        { q: 'O que acontece depois que envio o briefing?', a: 'Nossa equipe recebe suas respostas e prepara uma proposta personalizada. Em até <strong>2 dias úteis</strong> você receberá o contato de um especialista.' },
        { q: 'Minhas respostas são confidenciais?', a: 'Sim. As informações fornecidas são usadas exclusivamente pela equipe HUB.nexus para elaborar sua proposta. Nada é compartilhado com terceiros.' },
        { q: 'Não sei responder alguma pergunta. O que faço?', a: 'Responda com o que souber — não há certo ou errado. Se realmente não tiver a informação, deixe o campo em branco ou escreva "não sei" para sinalizarmos na proposta.' },
        { q: 'Posso preencher por conta de outra pessoa ou empresa?', a: 'Sim. Preencha com as informações da empresa ou pessoa que você representa. Na etapa final, coloque seu e-mail de contato para receber a proposta.' },
      ];
      el.innerHTML = faqs.map((f, i) => `
        <div class="faq-item" id="faq${i}">
          <div class="faq-q" onclick="toggleFaq(${i})">
            <span>${f.q}</span>
            <span class="faq-icon">+</span>
          </div>
          <div class="faq-a">${f.a}</div>
        </div>`).join('');
    }
  }

  function toggleFaq(i) {
    const item = document.getElementById('faq' + i);
    if (!item) return;
    item.classList.toggle('open');
  }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    briefingId = params.get('id');
    isErrataMode = params.get('errata') === 'true' && !!briefingId;
    produtoParam = params.get('produto') || null;

    // Show save button for direct product links
    if (produtoParam && !isErrataMode) {
      const btn = document.getElementById('btnSalvarRascunho');
      if (btn) btn.style.display = 'flex';
    }

    // Restore draft from D1 if ?rascunho=TOKEN present, or from localStorage token
    if (!isErrataMode && !params.get('novo')) {
      const tokenFromUrl = params.get('rascunho');
      const tokenFromLS  = (() => {
        try {
          const saved = JSON.parse(localStorage.getItem(RASCUNHO_LS_KEY) || 'null');
          // Only use LS token if produto matches and less than 7 days old
          if (saved && saved.token && saved.produto === produtoParam && Date.now() - saved.ts < 7*24*60*60*1000) return saved.token;
        } catch(e) {}
        return null;
      })();
      const token = tokenFromUrl || tokenFromLS;
      if (token) {
        const restored = await restaurarRascunhoRemoto(token);
        if (restored) {
          const btn = document.getElementById('btnSalvarRascunho');
          if (btn) btn.style.display = 'flex';
          render();
          return;
        }
        // Token inválido/expirado — limpa localStorage e segue normalmente
        try { localStorage.removeItem(RASCUNHO_LS_KEY); } catch(e) {}
      }
    }

    if (isErrataMode) {
      try {
        const res = await fetch(`/api/briefing/${briefingId}`);
        if (!res.ok) throw new Error('Não foi possível carregar o briefing.');
        const data = await res.json();
        if (data.respostas) {
          respostas = data.respostas;
          const raw = data.respostas;
          // Restore vx state from stored data so errata fields show previous answers
          if (raw.empresa || raw.tipo || raw.tipo_vox === 'imagem') {
            if (raw.tipo)           vx.tipo           = raw.tipo;
            if (raw.empresa)        vx.empresa        = raw.empresa;
            if (raw.site)           vx.site           = raw.site;
            if (raw.objetivo_diagnostico) vx.objetivo_diagnostico = raw.objetivo_diagnostico;
            if (raw.objetivos)      vx.objetivos      = raw.objetivos;
            if (raw.narrativa)      vx.narrativa      = raw.narrativa;
            if (raw.concorrentes)   vx.concorrentes   = raw.concorrentes;
            if (raw.atributos_pos)  vx.atributos_pos  = raw.atributos_pos.map(a => typeof a === 'string' ? {nome:a,explicacao:''} : a);
            if (raw.atributos_neg)  vx.atributos_neg  = raw.atributos_neg.map(a => typeof a === 'string' ? {nome:a,explicacao:''} : a);
            if (raw.prompts_b)      vx.prompts_b      = raw.prompts_b;
            if (raw.prompts_u)      vx.prompts_u      = raw.prompts_u;
            if (raw.nuances)        vx.nuances        = raw.nuances;
            if (raw.email)          vx.email          = raw.email;
          }
          if (raw.tipo_vox === 'tema' || raw.tema) {
            if (raw.tema)                vxt.tema                = raw.tema;
            if (raw.objetivo_diagnostico) vxt.objetivo_diagnostico = raw.objetivo_diagnostico;
            if (raw.aprofundamento)      vxt.aprofundamento      = raw.aprofundamento;
            if (raw.partes_tema)         vxt.partes_tema         = raw.partes_tema;
            if (raw.objetivos)           vxt.objetivos           = raw.objetivos;
            if (raw.prompts)             vxt.prompts             = raw.prompts;
            if (raw.nuances)             vxt.nuances             = raw.nuances;
            if (raw.email)               vxt.email               = raw.email;
          }
        }
        errataFields = data.errata || {};
        console.log('[errata init] data.errata recebido:', JSON.stringify(data.errata));
        console.log('[errata init] data.respostas keys:', Object.keys(data.respostas || {}));
        const fullSeq = ['abertura','vx_identificacao','vx_objetivos','vx_concorrentes','vx_atributos',
          'vx_branded','vx_unbranded','vx_narrativa','vx_finalizacao',
          'vxt_identificacao','vxt_aprofundamento','vxt_objetivos','vxt_prompts','vxt_finalizacao',
          'captura_email'];
        errataSequence = fullSeq.filter(s => errataFields[s]);
        if (errataSequence.length > 0) {
          current = errataSequence[0]; currentErrataIdx = 0;
          const badge = document.getElementById('headerBadge');
          if (badge) { badge.textContent = `✏ Correção solicitada (${errataSequence.length} campo${errataSequence.length > 1 ? 's' : ''})`; badge.style.color = '#cc4400'; }
          document.title = 'Correção de briefing — HUB.nexus';
        } else {
          // errata field is empty — may have been already corrected or link is stale
          isErrataMode = false;
          toast('⚠️ Nenhuma correção pendente neste briefing. Carregando normalmente.');
        }
      } catch(e) { toast('Conexão instável. Modo padrão ativo.'); isErrataMode = false; }
    }
    render();
  }

  init();
  </script>
</body>
</html>
