<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embratur — Monitoramento diário</title>
<style>
  /* ── Variáveis de tema ── */
  :root {
    --bg-page:       #EFEDE6;
    --bg-surface:    #FFFFFF;
    --bg-card:       #F6F4ED;
    --bg-topbar:     #FFFFFF;
    --bg-nav:        #FFFFFF;
    --bg-pill:       #F6F4ED;
    --bg-input:      #FAFAF8;
    --bg-gate:       #EFEDE6;
    --bg-gate-card:  #FFFFFF;
    --border:        #DEDCD3;
    --text-primary:  #1A1A18;
    --text-secondary:#5F5E5A;
    --text-muted:    #888780;
    --text-error:    #A32D2D;
    --trend-bg:      #FAECE7;
    --trend-title:   #4A1B0C;
    --trend-text:    #712B13;
    --trend-icon:    #D85A30;
    --chall-bg:      #FAEEDA;
    --chall-title:   #412402;
    --chall-text:    #633806;
    --chall-icon:    #854F0B;
    --opport-bg:     #EAF3DE;
    --opport-title:  #173404;
    --opport-text:   #27500A;
    --opport-icon:   #3B6D11;
    --delta-up:      #0F6E56;
    --delta-down:    #A32D2D;
    --spinner-track: #DEDCD3;
    --post-card-bg:  #FFFFFF;
    /* highlight — fallback laranja (sobrescrito por país no JS) */
    --highlight-bg:     #FFF0E8;
    --highlight-border: #FF5800;
    --highlight-text:   #7A2800;
    --highlight-icon:   #FF5800;
    /* atenção — amarelo-âmbar de alerta (substitui o cinza neutro) */
    --attention-bg:     #FEF3DC;
    --attention-border: #F2A40C;
    --attention-text:   #7A4D02;
    --attention-icon:   #D98C00;
    /* top3 */
    --top3-reach-badge:  #FF5800;
    --top3-engage-badge: #CC4600;
    --top3-reach-value:  #CC4600;
    --top3-engage-value: #FF7A33;
  }
  html.dark {
    --bg-page:       #0F1117;
    --bg-surface:    #1A1D27;
    --bg-card:       #22263A;
    --bg-topbar:     #13151F;
    --bg-nav:        #13151F;
    --bg-pill:       #1E2130;
    --bg-input:      #1E2130;
    --bg-gate:       #0F1117;
    --bg-gate-card:  #1A1D27;
    --border:        #2E3248;
    --text-primary:  #E8E6F0;
    --text-secondary:#9A98B0;
    --text-muted:    #6B6985;
    --text-error:    #F07070;
    --trend-bg:      #2A1A14;
    --trend-title:   #F4C9B8;
    --trend-text:    #D9967A;
    --trend-icon:    #D85A30;
    --chall-bg:      #2A1E0A;
    --chall-title:   #F5D5A8;
    --chall-text:    #C9954A;
    --chall-icon:    #D4820F;
    --opport-bg:     #0E2010;
    --opport-title:  #B8E8BC;
    --opport-text:   #6DC275;
    --opport-icon:   #4CAF58;
    --delta-up:      #4ABA8E;
    --delta-down:    #F07070;
    --spinner-track: #2E3248;
    --post-card-bg:  #22263A;
    /* highlight dark — fallback laranja */
    --highlight-bg:     #2A1200;
    --highlight-border: #FF5800;
    --highlight-text:   #FFB380;
    --highlight-icon:   #FF7A33;
    /* atenção dark — âmbar de alerta */
    --attention-bg:     #2E2206;
    --attention-border: #F2A40C;
    --attention-text:   #FFD37A;
    --attention-icon:   #F5B23A;
    /* top3 dark */
    --top3-reach-badge:  #FF5800;
    --top3-engage-badge: #CC4600;
    --top3-reach-value:  #FF7A33;
    --top3-engage-value: #FFB380;
  }

  * { box-sizing: border-box; }

  /* ── Tela de loading / erro ── */
  body {
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg-page);
    margin: 0; padding: 0;
    transition: background .2s, color .2s;
  }
  .state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: calc(100vh - 90px); gap: 12px; color: var(--text-muted); font-size: 13px; text-align: center;
    padding: 24px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--spinner-track); border-top-color: #FF5800;
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Barra superior ── */
  .topbar { background: var(--bg-topbar); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; position: sticky; top: 0; z-index: 100; }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-sep { width: 1px; height: 16px; background: var(--border); }
  .topbar-right { display: flex; gap: 8px; align-items: center; }
  .btn-copy {
    padding: 7px 14px; background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: 6px; font-size: 12px; font-weight: 500; color: var(--text-secondary);
    cursor: pointer; font-family: inherit; transition: all .15s;
  }
  .btn-copy:hover { border-color: var(--text-muted); }
  .btn-theme {
    width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg-surface); cursor: pointer; display: flex; align-items: center;
    justify-content: center; font-size: 15px; transition: all .15s; flex-shrink: 0;
  }
  .btn-theme:hover { border-color: var(--text-muted); }
  .btn-pdf {
    padding: 7px 16px; border: none; border-radius: 6px;
    font-size: 12px; font-weight: 600; color: #fff;
    cursor: pointer; font-family: inherit; transition: all .15s;
    background: var(--header-bg, #FF5800);
  }
  .btn-pdf:hover { opacity: .88; }

  /* ── Wrapper do relatório ── */
  /* ── Canvas de fundo animado ── */
  #bgCanvas {
    position: fixed; inset: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .report-wrap { padding: 12px 20px 60px; position: relative; z-index: 1; }
  #reportWrap > .topbar,
  #reportWrap > .country-nav { z-index: 10; }

  /* ── Página do relatório ── */
  .page {
    background: var(--bg-surface); border: 0.5px solid var(--border);
    border-radius: 12px; overflow: hidden;
    max-width: 960px; margin: 0 auto;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10);
  }

  /* ── Hero header (novo estilo Monitor Diário) ── */
  /* ── Hero com fotos de fundo rotativas ── */
  .report-hero {
    position: relative; overflow: hidden; min-height: 210px;
  }
  .hero-bg-photos {
    position: absolute; inset: 0;
    display: grid; grid-template-columns: 1fr;
  }
  .hero-bg-slot { position: relative; overflow: hidden; background: #14171f; }
  .hero-bg-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: opacity .6s ease;
    will-change: opacity;
  }
  .hero-overlay {
    position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(135deg, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.50) 55%, rgba(0,0,0,0.38) 100%);
  }
  .hero-top {
    position: relative; z-index: 2;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 20px;
    padding: 1.75rem 2rem 0;
  }
  .hero-title-block { display: flex; flex-direction: column; gap: 4px; }
  .hero-bracket-top {
    display: block; width: 22px; height: 22px;
    border-top: 3px solid #FF5800; border-left: 3px solid #FF5800; margin-bottom: 8px;
  }
  .hero-bracket-bottom {
    display: block; width: 22px; height: 22px;
    border-bottom: 3px solid rgba(255,255,255,0.6); border-right: 3px solid rgba(255,255,255,0.6);
    margin-top: 6px; align-self: flex-end;
  }
  .hero-label { font-size: 11px; font-weight: 700; letter-spacing: .1em; color: rgba(255,255,255,0.55); text-transform: uppercase; margin: 0 0 4px; }
  .hero-line1 { font-size: 36px; font-weight: 800; color: #FF5800; font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.1; margin: 0; }
  .hero-line2 { font-size: 36px; font-weight: 700; color: #fff; font-family: Georgia, "Times New Roman", serif; line-height: 1.1; margin: 0; }
  .hero-meta  { font-size: 12px; color: rgba(255,255,255,0.5); margin: 8px 0 0; }
  .hero-logos { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
  .hero-logos-row { display: flex; align-items: center; gap: 10px; }
  .hero-logos-sep { width: 1px; height: 14px; background: rgba(255,255,255,0.3); }
  .hero-redes { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
  .hero-redes-label { font-size: 9px; color: rgba(255,255,255,0.5); font-weight: 500; margin-right: 2px; }
  /* Wave SVG — z-index sobre o overlay */
  .hero-wave { display: block; width: 100%; height: 80px; margin-bottom: -2px; position: relative; z-index: 2; }
  /* ── Header / Mosaic antigos (compat) ── */
  .header { display: none; }
  .mosaic { display: none; }
  .photo  { display: none; }
  .photo-art { display: none; }

  /* ── Body ── */
  .body { padding: 1.5rem 1.5rem 1.75rem; }

  /* ── Callouts ── */
  .callout-highlight {
    display: flex; gap: 10px; padding: .85rem 1.1rem;
    background: var(--highlight-bg); margin-bottom: 8px;
    border-radius: 0 8px 8px 0; border-left: 4px solid var(--highlight-border);
  }
  .callout-highlight p { font-size: 13px; color: var(--highlight-text); margin: 0; line-height: 1.55; }
  .callout-highlight i { font-size: 16px; color: var(--highlight-icon); margin-top: 1px; }
  .callout-attention {
    display: flex; gap: 10px; padding: .85rem 1.1rem;
    background: var(--attention-bg); margin-bottom: 1.75rem;
    border-radius: 0 8px 8px 0; border-left: 4px solid var(--attention-border);
  }
  .callout-attention p { font-size: 13px; color: var(--attention-text); margin: 0; line-height: 1.55; }
  .callout-attention i { font-size: 16px; color: var(--attention-icon); margin-top: 1px; }
  .callout-attention strong, .callout-highlight strong { font-weight: 600; }
  .mention-link { color: var(--highlight-icon); font-weight: 600; text-decoration: none; }
  .mention-link:hover { text-decoration: underline; }

  /* ── KPIs ── */
  .kpi-row { display: grid; grid-template-columns: 1.1fr 1fr; gap: 14px; margin-bottom: 2rem; }
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .kpi-card { background: var(--bg-card); border-radius: 8px; padding: .9rem 1rem; }
  .kpi-label { font-size: 11px; color: var(--text-secondary); margin: 0 0 4px; }
  .kpi-value-row { display: flex; align-items: baseline; gap: 6px; }
  .kpi-value { font-size: 32px; font-weight: 600; margin: 0; line-height: 1; color: var(--text-primary); }
  .kpi-delta { font-size: 11px; }
  .kpi-delta--up   { color: var(--delta-up); }
  .kpi-delta--down { color: var(--delta-down); }
  .kpi-delta--neutral { color: var(--text-muted); }

  /* ── Sentimento ── */
  .sentiment-card { background: var(--bg-card); border-radius: 8px; padding: .9rem 1rem; display: flex; flex-direction: column; }
  .sentiment-title { font-size: 11px; color: var(--text-secondary); margin: 0 0 8px; }
  .sentiment-row { display: flex; align-items: center; gap: 14px; flex: 1; }
  .donut-wrap { position: relative; width: 76px; height: 76px; flex-shrink: 0; }
  .donut-value { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 19px; font-weight: 600; color: var(--text-primary); }
  .legend { display: flex; flex-direction: column; gap: 4px; font-size: 11px; }
  .legend-item { display: flex; align-items: center; gap: 6px; color: var(--text-secondary); }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

  /* ── Volume 7 dias ── */
  .volume-card { background: var(--bg-card); border-radius: 8px; padding: .9rem 1rem; }
  .volume-title { font-size: 11px; color: var(--text-secondary); margin: 0 0 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .vol-bars { display: flex; align-items: flex-end; gap: 4px; height: 64px; }
  .vol-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
  .vol-bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 4px; }
  .vol-bar-label { font-size: 9px; color: var(--text-muted); }
  .vol-bar-val { font-size: 9px; color: var(--text-secondary); font-weight: 600; }

  /* ── Top canal ── */
  .top-canal-card { background: var(--bg-card); border-radius: 8px; padding: .9rem 1rem; }
  .top-canal-title { font-size: 11px; color: var(--text-secondary); margin: 0 0 6px; }
  .top-canal-name  { font-size: 22px; font-weight: 600; color: var(--text-primary); margin: 0 0 2px; }
  .top-canal-pct   { font-size: 12px; color: var(--text-secondary); margin: 0; }
  /* ── Top 3 ── */
  .top3-section { margin-bottom: 2rem; }
  .top3-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .top3-icon-badge { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .top3-icon-badge i { font-size: 19px; color: #fff; }
  .top3-icon-badge--reach  { background: var(--top3-reach-badge); }
  .top3-icon-badge--engage { background: var(--top3-engage-badge); }
  .top3-title { margin: 0; font-size: 21px; font-family: Georgia, "Times New Roman", serif; color: var(--text-primary); }
  .top3-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .post-card { background: var(--post-card-bg); border: .5px solid var(--border); border-radius: 8px; overflow: hidden; }
  .post-photo { height: 110px; position: relative; background-size: cover; background-position: center; }
  .post-handle { position: absolute; top: 8px; left: 8px; font-size: 11px; color: #fff; background: rgba(0,0,0,0.45); padding: 3px 7px; border-radius: 5px; font-weight: 600; }
  .post-info { padding: .7rem .8rem; }
  .post-caption { font-size: 12px; color: var(--text-secondary); margin: 0 0 8px; line-height: 1.4; }
  .post-metric-row { display: flex; justify-content: space-between; align-items: baseline; }
  .post-metric-label { font-size: 11px; color: var(--text-muted); }
  .post-metric-value--reach  { font-size: 18px; font-weight: 600; color: var(--top3-reach-value); }
  .post-metric-value--engage { font-size: 18px; font-weight: 600; color: var(--top3-engage-value); }

  /* ── Temas (gráfico de barras + nuvem, dados reais do Reputaition) ── */
  .temas-chart { display: flex; flex-direction: column; gap: 9px; padding: 4px 0 16px; border-bottom: .5px solid var(--border); margin-bottom: 16px; }
  .temas-chart-row { display: grid; grid-template-columns: minmax(120px,220px) 1fr 40px; align-items: center; gap: 12px; }
  .temas-chart-lbl { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 11px; color: var(--text-secondary); text-align: right; line-height: 1.3; white-space: normal; }
  .temas-chart-track { background: var(--border); border-radius: 5px; height: 13px; overflow: hidden; }
  .temas-chart-bar { height: 100%; border-radius: 5px; background: linear-gradient(90deg, #FF8A3D, #FF6600); }
  .temas-chart-pct { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 11px; font-weight: 600; color: var(--text-secondary); }
  .temas-cloud { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 18px 26px; padding: 22px 16px 14px; }
  .temas-cloud span { display: inline-block; line-height: 1; white-space: nowrap; }
  .temas-analise-box { margin-top: 20px; background: var(--chall-bg); border-radius: 8px; }
  .temas-analise-box .block-title { color: var(--chall-title); }
  .temas-analise-box .block-text  { color: var(--chall-text); }
  .temas-analise-box .block-icon  { background: var(--chall-icon); }

  /* ── Destaques por rede social ── */
  .redes-destaque-metric-title { font-size: 13px; font-weight: 700; margin: 4px 0 10px; }
  .redes-destaque-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 22px; }
  .rede-destaque-col { display: flex; flex-direction: column; gap: 8px; }
  .rede-destaque-label { font-size: 15px; font-weight: 700; color: var(--text-primary); font-family: Georgia, "Times New Roman", serif; }
  .rede-mini-card { background: var(--post-card-bg); border: .5px solid var(--border); border-radius: 8px; overflow: hidden; }
  .rede-mini-card-empty { background: var(--post-card-bg); border: 1px dashed var(--border); border-radius: 8px; padding: 10px; font-size: 10.5px; color: var(--text-muted); }
  .rede-mini-thumb { height: 58px; position: relative; background: linear-gradient(150deg, #FF580022, #FF580011, #FFF0E8); background-size: cover; background-position: center; }
  .rede-mini-handle { position: absolute; top: 5px; left: 5px; font-size: 9.5px; color: #fff; background: rgba(0,0,0,.5); padding: 2px 6px; border-radius: 5px; font-weight: 600; max-width: calc(100% - 16px); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rede-mini-body { padding: 6px 8px; }
  .rede-mini-txt { font-size: 10px; color: var(--text-secondary); margin: 0 0 6px; line-height: 1.35; height: 27px; overflow: hidden; }
  .rede-mini-foot { display: flex; justify-content: flex-end; align-items: baseline; }
  .rede-mini-val { font-size: 14px; font-weight: 700; color: #FF6600; }
  @media (max-width: 700px) {
    .redes-destaque-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* ── Blocos coloridos ── */
  .colored-block { display: flex; gap: 12px; padding: 1.1rem 1.2rem; border-radius: 8px; margin-bottom: 1.5rem; }
  .colored-block:last-child { margin-bottom: 0; }
  .block-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .block-icon i, .block-icon svg { font-size: 19px; color: #fff; }
  .block-icon svg { width: 19px; height: 19px; stroke: #fff; flex-shrink: 0; }
  .block-title { margin: 0 0 .5rem; font-size: 21px; font-family: Georgia, "Times New Roman", serif; }
  .block-text  { font-size: 13px; line-height: 1.6; margin: 0; }

  .analysis-block { background: var(--highlight-bg); }
  .analysis-block .block-icon  { background: var(--highlight-border); }
  .analysis-block .block-title { color: var(--highlight-text); }
  .analysis-block .block-text  { color: var(--highlight-text); }

  .trends-block { background: var(--trend-bg); }
  .trends-block .block-icon  { background: var(--trend-icon); }
  .trends-block .block-title { color: var(--trend-title); }
  .trends-block .block-text  { color: var(--trend-text); }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 1.5rem; }
  .info-card { border-radius: 8px; padding: 1rem 1.1rem; }
  .info-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .info-card-title  { font-size: 14px; font-weight: 500; margin: 0; }
  .info-card-text   { font-size: 13px; line-height: 1.55; margin: 0; }
  .challenges-card    { background: var(--chall-bg); }
  .challenges-card .info-card-title { color: var(--chall-title); }
  .challenges-card .info-card-text  { color: var(--chall-text); }
  .challenges-card i, .challenges-card svg  { color: var(--chall-icon); font-size: 16px; }
  .challenges-card svg { width: 16px; height: 16px; stroke: var(--chall-icon); flex-shrink: 0; }
  .opportunities-card { background: var(--opport-bg); }
  .opportunities-card .info-card-title { color: var(--opport-title); }
  .opportunities-card .info-card-text  { color: var(--opport-text); }
  .opportunities-card i, .opportunities-card svg { color: var(--opport-icon); font-size: 16px; }
  .opportunities-card svg { width: 16px; height: 16px; stroke: var(--opport-icon); flex-shrink: 0; }

  /* ── Barra de navegação por país ── */
  .country-nav {
    background: var(--bg-nav); border-bottom: 1px solid var(--border);
    padding: 8px 20px; display: flex; gap: 6px; align-items: center;
    flex-wrap: wrap; position: sticky; top: 49px; z-index: 99;
  }
  .country-pill {
    padding: 6px 12px; border-radius: 99px; border: 1px solid var(--border);
    background: var(--bg-pill); font-size: 12px; font-weight: 500; color: var(--text-secondary);
    cursor: pointer; font-family: inherit; transition: all .15s;
    display: flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .country-pill:hover { border-color: var(--text-muted); }
  .country-pill.active { background: var(--header-bg, #FF5800); border-color: var(--header-bg, #FF5800); color: #fff; }

  /* ── Visão "Todos os países" ── */
  .overview-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 1.5rem; }
  .overview-card {
    border-radius: 10px; padding: 1.1rem 1.2rem; cursor: pointer;
    transition: transform .15s, box-shadow .15s; border: .5px solid var(--border);
    background: var(--bg-card);
  }

function showErr(msg) {
  document.getElementById('stateWrap').innerHTML = `<div style="font-size:32px">⚠️</div><div>${msg}</div>`;
}

/* ── Ilustrações originais do Brasil pro mosaico do topo (SVG, não-fotográficas
     de propósito — evita qualquer questão de direito de imagem de fotos de
     terceiros). Se vocês tiverem fotos oficiais/licenciadas da Embratur, é só
     trocar este array por <img src="..."> apontando pra elas. ── */
/* ── Fotos reais por país para o mosaico do topo ── */
function _fotoImgTag(src) {
  return '<img src="' + src + '" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy">';
}

let _mosaicTimer = null;
let _mosaicIdx = 0;          // índice da foto atualmente visível
let _mosaicFotos = [];       // preenchido ao renderizar cada país
let _mosaicCamadaAtiva = 'A'; // qual camada (A/B) está visível agora

/* ── Faz o quadro do topo passar pelas fotos do país, uma a uma, a cada poucos segundos.
     Usa 2 camadas de <img> fixas (heroBgImgA/B): a camada que vai aparecer já está
     carregada e decodificada há um ciclo inteiro de folga, então a troca é só um
     toggle de opacidade puro — nada de decode acontecendo durante a animação,
     que era a causa do engasgo no meio do crossfade. ── */
function _iniciarMosaicoRotativo(paisCod) {
  clearInterval(_mosaicTimer);
  _mosaicFotos = (PAISES[paisCod] && PAISES[paisCod].fotos) || [];
  if (_mosaicFotos.length < 2) return;
  const n = _mosaicFotos.length;
  _mosaicIdx = 0;
  _mosaicCamadaAtiva = 'A';

  _mosaicTimer = setInterval(() => {
    const nextIdx = (_mosaicIdx + 1) % n;
    const showEl  = document.getElementById(_mosaicCamadaAtiva === 'A' ? 'heroBgImgB' : 'heroBgImgA');
    const hideEl  = document.getElementById(_mosaicCamadaAtiva === 'A' ? 'heroBgImgA' : 'heroBgImgB');
    if (!showEl || !hideEl) return;

    // crossfade puro: a camada que vai aparecer já está pronta há ~3s
    showEl.style.opacity = 1;
    hideEl.style.opacity = 0;
    _mosaicIdx = nextIdx;
    _mosaicCamadaAtiva = _mosaicCamadaAtiva === 'A' ? 'B' : 'A';

    // só depois que o crossfade visual já terminou (.6s) é que troca o src da
    // camada que ficou invisível, preparando-a com folga pro próximo ciclo
    setTimeout(() => {
      const afterIdx = (nextIdx + 1) % n;
      hideEl.src = _mosaicFotos[afterIdx];
    }, 700);
  }, 3800);
}

/* ── Pré-carrega (em background, sem travar a UI) as fotos de TODOS os países
     assim que o relatório abre, para que a troca de país e a rotação automática
     do mosaico não fiquem esperando o download da imagem. ── */
let _fotosPreCarregadas = false;
function _preloadTodasFotosEmbratur() {
  if (_fotosPreCarregadas) return;
  _fotosPreCarregadas = true;
  const todasFotos = Object.values(PAISES).flatMap(p => p.fotos || []);
  todasFotos.forEach(src => { const img = new Image(); img.src = src; });
}

function fmtData(str) {
  if (!str) return '';
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' });
}
function fmtDataCurta(str) {
  if (!str) return '';
  const d = new Date(str + 'T12:00:00');
  return d.getDate() + '/' + (d.getMonth() + 1);
}

function deltaClass(v) {
  if (!v) return 'kpi-delta--neutral';
  return String(v).startsWith('-') ? 'kpi-delta--down' : 'kpi-delta--up';
}

// Transforma menções no texto de análise em hiperlinks clicáveis.
// Apenas @perfil (https://link-do-post) vira link — sem fallback para perfil.
function linkifyMentions(text) {
  if (!text) return text;
  // Normaliza ([url]) → (url) — IA às vezes envolve a URL em colchetes dentro dos parênteses
  text = text.replace(/\(\[(https?:\/\/[^\]]+)\]\)/g, '($1)');
  // Normaliza markdown [texto](url) → url
  text = text.replace(/\[[^\]]*\]\((https?:\/\/[^)]+)\)/g, '$1');
  // @perfil (URL) → link direto para o post (só linka quando há URL explícita)
  text = text.replace(/(^|[\s(])@([A-Za-z0-9_.]{2,30})\s*\((https?:\/\/[^\s<>"')]+)\)/g,
    (match, before, handle, url) =>
      `${before}<a href="${url}" target="_blank" rel="noopener" class="mention-link">@${handle}</a>`
  );
  return text;
}

/* ── Estado multi-país ── */
let TODOS_PAISES = {};   // { eua: {...campos}, esp: {...}, ... } — só os que já têm dados
let ATIVO = null;        // código do país ativo, ou null = visão "Todos os países"

/* ── Constrói a barra de navegação (pills) ── */
function renderNav() {
  const codigos = Object.keys(TODOS_PAISES);
  const nav = document.getElementById('countryNav');
  if (codigos.length <= 1) { nav.innerHTML = ''; nav.style.display = 'none'; return; }
  nav.style.display = 'flex';
  nav.innerHTML = `
    <button class="country-pill ${ATIVO===null?'active':''}" onclick="irPara(null)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#FF5800" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg> Todos os países</button>
    ${codigos.map(c => {
      const p = PAISES[c] || { nome: c, emoji: '🏳️' };
      return `<button class="country-pill ${ATIVO===c?'active':''}" onclick="irPara('${c}')">${p.emoji} ${p.nome}</button>`;
    }).join('')}
  `;
}

/* ── Navega para um país (ou null = overview) ── */
function irPara(codigo) {
  ATIVO = codigo;
  location.hash = codigo ? `pais=${codigo}` : '';
  renderNav();
  if (codigo && TODOS_PAISES[codigo]) {
    document.getElementById('btnPdf').style.display = ''; document.getElementById('btnHtml').style.display = '';
    document.getElementById('btnHtml').style.display = '';
    renderPage(TODOS_PAISES[codigo], codigo);
  } else {
    document.getElementById('btnPdf').style.display = 'none';
    document.getElementById('btnHtml').style.display = 'none';
    renderOverview();
  }
  window.scrollTo({ top: 0, behavior: 'instant' });
}

/* ── Visão "Todos os países" — cards-resumo lado a lado ── */
function renderOverview() {
  document.title = 'Embratur — Monitoramento diário';
  document.documentElement.style.setProperty('--header-bg', '#FF5800');
  const codigos = Object.keys(TODOS_PAISES);
  if (!codigos.length) {
    document.getElementById('page').innerHTML = `<div class="overview-empty">Nenhum país publicado ainda.</div>`;
    return;
  }
  document.getElementById('page').innerHTML = `
    <div class="overview-title-row">
      <h1>Monitoramento diário</h1>
      <span>${codigos.length} ${codigos.length===1?'país publicado':'países publicados'}</span>
    </div>
    <div class="overview-grid">
      ${codigos.map(c => {
        const p = PAISES[c] || { nome: c, emoji: '🏳️', cor: '#5F5E5A' };
        const d = TODOS_PAISES[c];
        return `
          <div class="overview-card" style="background:var(--bg-card);" onclick="irPara('${c}')">
            <div class="overview-card-head">
              <p class="overview-card-title">${p.emoji} ${p.nome}</p>
              <span class="overview-card-date">${fmtData(d.data)}</span>
            </div>
            <div class="overview-kpis">
              <div><p class="overview-kpi-label">Menções</p><p class="overview-kpi-val">${d.mencoes||'—'}</p></div>
              <div><p class="overview-kpi-label">Interações</p><p class="overview-kpi-val">${d.interacoes||'—'}</p></div>
              <div><p class="overview-kpi-label">Sent. pos.</p><p class="overview-kpi-val">${d.sentPos||'0'}%</p></div>
            </div>
          </div>`;
      }).join('')}
    </div>
  `;
  clearInterval(_mosaicTimer); // visão geral não tem mosaico
}

function _escEmbD(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Gráfico de barras + nuvem de termos, a partir da frequência real de
     temas classificados no Reputaition (d.temasFreq: [{nome,count,pct}]) ── */
function temasChartCloudHTML(temasFreq) {
  if (!temasFreq || !temasFreq.length) return '';
  const max = Math.max(...temasFreq.map(t => t.count), 1);
  const chart = `
    <div class="temas-chart">
      ${temasFreq.map(t => `
        <div class="temas-chart-row">
          <span class="temas-chart-lbl">${_escEmbD(t.nome)}</span>
          <div class="temas-chart-track"><div class="temas-chart-bar" style="width:${Math.max(Math.round((t.count/max)*100),4)}%;"></div></div>
          <span class="temas-chart-pct">${t.pct}%</span>
        </div>`).join('')}
    </div>`;
  return chart;
}

/* ── Destaques por rede social — 1 card por rede (Facebook/Twitter-X/
     Instagram/YouTube), com o post de maior alcance e o de maior interação,
     ou um card informativo quando a rede não teve posts no período. ── */
function redesDestaqueHTML(redesDestaque) {
  if (!redesDestaque) return '';
  const ordem = [
    ['facebook','Facebook'], ['x','Twitter/X'], ['instagram','Instagram'], ['youtube','YouTube'],
  ];
  const miniCard = (it) => {
    if (!it) return `<div class="rede-mini-card-empty">Sem dado</div>`;
    const fotoStyle = it.imagem ? `background-image:url('${_escEmbD(it.imagem)}');` : '';
    const legenda = it.link ? `<a href="${_escEmbD(it.link)}" target="_blank" style="color:inherit;text-decoration:none;">${_escEmbD(it.texto||'')}</a>` : _escEmbD(it.texto||'');
    return `
      <div class="rede-mini-card">
        <div class="rede-mini-thumb" style="${fotoStyle}"><span class="rede-mini-handle">${_escEmbD(it.handle||'')}</span></div>
        <div class="rede-mini-body">
          <p class="rede-mini-txt">${legenda}</p>
          <div class="rede-mini-foot"><span class="rede-mini-val">${_escEmbD(it.val||'—')}</span></div>
        </div>
      </div>`;
  };
  const linha = (metricKey, tituloMetrica, cor) => `
    <div class="redes-destaque-metric-title" style="color:${cor};">${tituloMetrica}</div>
    <div class="redes-destaque-grid">
      ${ordem.map(([chave, label]) => {
        const r = redesDestaque[chave];
        const semPosts = !r || r.semPosts;
        return `<div class="rede-destaque-col">
          <span class="rede-destaque-label">${label}</span>
          ${semPosts ? `<div class="rede-mini-card-empty">Sem publicações desta rede no período.</div>` : miniCard(r[metricKey])}
        </div>`;
      }).join('')}
    </div>`;
  return linha('maiorAlcance', 'Maior alcance', '#9B59B6') + linha('maiorInteracao', 'Maior interação', '#C0396E');
}

function exportarHTML() {
  // Captura o conteúdo renderizado atual e gera um HTML standalone
  const pais   = ATIVO;
  const d      = TODOS_PAISES?.[pais];
  const titulo = pais ? (window.EMBRATUR_PAISES?.[pais]?.nome || pais) : 'relatorio';
  const data   = d?.data || new Date().toISOString().substring(0, 10);

  // Clona o documento inteiro com estilos inline
  const html = `<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Embratur — ${titulo} — ${data}</title>
<style>
${Array.from(document.styleSheets).map(ss => {
  try { return Array.from(ss.cssRules).map(r => r.cssText).join('\n'); } catch { return ''; }
}).join('\n')}
</style>
</head>
<body class="${document.body.className}" style="${document.body.getAttribute('style')||''}">
${document.getElementById('reportWrap')?.outerHTML || ''}
</body>
</html>`;

  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `embratur_${pais}_${data}.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function copiarLink() {
  navigator.clipboard.writeText(location.href).then(() => {
    const btn = document.querySelector('.btn-copy');
    const orig = btn.textContent;
    btn.textContent = '✓ Copiado!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

/* ── Gate de senha ──────────────────────────────────────────────── */
const GATE_KEY    = 'emb_session';
const GATE_TTL_MS = 8 * 60 * 60 * 1000; // deve bater com o TTL do Worker

function _gateValido() {
  try {
    const raw = sessionStorage.getItem(GATE_KEY);
    if (!raw) return false;
    const { ts, ttl } = JSON.parse(raw);
    return (Date.now() - ts) < (ttl || GATE_TTL_MS);
  } catch { return false; }
}

async function gateSubmit() {
  const inp = document.getElementById('gateInput');
  const err = document.getElementById('gateError');
  const btn = document.getElementById('gateBtn');
  const val = (inp.value || '').trim();

  if (!val) { err.textContent = 'Por favor, digite o código.'; inp.classList.add('error'); return; }

  btn.disabled = true;
  btn.textContent = 'Verificando…';

  try {
    const res  = await fetch('/api/ekklesia/embratur-auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ senha: val }),
    });
    const data = await res.json();

    if (res.ok && data.ok) {
      // Salva token + timestamp na sessionStorage
      const { ts, ttl } = JSON.parse(atob(data.session_token.split('.')[0]));
      sessionStorage.setItem(GATE_KEY, JSON.stringify({ ts, ttl, token: data.session_token }));
      document.getElementById('gateWrap').style.display = 'none';
      document.getElementById('stateWrap').style.display = '';
      init();
    } else {
      err.textContent = data.error || 'Código incorreto. Tente novamente.';
      inp.classList.add('error');
      inp.value = '';
      inp.focus();
      // Cooldown anti-bruteforce
      setTimeout(() => { btn.disabled = false; btn.textContent = 'Acessar'; }, 2000);
    }
  } catch {
    err.textContent = 'Erro de conexão. Tente novamente.';
    btn.disabled = false;
    btn.textContent = 'Acessar';
  }
}

function gateBoot() {
  if (_gateValido()) {
    init();
  } else {
    document.getElementById('stateWrap').style.display = 'none';
    document.getElementById('gateWrap').style.display  = '';
    setTimeout(() => document.getElementById('gateInput')?.focus(), 80);
  }
}

/* limpa erro de validação quando o usuário começa a redigitar */
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('gateInput')?.addEventListener('input', () => {
    document.getElementById('gateInput').classList.remove('error');
    document.getElementById('gateError').textContent = '';
  });
});
/* ─────────────────────────────────────────────────────────────── */

async function init() {
  // Modo 1: URL fixa — /diario/esp/2026-06-24
  const fixedMatch = location.pathname.match(/\/diario\/([a-z]{2,4})\/(\d{4}-\d{2}-\d{2})/);
  if (fixedMatch) {
    const pais     = fixedMatch[1];
    const data_rel = fixedMatch[2];
    const session  = (() => { try { return JSON.parse(sessionStorage.getItem(GATE_KEY) || '{}'); } catch { return {}; } })();
    const token    = session.token || '';
    try {
      const res  = await fetch(`/api/ekklesia/embratur-diario?pais=${pais}&data_rel=${data_rel}`, {
        headers: token ? { 'Authorization': `Bearer ${token}` } : {},
      });
      if (res.status === 401) { showErr('Sessão expirada — recarregue a página.'); return; }
      const data = await res.json();
      if (!res.ok || !data.dados) { showErr(data.error || 'Relatório não encontrado.'); return; }

      TODOS_PAISES = { [pais]: data.dados };
      ATIVO = pais;

      renderNav();
      document.getElementById('btnPdf').style.display = ''; document.getElementById('btnHtml').style.display = '';
      renderPage(data.dados, pais);
      document.getElementById('stateWrap').style.display  = 'none';
      document.getElementById('reportWrap').style.display = '';
      window.scrollTo(0, 0);
      setTimeout(_preloadTodasFotosEmbratur, 1200);
    } catch(e) {
      showErr('Erro ao carregar o relatório. Tente novamente.');
    }
    return;
  }

  // Modo 2: URL com token (legado)
  const token = new URLSearchParams(location.search).get('token');
  if (!token) { showErr('Link inválido — nenhum token encontrado.'); return; }
  try {
    const res  = await fetch(`/api/ekklesia/embratur-share?token=${encodeURIComponent(token)}`);
    const data = await res.json();
    if (!res.ok || !data.dados) { showErr(data.error || 'Relatório não encontrado.'); return; }

    TODOS_PAISES = data.dados.paises || {};
    const codigos = Object.keys(TODOS_PAISES);
    if (!codigos.length) { showErr('Relatório ainda sem nenhum país publicado.'); return; }

    const hashPais = new URLSearchParams(location.hash.replace('#','')).get('pais');
    ATIVO = (hashPais && TODOS_PAISES[hashPais]) ? hashPais
          : (codigos.length === 1 ? codigos[0] : null);

    renderNav();
    if (ATIVO) {
      document.getElementById('btnPdf').style.display = ''; document.getElementById('btnHtml').style.display = '';
      renderPage(TODOS_PAISES[ATIVO], ATIVO);
    } else {
      renderOverview();
    }

    document.getElementById('stateWrap').style.display  = 'none';
    document.getElementById('reportWrap').style.display = '';
    window.scrollTo(0, 0);
    setTimeout(_preloadTodasFotosEmbratur, 1200);
  } catch(e) {
    showErr('Erro ao carregar o relatório. Tente novamente.');
  }
}

window.addEventListener('hashchange', () => {
  const hashPais = new URLSearchParams(location.hash.replace('#','')).get('pais');
  if ((hashPais || null) !== ATIVO) irPara(hashPais && TODOS_PAISES[hashPais] ? hashPais : null);
});

/* ── Tema claro/escuro ───────────────────────────────────────── */
const THEME_KEY = 'emb_theme';

function _applyTheme(dark) {
  document.documentElement.classList.toggle('dark', dark);
  const icon = dark ? '☀️' : '🌙';
  const btnT = document.getElementById('btnTheme');
  const btnG = document.getElementById('gateThemeBtn');
  if (btnT) btnT.textContent = icon;
  if (btnG) btnG.textContent = icon;
  // Logos no topbar e gate alternam conforme tema
  document.querySelectorAll('.topbar img[alt="Nexus"], .gate-card img[alt="Nexus"]').forEach(img => {
    img.src = dark ? '../assets/logo-nexus-white.png' : '../assets/logo-nexus.png';
  });
  document.querySelectorAll('.topbar img[alt="FSB Holding"], .gate-card img[alt="FSB Holding"]').forEach(img => {
    img.style.filter  = dark ? 'invert(1) brightness(1.8)' : '';
    img.style.opacity = dark ? '0.6' : '0.55';
  });
  // Logos no hero são sempre brancas (fundo escuro fixo) — não alterar
}

function toggleTheme() {
  const dark = !document.documentElement.classList.contains('dark');
  localStorage.setItem(THEME_KEY, dark ? 'dark' : 'light');
  _applyTheme(dark);
}

// Inicializa tema ao carregar
(function() {
  const saved = localStorage.getItem(THEME_KEY);
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  _applyTheme(saved ? saved === 'dark' : prefersDark);
})();

/* ── Animação de fundo (partículas + ondas laranja) ─────────── */
(function() {
  const canvas = document.getElementById('bgCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  let W, H, particles, waves, raf;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function mkParticles(n) {
    return Array.from({length: n}, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 2.4 + 0.6,
      vx: (Math.random() - 0.5) * 0.18,
      vy: (Math.random() - 0.5) * 0.18,
      a: Math.random() * 0.55 + 0.18,
    }));
  }

  function mkWaves(n) {
    return Array.from({length: n}, (_, i) => ({
      amp:   38 + i * 22,
      freq:  0.004 - i * 0.0005,
      speed: 0.0035 + i * 0.0011,
      phase: Math.random() * Math.PI * 2,
      yBase: H * (0.32 + i * 0.13),
      alpha: 0.13 - i * 0.018,
    }));
  }

  function init() {
    resize();
    particles = mkParticles(80);
    waves     = mkWaves(5);
  }

  let tick = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H);
    tick++;

    const isDark = document.documentElement.classList.contains('dark');
    const baseColor = isDark ? '255,110,30' : '255,88,0';
    const darkMult  = isDark ? 2.0 : 1;

    // ondas suaves
    waves.forEach(w => {
      ctx.beginPath();
      for (let x = 0; x <= W; x += 4) {
        const y = w.yBase + Math.sin(x * w.freq + w.phase + tick * w.speed) * w.amp
                          + Math.sin(x * w.freq * 1.7 + tick * w.speed * 0.6) * (w.amp * 0.4);
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(${baseColor},${w.alpha * darkMult})`;
      ctx.lineWidth = 1.8;
      ctx.stroke();
    });

    // linhas entre partículas próximas
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if (d < 160) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          const a = (1 - d / 160) * 0.22 * darkMult;
          ctx.strokeStyle = `rgba(${baseColor},${a})`;
          ctx.lineWidth = 0.8;
          ctx.stroke();
        }
      }
    }

    // partículas
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${baseColor},${p.a * darkMult})`;
      ctx.fill();
    });

    raf = requestAnimationFrame(draw);
  }

  init();
  draw();
  window.addEventListener('resize', () => { init(); });
})();

gateBoot();

/* ── Print/PDF: copia a imagem ativa do hero como background-image
   para que o browser a renderize no PDF sem depender de position:absolute.
   Reverte depois para não afetar o estado da página. ── */
(function() {
  function _heroPrintPrep() {
    document.querySelectorAll('.report-hero').forEach(function(hero) {
      // Pega a primeira img visível (opacity > 0) ou a primeira do slot
      var img = hero.querySelector('.hero-bg-img[style*="opacity:1"]')
             || hero.querySelector('.hero-bg-img');
      if (!img || !img.src) return;
      hero.dataset.printBg = hero.style.backgroundImage || '';
      hero.style.backgroundImage    = 'linear-gradient(135deg,rgba(0,0,0,0.72) 0%,rgba(0,0,0,0.45) 100%), url("' + img.src + '")';
      hero.style.backgroundSize     = 'cover, cover';
      hero.style.backgroundPosition = 'center, center 30%';
    });
  }
  function _heroPrintRevert() {
    document.querySelectorAll('.report-hero').forEach(function(hero) {
      hero.style.backgroundImage   = hero.dataset.printBg || '';
      hero.style.backgroundSize    = '';
      hero.style.backgroundPosition = '';
    });
  }
  if (window.matchMedia) {
    var mq = window.matchMedia('print');
    mq.addEventListener('change', function(e) {
      if (e.matches) _heroPrintPrep(); else _heroPrintRevert();
    });
  }
  window.addEventListener('beforeprint', _heroPrintPrep);
  window.addEventListener('afterprint',  _heroPrintRevert);
})();
</script>
