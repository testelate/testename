<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HUB.nexus — Kanban</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <style>

    body { display: flex; flex-direction: column;
      flex-direction: column;
      overflow: hidden;
      height: 100vh;
      background: var(--bg);
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      flex-shrink: 0;
      backdrop-filter: blur(30px);
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      z-index: 5;
      gap: 12px;
    }
    .topbar-left { display: flex; flex-direction: row; align-items: center; gap: 10px; }
    .topbar-title { font-size: 13px; font-weight: 500; color: var(--text-primary); letter-spacing: -0.2px; }
    .topbar-sub   { font-size: 11px; color: var(--text-muted); }
    .topbar-center {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
      justify-content: center;
    }
    .tab-group {
      display: flex;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--r-md);
      padding: 3px;
      gap: 2px;
    }
    .tab-btn {
      padding: 5px 14px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      cursor: pointer;
      border: none;
      background: transparent;
      font-family: 'Inter', sans-serif;
      transition: all var(--t-normal);
      white-space: nowrap;
    }
    .tab-btn.active {
      background: hsla(var(--theme-h),90%,50%,0.16);
      border: 1px solid hsla(var(--theme-h),90%,50%,0.28);
      color: var(--orange-2);
    }
    .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.06); color: var(--text-secondary); }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .tbtn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--r-sm);
      font-size: 11px; color: var(--text-secondary);
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all var(--t-normal);
    }
    .tbtn:hover { background: rgba(255,255,255,0.09); }
    .tbtn svg { width: 11px; height: 11px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .tbtn-primary {
      background: hsla(var(--theme-h),90%,50%,0.12);
      border-color: hsla(var(--theme-h),90%,50%,0.28);
      color: var(--orange-2);
    }
    .tbtn-primary:hover { background: hsla(var(--theme-h),90%,50%,0.22); }

    body.light .topbar { background: rgba(255,255,255,0.55); border-bottom-color: rgba(180,100,40,0.10); }
    body.light .topbar-title { color: #3a1200; }
    body.light .topbar-sub   { color: #b09070; }
    body.light .tab-group    { background: rgba(255,255,255,0.65); border-color: rgba(180,100,40,0.15); }
    body.light .tab-btn      { color: #b09070; }
    body.light .tab-btn.active { background: hsla(var(--theme-h),90%,50%,0.10); border-color: hsla(var(--theme-h),90%,50%,0.25); color: var(--accent-dark); }
    body.light .tbtn { background: rgba(255,255,255,0.70); border-color: rgba(180,100,40,0.18); color: #7a4a30; }

    /* ── Board ── */
    .board-wrap {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 16px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Grupo de colunas ── */
    .group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 2px;
    }
    .group-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .group-line {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.06);
    }
    .group-count {
      font-size: 10px;
      color: var(--text-faint);
    }

    body.light .group-label { color: #c09070; }
    body.light .group-line  { background: rgba(0,0,0,0.08); }
    body.light .group-count { color: #d0b09a; }

    /* ── Colunas ── */
    .columns {
      display: flex;
      gap: 10px;
      min-width: max-content;
    }
    .column {
      width: 240px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* Cabeçalho da coluna */
    .col-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--r-md);
    }
    .col-head-left { display: flex; align-items: center; gap: 7px; }
    .col-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .col-name { font-size: 11px; font-weight: 500; color: var(--text-primary); }
    .col-num {
      font-size: 10px;
      color: var(--text-muted);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--r-pill);
      padding: 1px 7px;
    }

    body.light .col-head { background: rgba(255,255,255,0.65); border-color: rgba(180,100,40,0.14); }
    body.light .col-name { color: #3a1200; }
    body.light .col-num  { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.08); color: #b09070; }

    /* Drop zone */
    .col-cards {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 60px;
      border-radius: var(--r-md);
      padding: 2px;
      transition: background var(--t-fast);
    }
    .col-cards.drag-over-col {
      background: hsla(var(--theme-h),90%,50%,0.05);
      outline: 1px dashed hsla(var(--theme-h),90%,50%,0.25);
      outline-offset: 2px;
    }

    /* ── Card Kanban ── */
    .k-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--r-md);
      padding: 11px 12px;
      cursor: grab;
      transition: all var(--t-normal);
      position: relative;
      overflow: hidden;
    }
    .k-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: hsla(var(--theme-h),90%,50%,0.20);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.20);
    }
    .k-card.dragging { opacity: 0.40; cursor: grabbing; transform: rotate(1deg); }
    .k-card.drag-over-card { border-color: hsla(var(--theme-h),90%,50%,0.45); background: hsla(var(--theme-h),90%,50%,0.06); }

    .k-card-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 2px 2px 0 0;
    }

    .k-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 8px;
    }
    .k-card-title {
      font-size: 11.5px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.45;
      letter-spacing: -0.15px;
      flex: 1;
    }
    .k-prio {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .k-card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .k-tag {
      font-size: 9.5px;
      padding: 2px 7px;
      border-radius: var(--r-pill);
      border: 1px solid;
    }
    
    .k-date {
      font-size: 10px;
      color: var(--text-muted);
      display: flex; align-items: center; gap: 3px;
    }
    .k-date svg { width: 9px; height: 9px; fill: none; stroke: var(--text-muted); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .k-date.overdue { color: var(--red); }
    .k-date.overdue svg { stroke: var(--red); }

    /* Indicadores de Card (Anexos, Notas, Recorrência) */
    .k-indicators {
      display: flex;
      gap: 6px;
      font-size: 10px;
      color: var(--text-faint);
      margin-left: auto;
    }
    .k-indicator-item { display: flex; align-items: center; gap: 3px; }

    .k-card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,0.04);
      padding-top: 8px;
      margin-top: 8px;
    }
    .k-avatars { display: flex; }
    .k-avatar {
      width: 20px; height: 20px;
      border-radius: 50%;
      font-size: 8px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      border: 1.5px solid rgba(20,10,2,0.9);
      margin-left: -5px;
    }
    .k-avatar:first-child { margin-left: 0; }

    /* Botão adicionar card */
    .add-card-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 10px;
      border-radius: var(--r-md);
      background: transparent;
      border: 1px dashed rgba(255,255,255,0.15);
      font-size: 10px;
      color: var(--text-faint);
      cursor: pointer;
      transition: all var(--t-normal);
      font-family: 'Inter', sans-serif;
      width: 100%;
    }
    .add-card-btn:hover {
      background: rgba(255,255,255,0.04);
      border-color: hsla(var(--theme-h),90%,50%,0.30);
      color: var(--text-muted);
    }
    .add-card-btn svg { width: 10px; height: 10px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    body.light .k-card { background: rgba(255,255,255,0.65); border-color: rgba(180,100,40,0.14); }
    body.light .k-card:hover { border-color: hsla(var(--theme-h),90%,50%,0.22); box-shadow: 0 4px 16px rgba(180,60,0,0.10); }
    body.light .k-card-title { color: #3a1200; }
    body.light .k-date { color: #c09070; }
    body.light .k-date svg { stroke: #c09070; }
    body.light .k-avatar { border-color: rgba(245,236,224,0.9); }
    body.light .k-card-foot { border-top-color: rgba(0,0,0,0.05); }
    body.light .add-card-btn { border-color: rgba(180,100,40,0.25); color: #d0b09a; }
    body.light .add-card-btn:hover { background: rgba(255,255,255,0.60); border-color: hsla(var(--theme-h),90%,50%,0.30); color: #b09070; }

    .k-edit-icon {
      width: 12px; height: 12px;
      fill: none; stroke: var(--text-faint); stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
      opacity: 0; transition: all var(--t-fast);
      margin-right: 4px;
    }
    .k-card:hover .k-edit-icon { opacity: 1; stroke: var(--text-muted); }
    body.light .k-edit-icon { stroke: rgba(180,100,40,0.3); }
    body.light .k-card:hover .k-edit-icon { stroke: rgba(180,100,40,0.6); }

    /* ── Orbs bg ── */
    .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }

    /* ── Modal novo card ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: rgba(22,12,4,0.96);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: var(--r-xl);
      padding: 24px;
      width: 400px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      transform: translateY(12px);
      transition: transform 0.25s;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-title {
      font-size: 14px; font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 16px;
      letter-spacing: -0.3px;
    }
    
    .modal-input, .modal-textarea, .modal-select {
      width: 100%;
      box-sizing: border-box; /* CORREÇÃO AQUI: Garante que o padding não vaze o width 100% */
      padding: 10px 13px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--r-md);
      font-size: 12px; color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      outline: none; margin-bottom: 10px;
      transition: border-color var(--t-normal);
    }
    .modal-textarea { resize: vertical; min-height: 70px; }
    .modal-input::placeholder, .modal-textarea::placeholder { color: var(--text-faint); }
    .modal-input:focus, .modal-textarea:focus { border-color: hsla(var(--theme-h),90%,50%,0.40); }
    
    .modal-select { padding: 9px 13px; cursor: pointer; }
    .modal-select[multiple] { height: 80px; padding: 5px; } /* Ajuste para Múltipla Escolha */
    .modal-select option, .modal-select optgroup { background: #1a0a04; padding: 4px 8px; }

    /* CORREÇÃO DO BUG: Cor do fundo e texto ao selecionar a option no select múltiplo */
    .modal-select option:checked {
      background: hsla(var(--theme-h),90%,50%,0.4) linear-gradient(0deg, hsla(var(--theme-h),90%,50%,0.4) 0%, hsla(var(--theme-h),90%,50%,0.4) 100%);
      color: #ffffff;
    }

    .modal-label { font-size: 10px; color: var(--text-faint); margin-bottom: 4px; display: block; text-transform: uppercase; letter-spacing: 0.5px;}

    /* Custom File Input Upload */
    .file-upload-wrapper {
      position: relative;
      margin-bottom: 14px;
    }
    .file-upload-input {
      position: absolute;
      left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer;
    }
    .file-upload-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      background: rgba(255,255,255,0.04); border: 1px dashed rgba(255,255,255,0.2);
      border-radius: var(--r-md); padding: 12px; font-size: 11px; color: var(--text-muted);
      text-align: center; transition: all var(--t-normal); pointer-events: none;
    }
    .file-upload-wrapper:hover .file-upload-btn {
      background: rgba(255,255,255,0.08); border-color: hsla(var(--theme-h),90%,50%,0.4); color: var(--text-primary);
    }
    
    /* Lista de arquivos visuais */
    .modal-file-list {
      display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px;
    }
    .file-item {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      padding: 6px 10px; border-radius: var(--r-sm); font-size: 10px; color: var(--text-secondary);
    }
    
    /* Novo: Ajuste para nome clicável */
    .file-item .file-name {
      color: var(--orange-2); text-decoration: underline; cursor: pointer; display: flex; align-items: center; gap: 6px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .file-item .file-name:hover { color: var(--orange-1); }
    .file-item svg { width: 12px; height: 12px; stroke: currentColor; fill: none; margin-right: 6px; vertical-align: middle; }
    .file-item .remove-file { cursor: pointer; color: var(--red); opacity: 0.7; margin-left: 10px; }
    .file-item .remove-file:hover { opacity: 1; }

    .modal-row { display: flex; gap: 8px; margin-top: 10px; }
    .modal-btn {
      flex: 1; padding: 9px;
      border-radius: var(--r-md);
      font-size: 12px; font-weight: 400;
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all var(--t-normal); border: none;
    }
    .modal-btn-cancel {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      color: var(--text-muted);
    }
    .modal-btn-cancel:hover { background: rgba(255,255,255,0.09); }
    .modal-btn-save {
      background: hsla(var(--theme-h),90%,50%,0.14);
      border: 1px solid hsla(var(--theme-h),90%,50%,0.30);
      color: var(--orange-2);
    }
    .modal-btn-save:hover { background: hsla(var(--theme-h),90%,50%,0.24); }

    /* ── Modal de Visualização de Arquivo (NOVO) ── */
    .preview-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .preview-overlay.open { opacity: 1; pointer-events: all; }
    .preview-modal { background: #160c04; border: 1px solid rgba(255,255,255,0.1); border-radius: var(--r-lg); width: 90%; max-width: 800px; display: flex; flex-direction: column; box-shadow: 0 24px 80px rgba(0,0,0,0.8); overflow: hidden; transform: scale(0.95); transition: transform 0.25s; }
    .preview-overlay.open .preview-modal { transform: scale(1); }
    .preview-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .preview-title { color: var(--text-primary); font-size: 13px; font-weight: 500; }
    .preview-close { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 20px; padding: 0; line-height: 1; }
    .preview-close:hover { color: #fff; }
    .preview-content { padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 300px; background: rgba(0,0,0,0.3); }
    .preview-content img { max-width: 100%; max-height: 70vh; border-radius: 4px; object-fit: contain; }
    .preview-content iframe { width: 100%; height: 60vh; border: none; border-radius: 4px; background: #fff; }
    .download-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; background: hsla(var(--theme-h),90%,50%,0.15); border: 1px solid hsla(var(--theme-h),90%,50%,0.3); color: var(--orange-2); border-radius: var(--r-md); text-decoration: none; font-size: 13px; font-weight: 500; transition: all 0.2s; }
    .download-btn:hover { background: hsla(var(--theme-h),90%,50%,0.25); color: var(--orange-1); }

    body.light .modal { background: rgba(245,236,224,0.97); border-color: rgba(180,100,40,0.20); }
    body.light .modal-title { color: #3a1200; }
    body.light .modal-input, body.light .modal-textarea, body.light .modal-select { background: rgba(255,255,255,0.80); border-color: rgba(180,100,40,0.22); color: #3a1200; }
    body.light .modal-input::placeholder, body.light .modal-textarea::placeholder { color: #c09070; }
    body.light .modal-select option, body.light .modal-select optgroup { background: #f5ece0; }
    
    /* CORREÇÃO DO BUG TEMA CLARO: Cor do fundo e texto ao selecionar a option no select múltiplo */
    body.light .modal-select option:checked { background: hsla(var(--theme-h),90%,50%,0.2) linear-gradient(0deg, hsla(var(--theme-h),90%,50%,0.2) 0%, hsla(var(--theme-h),90%,50%,0.2) 100%); color: var(--accent-dark); }
    
    body.light .file-upload-btn { background: rgba(255,255,255,0.6); border-color: rgba(180,100,40,0.3); color: #7a4a30; }
    body.light .file-item { background: rgba(255,255,255,0.8); border-color: rgba(180,100,40,0.2); color: #7a4a30; }

    /* ── Professional Selection Grid ── */
    .prof-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
      max-height: 200px;
      overflow-y: auto;
      padding: 5px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--r-md);
      background: rgba(0,0,0,0.1);
    }
    .prof-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 10px 5px;
      border-radius: var(--r-md);
      cursor: pointer;
      transition: all var(--t-normal);
      border: 1px solid transparent;
      user-select: none;
    }
    .prof-item:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.1);
    }
    .prof-item.selected {
      background: hsla(var(--theme-h),90%,50%,0.12);
      border-color: hsla(var(--theme-h),90%,50%,0.4);
    }
    .prof-avatar-circle {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      position: relative;
    }
    .prof-item.selected .prof-avatar-circle::after {
      content: '✓';
      position: absolute;
      bottom: -4px;
      right: -4px;
      background: var(--orange-1);
      color: #fff;
      width: 14px;
      height: 14px;
      border-radius: 50%;

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <script src="../js/roadmap.js"></script>
  <script>
    checkAuth();
    initMode();

    // ── Deep link: ?card=ID — scroll to and highlight a specific card ──
    function checkDeepLink() {
      var params = new URLSearchParams(window.location.search);
      var cardId = params.get('card');
      if (!cardId) return;
      // Find and highlight the card element
      setTimeout(function() {
        var el = document.querySelector('[data-id="'+cardId+'"]');
        if (!el) {
          // Try switching groups to find it
          var allGroups = ['entrada','producao','entrega'];
          for (var g of allGroups) {
            setGrupo(g, document.querySelector('[onclick*="setGrupo(\''+g+'"]'));
            el = document.querySelector('[data-id="'+cardId+'"]');
            if (el) break;
          }
        }
        if (el) {
          el.scrollIntoView({behavior:'smooth', block:'center'});
          el.style.outline = '3px solid var(--accent)';
          el.style.outlineOffset = '3px';
          el.style.boxShadow = '0 0 0 6px hsla(var(--theme-h),80%,55%,0.20)';
          setTimeout(function(){ el.style.outline=''; el.style.outlineOffset=''; el.style.boxShadow=''; }, 2500);
        }
      }, 600);
    }

    document.getElementById('navbar-container').innerHTML = renderNavbar('kanban');
    if(typeof initTheme==='function'){initTheme();updateModeButtons();}

    /* ── Datas e Variáveis ── */
    const hoje = new Date();
    const MESES_ABREV = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    function d(offset) {
      const dt = new Date(hoje); dt.setDate(dt.getDate() + offset);
      return `${String(dt.getDate()).padStart(2,'0')}/${MESES_ABREV[dt.getMonth()]}`;
    }
    function fmtDate(iso) {
      if (!iso) return '';
      const [y, m, day] = iso.split('-');
      return `${String(day).padStart(2,'0')}/${MESES_ABREV[parseInt(m,10)-1]}`;
    }

    const TIPOS = {
      clipping: { label:'Clipping',  text:'#88aaff', border:'rgba(136,170,255,0.30)', bg:'rgba(136,170,255,0.12)' },
      monitor:  { label:'Monitor',   text:'#66dd88', border:'rgba(102,221,136,0.30)', bg:'rgba(102,221,136,0.12)' },
      zoom:     { label:'ZOOM',      text:'#ffaa44', border:'rgba(255,170,68,0.30)',  bg:'rgba(255,170,68,0.12)'  },
      benchm:   { label:'Benchmark', text:'#cc88ff', border:'rgba(204,136,255,0.30)', bg:'rgba(204,136,255,0.12)' },
      cena:     { label:'CENA',      text:'#ff8080', border:'rgba(255,96,96,0.28)',    bg:'rgba(255,96,96,0.10)'    },
      pulso:    { label:'Pulso',     text:'#ffcc44', border:'rgba(255,200,80,0.30)',  bg:'rgba(255,200,80,0.12)'  },
      briefing: { label:'Briefing',  text:'var(--accent-light)', border:'hsla(var(--theme-h),90%,50%,0.28)',    bg:'hsla(var(--theme-h),90%,50%,0.10)'    },
    };
    const PRIO_COLORS = { alta:'#ff6060', media:'#ffaa44', baixa:'rgba(160,160,160,0.5)' };

    const getTipo = k => {
      if (!k) return TIPOS.briefing;
      const lower = k.toLowerCase().replace(/\s+/g,'');
      const found = TIPOS[lower] || Object.entries(TIPOS).find(([key]) => lower.includes(key) || key.includes(lower))?.[1];
      if (found) return found;
      const COLORS = ['#88aaff', '#66dd88', '#ffaa44', '#cc88ff', '#ff8080', '#ffcc44', 'var(--accent-light)', '#44ccff', '#ff6060', '#aaffaa'];
      const idx = [...k].reduce((s,c)=>s+c.charCodeAt(0),0) % COLORS.length;
      const cor = COLORS[idx];
      return { label: k, text: cor, border: cor+'44', bg: cor+'18' };
    };

    /* ── Profissionais ── */
    const CORES_PROF = ['var(--accent)','#dd4477','#22cc88','#3388ff','#cc88ff','#ffaa44','#66dd88','var(--accent-light)'];
    let PROFISSIONAIS = [];

    async function carregarProfissionais() {
      try {
        const res = await fetch('/api/usuarios');
        if (res.ok) {
          const data = await res.json();
          if (Array.isArray(data) && data.length) {
            return data.map((u, i) => ({ id: String(u.id), nome: u.nome, email: u.email, cor: u.cor || CORES_PROF[i % CORES_PROF.length] }));
          }
        }
      } catch(e) {}
      return [
        { id:'1', nome:'João Silva', email:'joao@empresa.com.br', cor:'var(--accent)' },
        { id:'2', nome:'Maria Fernandes', email:'maria@empresa.com.br', cor:'#dd4477' },
        { id:'3', nome:'Rafael Vasconcelos', email:'rafael@empresa.com.br', cor:'#22cc88' }
      ];
    }

    carregarProfissionais().then(lista => {
      PROFISSIONAIS = lista;
      const grid = document.getElementById('modalProfGrid');
      if (!grid) return;
      grid.innerHTML = '';
      lista.forEach(p => {
        const item = document.createElement('div');
        item.className = 'prof-item';
        item.dataset.id = p.id;
        item.onclick = () => toggleProfSelection(p.id);
        
        item.innerHTML = `
          <div class="prof-avatar-circle" style="background:${p.cor}22; color:${p.cor}; border: 1.5px solid ${p.cor}44">
            ${getInitials(p.nome)}
          </div>
          <div class="prof-name-label" title="${p.nome}">${p.nome}</div>
        `;
        grid.appendChild(item);
      });
    });

    function toggleProfSelection(id) {
      const item = document.querySelector(`.prof-item[data-id="${id}"]`);
      if (item) item.classList.toggle('selected');
    }

    function selectAllProfs() {
      const items = document.querySelectorAll('.prof-item');
      const allSelected = Array.from(items).every(i => i.classList.contains('selected'));
      items.forEach(i => {
        if (allSelected) i.classList.remove('selected');
        else i.classList.add('selected');
      });
    }

    function getSelectedProfIds() {
      return Array.from(document.querySelectorAll('.prof-item.selected')).map(i => i.dataset.id);
    }

    function setProfSelection(ids) {
      document.querySelectorAll('.prof-item').forEach(i => {
        if (ids.includes(i.dataset.id)) i.classList.add('selected');
        else i.classList.remove('selected');
      });
    }

    function getInitials(name) { return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase(); }

    /* ── Grupos de colunas ── */
    const GRUPOS = {
      entrada: {
        label: 'Entrada', color: '#88aaff',
        colunas: [ { id:'aguardando', name:'Aguardando Briefing', dot:'#88aaff' }, { id:'previsto', name:'Previsto', dot:'#aabbcc' }, { id:'standby', name:'Stand By', dot:'#bbaa88' } ]
      },
      producao: {
        label: 'Produção', color: '#66dd88',
        colunas: [ { id:'producao', name:'Em Produção', dot:'#66dd88' }, { id:'revisao', name:'Em Revisão', dot:'#ffaa44' }, { id:'teste', name:'Teste', dot:'#ffcc66' } ]
      },
      entrega: {
        label: 'Entrega', color: '#cc88ff',
        colunas: [ { id:'apresent', name:'Apresentação', dot:'var(--accent-light)' }, { id:'rev-final', name:'Revisão Final', dot:'#ffaa44' }, { id:'concluido', name:'Concluído', dot:'#cc88ff' } ]
      }
    };

    const modalColSelect = document.getElementById('modalCol');
    if (modalColSelect) {
      Object.values(GRUPOS).forEach(grupo => {
        const optGroup = document.createElement('optgroup'); optGroup.label = grupo.label;
        grupo.colunas.forEach(col => {
          const opt = document.createElement('option'); opt.value = col.id; opt.textContent = col.name; opt.dataset.dot = col.dot;
          optGroup.appendChild(opt);
        });
        modalColSelect.appendChild(optGroup);
      });
    }

    /* ── Dados (D1 + localStorage) ── */
    let cards = JSON.parse(localStorage.getItem('hubnexus_kanban') || '[]');
    let nextId = cards.length ? Math.max(...cards.map(c => c.id), 0) + 1 : 1;
    let grupoAtual = 'entrada';
    let dragSrcId = null;
    let currentFiles = []; // Array temporário para guardar os arquivos anexados no modal

    function saveCards() { localStorage.setItem('hubnexus_kanban', JSON.stringify(cards)); }

    async function carregarKanbanD1() {
      try {
        const res = await fetch('/api/kanban');
        if (!res.ok) return;
        const data = await res.json();
        if (Array.isArray(data)) {
          cards = data.map(c => ({
            id: c.id,
            col: c.col,
            title: c.title,
            descricao: c.descricao || '',
            tipo: c.tipo || '',
            prio: c.prio || 'media',
            recorrencia: c.recorrencia || '',
            profId: c.prof_id || '', // mantido por compatibilidade
            avatars: c.avatars || [], // array de responsáveis
            files: c.files ? (typeof c.files === 'string' ? JSON.parse(c.files) : c.files) : [],
            offset: c.dias_offset ?? 3,
            bar: c.bar || 'var(--accent)',
            dataRevisao: c.data_revisao || '', // adicionado
            dataEntrega: c.data_entrega || '', // adicionado
            dataApresentacao: c.data_apresentacao || '' // adicionado
          }));
          nextId = cards.length ? Math.max(...cards.map(c => c.id), 0) + 1 : 1;
          saveCards();
          renderBoard();
        }
      } catch(e) { console.warn('D1 indisponível. Usando Cache Local.', e); }
    }

    function saveCardRemote(card, isNew) {
      // Prepara os dados pro D1
      const payload = {
        col: card.col,
        title: card.title,
        descricao: card.descricao || '',
        tipo: card.tipo || '',
        prio: card.prio || 'media',
        recorrencia: card.recorrencia || '',
        prof_id: card.profId || '',
        avatars: card.avatars || [],
        files: JSON.stringify(card.files || []),
        dias_offset: card.offset ?? 3,
        bar: card.bar || 'var(--accent)',
        ordem: cards.indexOf(card),
        data_revisao: card.dataRevisao || '', // adicionado
        data_entrega: card.dataEntrega || '', // adicionado
        data_apresentacao: card.dataApresentacao || '' // adicionado
      };
      
      const method = isNew ? 'POST' : 'PUT';
      if(!isNew) payload.id = card.id;

      fetch('/api/kanban', {
        method: method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      }).then(r => r.ok ? r.json() : null)
        .then(data => {
          if (isNew && data?.id) { card.id = data.id; nextId = card.id + 1; saveCards(); }
        }).catch(() => {});
    }

    function deleteCardRemote(id) { fetch(`/api/kanban?id=${id}`, { method: 'DELETE' }).catch(() => {}); }

    /* ── Render Board ── */
    function updateSub() {
      const total = cards.length;
      const done  = cards.filter(c => c.col === 'concluido').length;
      document.getElementById('topbarSub').textContent = `${total} demandas · ${done} concluídas`;
    }

    function renderBoard() {
      updateSub();
      const wrap = document.getElementById('boardWrap');
      wrap.innerHTML = '';
      const grupo = GRUPOS[grupoAtual];

      const groupEl = document.createElement('div');
      groupEl.className = 'group';

      const gh = document.createElement('div');
      gh.className = 'group-header';
      const groupCards = cards.filter(c => grupo.colunas.some(col => col.id === c.col));
      gh.innerHTML = `<div class="group-label" style="color:${grupo.color}">${grupo.label}</div><div class="group-line"></div><div class="group-count">${groupCards.length} cards</div>`;
      groupEl.appendChild(gh);

      const colsEl = document.createElement('div');
      colsEl.className = 'columns';

      grupo.colunas.forEach(col => {
        const colCards = cards.filter(c => c.col === col.id);
        const colEl = document.createElement('div');
        colEl.className = 'column';

        colEl.innerHTML = `
          <div class="col-head">
            <div class="col-head-left"><div class="col-dot" style="background:${col.dot}; box-shadow:0 0 6px ${col.dot}66"></div><div class="col-name">${col.name}</div></div>
            <div class="col-num">${colCards.length}</div>
          </div>
        `;

        const zone = document.createElement('div');
        zone.className = 'col-cards';
        zone.dataset.col = col.id;

        // Eventos Drag n Drop da Coluna
        zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over-col'); });
        zone.addEventListener('dragleave', () => zone.classList.remove('drag-over-col'));
        zone.addEventListener('drop', e => {
          e.preventDefault(); zone.classList.remove('drag-over-col');
          if (dragSrcId == null) return;
          const card = cards.find(c => c.id === dragSrcId);
          if (card) {
            card.col = col.id; card.bar = col.dot;
            showToast(`Movido para "${col.name}"`);
            renderBoard(); saveCards(); saveCardRemote(card, false);
          }
        });

        // Loop Cards
        colCards.forEach(card => {
          const tipo = getTipo(card.tipo);
          // Usa dataEntrega real para calcular overdue (fallback para offset legado)
          const hoje0 = new Date(); hoje0.setHours(0,0,0,0);
          let over = false;
          if (card.dataEntrega) {
            const de = new Date(card.dataEntrega + 'T00:00:00');
            over = de < hoje0;
          } else {
            over = card.offset < 0;
          }
          const cardEl = document.createElement('div');
          cardEl.className = 'k-card';
          cardEl.draggable = true;
          cardEl.dataset.id = card.id;

          // Indicadores Visuais
          let indicatorsHTML = '';
          if (card.recorrencia) indicatorsHTML += `<div class="k-indicator-item" title="Recorrente: ${card.recorrencia}">🔁</div>`;
          if (card.descricao && card.descricao.trim().length > 0) indicatorsHTML += `<div class="k-indicator-item" title="Contém anotações">📝</div>`;
          if (card.files && card.files.length > 0) indicatorsHTML += `<div class="k-indicator-item" title="${card.files.length} anexo(s)"><svg viewBox="0 0 24 24" style="width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg> ${card.files.length}</div>`;

          cardEl.innerHTML = `
            <div class="k-card-bar" style="background:${card.bar}"></div>
            <div class="k-card-top">
              <div class="k-card-title">${card.title}</div>
              <div style="display:flex;align-items:center;">
                <svg class="k-edit-icon" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                <div class="k-prio" style="background:${PRIO_COLORS[card.prio]};box-shadow:0 0 5px ${PRIO_COLORS[card.prio]}55"></div>
              </div>
            </div>
            <div class="k-card-meta">
              <div class="k-tag" style="color:${tipo.text};border-color:${tipo.border};background:${tipo.bg}">${tipo.label}</div>
              <div class="k-indicators">${indicatorsHTML}</div>
            </div>
            <div class="k-card-foot">
              <div class="k-dates-col" style="display:flex;flex-direction:column;gap:2px;">
                ${card.dataEntrega ? `<div class="k-date ${over ? 'overdue' : ''}" title="Entrega">
                  <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                  ${over ? '⚠ ' : ''}${fmtDate(card.dataEntrega)}
                </div>` : `<div class="k-date" title="Entrega (estimada)">
                  <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                  ${d(card.offset)}
                </div>`}
                ${card.dataApresentacao ? `<div class="k-date" title="Apresentação" style="opacity:0.7;font-size:9px;">
                  <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                  ${fmtDate(card.dataApresentacao)}
                </div>` : ''}
              </div>
              <div class="k-avatars">
                ${card.avatars ? card.avatars.map(a => `<div class="k-avatar" style="background:${a.c}22;color:${a.c};border-color:${a.c}33" title="${a.nome}">${a.i}</div>`).join('') : ''}
              </div>
            </div>
          `;

          // Eventos do Card
          cardEl.addEventListener('click', () => openEditModal(card.id));
          cardEl.addEventListener('dragstart', () => { dragSrcId = card.id; setTimeout(() => cardEl.classList.add('dragging'), 0); });
          cardEl.addEventListener('dragend', () => { cardEl.classList.remove('dragging'); dragSrcId = null; });
          cardEl.addEventListener('dragover', e => { e.preventDefault(); if (dragSrcId !== card.id) cardEl.classList.add('drag-over-card'); });
          cardEl.addEventListener('dragleave', () => cardEl.classList.remove('drag-over-card'));
          cardEl.addEventListener('drop', e => {
            e.preventDefault(); cardEl.classList.remove('drag-over-card');
            if (dragSrcId == null || dragSrcId === card.id) return;
            const srcIdx  = cards.findIndex(c => c.id === dragSrcId);
            const destIdx = cards.findIndex(c => c.id === card.id);
            const src = cards[srcIdx];
            src.col = card.col; src.bar = card.bar;
            cards.splice(srcIdx, 1); cards.splice(destIdx, 0, src);
            renderBoard(); saveCards(); saveCardRemote(src, false);
          });

          zone.appendChild(cardEl);
        });

        const addBtn = document.createElement('button');
        addBtn.className = 'add-card-btn';
        addBtn.innerHTML = `<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> adicionar`;
        addBtn.onclick = () => openModal(col.id);
        zone.appendChild(addBtn);

        colEl.appendChild(zone);
        colsEl.appendChild(colEl);
      });

      groupEl.appendChild(colsEl);
      wrap.appendChild(groupEl);
    }

    function setGrupo(key, el) {
      grupoAtual = key;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      renderBoard();
    }

    function limparKanban() {
      if (confirm('Remover todos os cards e começar do zero?')) {
        localStorage.removeItem('hubnexus_kanban');
        cards = []; nextId = 1;
        renderBoard(); showToast('Dados removidos!');
      }
    }

    /* ── Input Visual e Conversão de Arquivos ── */
    const modalFilesInput = document.getElementById('modalFiles');
    const modalFileList = document.getElementById('modalFileList');

    modalFilesInput.addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      const MAX_SIZE = 1.5 * 1024 * 1024; // Limite de 1.5MB por arquivo
      
      for (let f of files) {
        if (f.size > MAX_SIZE) {
          showToast(`O arquivo "${f.name}" ultrapassa o limite de 1.5MB.`);
          continue;
        }
        
        // Converte pra Base64
        const dataUrl = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = (evt) => resolve(evt.target.result);
          reader.readAsDataURL(f);
        });

        currentFiles.push({
          id: 'file_' + Math.random().toString(36).substr(2, 9),
          name: f.name, size: f.size, type: f.type, url: dataUrl
        });
      }
      renderFileList();
      modalFilesInput.value = ''; // reseta pro onchange funcionar de novo
    });

    function renderFileList() {
      modalFileList.innerHTML = '';
      currentFiles.forEach(file => {
        const div = document.createElement('div');
        div.className = 'file-item';
        div.innerHTML = `
          <div class="file-name" onclick="openPreview('${file.id}')" title="Clique para abrir">
            <svg viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg> 
            ${file.name}
          </div>
          <span class="remove-file" onclick="removeFile('${file.id}')">✕ Remover</span>
        `;
        modalFileList.appendChild(div);
      });
    }

    function removeFile(fileId) {
      currentFiles = currentFiles.filter(f => f.id !== fileId);
      renderFileList();
    }

    /* ── Popup Visualizador de Arquivos ── */
    function openPreview(fileId) {
      const file = currentFiles.find(f => f.id === fileId);
      if (!file) return;

      document.getElementById('previewTitle').textContent = file.name;
      const contentBox = document.getElementById('previewContent');
      contentBox.innerHTML = ''; // Limpa anterior

      if (!file.url) {
        contentBox.innerHTML = `<span style="color:#888">Sem conteúdo para exibir.</span>`;
      } else if (file.type && file.type.startsWith('image/')) {
        // Exibe imagem
        contentBox.innerHTML = `<img src="${file.url}" alt="${file.name}" />`;
      } else if (file.type === 'application/pdf') {
        // Exibe PDF
        contentBox.innerHTML = `<iframe src="${file.url}"></iframe>`;
      } else {
        // Qualquer outro arquivo -> Botão de Download
        contentBox.innerHTML = `
          <div style="text-align:center; display:flex; flex-direction:column; gap:20px; align-items:center;">
            <p style="color:var(--text-muted); font-size: 14px; line-height: 1.5;">
              O formato do arquivo <b>${file.name}</b><br/> não pode ser exibido diretamente pelo navegador.
            </p>
            <a href="${file.url}" download="${file.name}" class="download-btn">⬇️ Baixar Arquivo Original</a>
          </div>
        `;
      }
      
      document.getElementById('previewOverlay').classList.add('open');
    }

    function closePreview() {
      document.getElementById('previewOverlay').classList.remove('open');
      document.getElementById('previewContent').innerHTML = '';
    }

    // Fechar preview clicando fora
    document.getElementById('previewOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('previewOverlay')) closePreview();
    });

    /* ── Modal Lógica ── */
    function openModal(colId) {
      document.getElementById('modalOverlay').dataset.editId = '';
      document.getElementById('modalHeading').textContent = 'Nova demanda';
      document.getElementById('modalSaveBtn').textContent = 'Adicionar →';
      document.getElementById('modalDeleteBtn').style.display = 'none';
      
      document.getElementById('modalTitle').value = '';
      document.getElementById('modalDescricao').value = '';
      document.getElementById('modalTipo').value = '';
      document.getElementById('modalPrio').value = 'media';
      document.getElementById('modalRecorrencia').value = '';
      document.getElementById('modalCol').value = colId || GRUPOS[grupoAtual].colunas[0].id;
      
      // Limpar campos de data adicionados
      document.getElementById('modalDataRevisao').value = '';
      document.getElementById('modalDataEntrega').value = '';
      document.getElementById('modalDataApresentacao').value = '';
      
      setProfSelection([]);
      currentFiles = [];
      renderFileList();

      document.getElementById('modalOverlay').classList.add('open');
      setTimeout(() => document.getElementById('modalTitle').focus(), 100);
    }

    function openEditModal(id) {
      const card = cards.find(c => c.id === id);
      if (!card) return;
      document.getElementById('modalOverlay').dataset.editId = id;
      document.getElementById('modalHeading').textContent = 'Editar demanda';
      document.getElementById('modalSaveBtn').textContent = 'Salvar →';
      document.getElementById('modalDeleteBtn').style.display = 'inline-flex';
      
      document.getElementById('modalTitle').value = card.title;
      document.getElementById('modalDescricao').value = card.descricao || '';
      document.getElementById('modalTipo').value = card.tipo || '';
      document.getElementById('modalPrio').value = card.prio || 'media';
      document.getElementById('modalRecorrencia').value = card.recorrencia || '';
      document.getElementById('modalCol').value = card.col;

      // Preencher campos de data adicionados
      document.getElementById('modalDataRevisao').value = card.dataRevisao || '';
      document.getElementById('modalDataEntrega').value = card.dataEntrega || '';
      document.getElementById('modalDataApresentacao').value = card.dataApresentacao || '';

      // Seleção múltipla (Nova UI)
      const cardProfIds = card.avatars ? card.avatars.map(a => String(a.id)) : [];
      setProfSelection(cardProfIds);

      // Recupera arquivos do card e garante que tenham um ID para podermos deletar na tela
      currentFiles = [...(card.files || [])];
      currentFiles.forEach(f => { if(!f.id) f.id = 'file_' + Math.random().toString(36).substr(2, 9); });
      renderFileList();

      document.getElementById('modalOverlay').classList.add('open');
      setTimeout(() => document.getElementById('modalTitle').focus(), 100);
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

    function deleteCard() {
      const editId = parseInt(document.getElementById('modalOverlay').dataset.editId);
      if (!editId || !confirm('Remover esta demanda?')) return;
      cards = cards.filter(c => c.id !== editId);
      saveCards(); deleteCardRemote(editId); closeModal(); renderBoard(); showToast('Demanda removida.');
    }

    function saveCard() {
      const title = document.getElementById('modalTitle').value.trim();
      if (!title) return showToast('Digite o título da demanda.');

      const descricao = document.getElementById('modalDescricao').value.trim();
      const tipo = document.getElementById('modalTipo').value;
      const prio = document.getElementById('modalPrio').value;
      const recorrencia = document.getElementById('modalRecorrencia').value;
      const colId = document.getElementById('modalCol').value;
      
      // Lendo os campos de data adicionados
      const dataRevisao = document.getElementById('modalDataRevisao').value;
      const dataEntrega = document.getElementById('modalDataEntrega').value;
      const dataApresentacao = document.getElementById('modalDataApresentacao').value;

      const selecionadosIds = getSelectedProfIds();
      const selecionados = selecionadosIds.map(id => PROFISSIONAIS.find(p => p.id === id)).filter(Boolean);
      const avatars = selecionados.map(p => ({ id: p.id, i: getInitials(p.nome), c: p.cor, nome: p.nome }));

      const selectOpt = document.querySelector(`#modalCol option[value="${colId}"]`);
      const editId = parseInt(document.getElementById('modalOverlay').dataset.editId);

      // Agora salva tudo incluindo o link base64 (url)
      const savedFiles = currentFiles.map(f => ({ name: f.name, size: f.size, type: f.type, url: f.url }));

      if (editId) {
        const card = cards.find(c => c.id === editId);
        if (card) {
          card.title = title;
          card.descricao = descricao;
          card.tipo = tipo;
          card.prio = prio;
          card.recorrencia = recorrencia;
          card.col = colId;
          card.avatars = avatars;
          card.files = savedFiles;
          card.dataRevisao = dataRevisao; // adicionado
          card.dataEntrega = dataEntrega; // adicionado
          card.dataApresentacao = dataApresentacao; // adicionado
          if(selectOpt) card.bar = selectOpt.dataset.dot;
          saveCards(); saveCardRemote(card, false); showToast('Demanda atualizada ✓');
        }
      } else {
        const col = GRUPOS[grupoAtual].colunas.find(c => c.id === colId) || GRUPOS[grupoAtual].colunas[0];
        const novoCard = {
          id: nextId++, col: colId, title, descricao, tipo, prio, recorrencia, avatars,
          files: savedFiles, offset: 3, bar: selectOpt ? selectOpt.dataset.dot : col.dot,
          dataRevisao, dataEntrega, dataApresentacao // adicionado
        };
        cards.unshift(novoCard);
        saveCards(); saveCardRemote(novoCard, true); showToast(`Demanda criada!`);
      }

      closeModal(); renderBoard();
    }

    document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === document.getElementById('modalOverlay')) closeModal(); });

    /* ── Boot ── */
    renderBoard();
    carregarKanbanD1();
  </script>
</body>
</html>
