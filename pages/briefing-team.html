<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HUB.nexus — Briefing Equipe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <style>
    body { display: flex; flex-direction: column; overflow:hidden; height:100vh; background:var(--bg); }
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; }
    
    /* ── Topbar ── */
    .topbar {
      display:flex; align-items:center; justify-content:space-between;
      padding:0 20px; height:52px; flex-shrink:0;
      backdrop-filter:blur(30px);
      background:rgba(255,255,255,0.03);
      border-bottom:1px solid rgba(255,255,255,0.07);
      z-index:5;
    }
    .topbar-left { display:flex; flex-direction:row; align-items:center; gap:10px; }
    .topbar-title { font-size:13px; font-weight:500; color:var(--text-primary); letter-spacing:-0.2px; }
    .topbar-sub   { font-size:11px; color:var(--text-muted); }
    .topbar-right { display:flex; align-items:center; gap:8px; }
    .tbtn {
      display:inline-flex; align-items:center; gap:5px;
      padding:6px 12px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.09);
      border-radius:var(--r-sm);
      font-size:11px; color:var(--text-secondary);
      cursor:pointer; font-family:'Inter',sans-serif;
      transition:all var(--t-normal);
    }
    .tbtn:hover { background:rgba(255,255,255,0.09); }
    .tbtn svg { width:11px; height:11px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .tbtn-primary { background:hsla(var(--theme-h),90%,50%,0.12); border-color:hsla(var(--theme-h),90%,50%,0.28); color:var(--orange-2); }
    .tbtn-primary:hover { background:hsla(var(--theme-h),90%,50%,0.22); }
    
    body.light .topbar { background:rgba(255,255,255,0.55); border-bottom-color:rgba(180,100,40,0.10); }
    body.light .topbar-title { color:#3a1200; }
    body.light .topbar-sub   { color:#b09070; }
    body.light .tbtn { background:rgba(255,255,255,0.70); border-color:rgba(180,100,40,0.18); color:#7a4a30; }
    
    /* ── Layout dois painéis ── */
    .content { flex:1; display:flex; overflow:hidden; position:relative; z-index:1; }
    
    /* ── PAINEL ESQUERDO: lista de briefings ── */
    .left-panel {
      width:280px; flex-shrink:0;
      display:flex; flex-direction:column;
      border-right:1px solid rgba(255,255,255,0.07);
      overflow:hidden;
    }
    .list-header {
      padding:14px 16px 10px;
      border-bottom:1px solid rgba(255,255,255,0.06);
      flex-shrink:0;
    }
    .list-search {
      display:flex; align-items:center; gap:7px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.09);
      border-radius:var(--r-sm);
      padding:7px 10px;
    }
    .list-search svg { width:12px; height:12px; fill:none; stroke:var(--text-muted); stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
    .list-search input {
      background:transparent; border:none; outline:none;
      font-size:12px; color:var(--text-primary); font-family:'Inter',sans-serif;
      width:100%;
    }
    .list-search input::placeholder { color:var(--text-muted); }
    .briefing-list { flex:1; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:4px; }
    
    /* Item da lista */
    .b-item {
      padding:11px 12px;
      border-radius:var(--r-md);
      cursor:pointer;
      border:1px solid transparent;
      transition:all var(--t-normal);
      position:relative;
    }
    .b-item:hover { background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.08); }
    .b-item.active { background:hsla(var(--theme-h),90%,50%,0.08); border-color:hsla(var(--theme-h),90%,50%,0.22); }
    .b-item-top { display:flex; align-items:flex-start; justify-content:space-between; gap:6px; margin-bottom:4px; }
    .b-item-name { font-size:12px; font-weight:500; color:var(--text-primary); line-height:1.35; flex:1; }
    .b-status {
      font-size:9px; font-weight:500; padding:2px 7px;
      border-radius:var(--r-pill); border:1px solid; flex-shrink:0; white-space:nowrap;
    }
    .b-status.novo     { color:var(--orange-2); border-color:hsla(var(--theme-h),90%,50%,0.30); background:hsla(var(--theme-h),90%,50%,0.10); }
    .b-status.lido     { color:var(--text-muted); border-color:rgba(255,255,255,0.08); background:rgba(255,255,255,0.04); }
    .b-status.gerado   { color:#a87ffb; border-color:rgba(136,85,255,0.30); background:rgba(136,85,255,0.10); }
    .b-status.convertido { color:var(--green); border-color:rgba(102,221,136,0.30); background:rgba(102,221,136,0.10); }
    .b-item-meta { font-size:10px; color:var(--text-muted); }
    .b-trilha-dot {
      display:inline-block; width:5px; height:5px; border-radius:50%;
      margin-right:5px; vertical-align:middle;
    }
    
    body.light .left-panel { border-right-color:rgba(180,100,40,0.10); }
    body.light .list-header { border-bottom-color:rgba(180,100,40,0.08); }
    body.light .list-search { background:rgba(255,255,255,0.70); border-color:rgba(180,100,40,0.18); }
    body.light .list-search input { color:#3a1200; }
    body.light .list-search svg   { stroke:#b09070; }
    body.light .b-item-name { color:#3a1200; }
    body.light .b-item-meta { color:#c09070; }
    body.light .b-item:hover { background:rgba(255,255,255,0.65); border-color:rgba(180,100,40,0.14); }
    body.light .b-item.active { background:hsla(var(--theme-h),90%,50%,0.06); border-color:hsla(var(--theme-h),90%,50%,0.20); }
    
    /* ── PAINEL DIREITO: detalhes do briefing ── */
    .right-panel { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    
    .empty-state {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:12px;
      color:var(--text-muted);
    }
    .empty-state svg { width:40px; height:40px; fill:none; stroke:var(--text-faint); stroke-width:1.2; stroke-linecap:round; stroke-linejoin:round; }
    .empty-state p { font-size:13px; }
    
    /* Detalhe header */
    .detail-header {
      padding:16px 20px 0;
      border-bottom:1px solid rgba(255,255,255,0.07);
      flex-shrink:0;
    }
    .detail-top {
      display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
      margin-bottom:12px;
    }
    .detail-info { flex:1; min-width:0; }
    .detail-name {
      font-size:16px; font-weight:500; color:var(--text-primary);
      letter-spacing:-0.4px; margin-bottom:4px; line-height:1.3;
    }
    .detail-meta { font-size:11px; color:var(--text-muted); display:flex; align-items:center; gap:10px; }
    .detail-actions { display:flex; gap:7px; flex-shrink:0; }
    
    /* Abas */
    .tabs-row { display:flex; gap:2px; }
    .tab-btn {
      padding:8px 16px;
      border-radius:8px 8px 0 0;
      font-size:12px; font-weight:400;
      color:var(--text-muted);
      cursor:pointer; border:none; background:transparent;
      font-family:'Inter',sans-serif;
      transition:all var(--t-normal);
      border:1px solid transparent;
      border-bottom:none;
    }
    .tab-btn.active {
      color:var(--orange-2);
      background:hsla(var(--theme-h),90%,50%,0.08);
      border-color:hsla(var(--theme-h),90%,50%,0.20);
    }
    .tab-btn:hover:not(.active) { color:var(--text-secondary); background:rgba(255,255,255,0.04); }
    
    body.light .detail-header { border-bottom-color:rgba(180,100,40,0.10); }
    body.light .detail-name   { color:#3a1200; }
    body.light .detail-meta   { color:#b09070; }
    body.light .tab-btn { color:#b09070; }
    body.light .tab-btn.active { color:var(--accent-dark); background:hsla(var(--theme-h),90%,50%,0.06); border-color:hsla(var(--theme-h),90%,50%,0.18); }
    
    .tab-content { flex:1; overflow-y:auto; padding:20px; }
    
    /* ── ABA: Respostas Padrão ── */
    .respostas-list { display:flex; flex-direction:column; gap:14px; }
    .resp-item {
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:var(--r-lg);
      padding:14px 16px;
    }
    .resp-q {
      font-size:11px; font-weight:500; color:var(--text-muted);
      text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px;
    }
    .resp-a { font-size:13px; color:var(--text-primary); line-height:1.6; font-weight:400; }
    
    /* ── VOX.IA Dashboard Styles ── */
    .voxia-dashboard { display: flex; flex-direction: column; gap: 20px; }
    .voxia-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
    .voxia-card {
      background: rgba(136, 85, 255, 0.08); border: 1px solid rgba(136, 85, 255, 0.2);
      border-radius: var(--r-md); padding: 14px;
    }
    .voxia-card h4 { font-size: 10px; text-transform: uppercase; color: #a87ffb; margin-bottom: 6px; font-weight: 600; letter-spacing: 0.5px; }
    .voxia-card p { font-size: 14px; color: var(--text-primary); font-weight: 500; margin:0; line-height: 1.4; }
    .voxia-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .voxia-tag { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .voxia-tag.positive { background: rgba(102, 221, 136, 0.15); color: #66dd88; border: 1px solid rgba(102, 221, 136, 0.3); }
    .voxia-tag.negative { background: rgba(255, 85, 85, 0.15); color: #ff5555; border: 1px solid rgba(255, 85, 85, 0.3); }
    
    .voxia-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
    .voxia-list li {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      padding: 10px 14px; border-radius: var(--r-sm); font-size: 13px; color: var(--text-secondary);
      display: flex; align-items: center; gap: 10px;
    }
    .voxia-list li::before {
      content: '■'; color: #a87ffb; font-size: 10px;
    }
    
    body.light .resp-item { background:rgba(255,255,255,0.65); border-color:rgba(180,100,40,0.14); }
    body.light .resp-q    { color:#c09070; }
    body.light .resp-a    { color:#3a1200; }
    body.light .voxia-card { background: rgba(136, 85, 255, 0.04); border-color: rgba(136, 85, 255, 0.15); }
    body.light .voxia-card p { color: #222; }
    
    /* ── ABA: Transcrição ── */
    .transcr-area {
      display:flex; flex-direction:column; gap:14px;
    }
    .transcr-textarea {
      width:100%; min-height:220px;
      padding:14px 16px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:var(--r-lg);
      font-size:13px; color:var(--text-primary);
      font-family:'Inter',sans-serif;
      outline:none; resize:vertical; line-height:1.65;
      transition:border-color var(--t-normal);
    }
    .transcr-textarea::placeholder { color:var(--text-muted); }
    .transcr-textarea:focus { border-color:hsla(var(--theme-h),90%,50%,0.38); background:rgba(255,255,255,0.07); }
    
    body.light .transcr-textarea { background:rgba(255,255,255,0.65); border-color:rgba(180,100,40,0.18); color:#3a1200; }
    body.light .transcr-textarea:focus { border-color:hsla(var(--theme-h),90%,50%,0.38); background:rgba(255,255,255,0.85); }
    
    /* ── ABA: Documento IA (Hacker Console Style) ── */
    .doc-area { display:flex; flex-direction:column; gap:14px; height: 100%; }
    .doc-controls { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .doc-controls-left { font-size:12px; color:var(--text-muted); }
    .doc-controls-right { display:flex; gap:8px; }
    
    .ia-btn, .kanban-btn {
      display:inline-flex; align-items:center; gap:7px;
      padding:8px 16px; border-radius:var(--r-sm);
      font-size:12px; font-weight:500; cursor:pointer; font-family:'Inter',sans-serif;
      transition:all var(--t-normal); border:1px solid;
    }
    .ia-btn { background:hsla(var(--theme-h),90%,50%,0.12); border-color:hsla(var(--theme-h),90%,50%,0.28); color:var(--orange-2); }
    .ia-btn:hover { background:hsla(var(--theme-h),90%,50%,0.22); }
    .ia-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .kanban-btn { background:rgba(102,221,136,0.10); border-color:rgba(102,221,136,0.28); color:var(--green); }
    .kanban-btn:hover { background:rgba(102,221,136,0.18); }
    .ia-btn svg, .kanban-btn svg { width:13px; height:13px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    
    .spinner {
      width:13px; height:13px; border:2px solid rgba(255,128,64,0.3); border-top-color:var(--orange-2);
      border-radius:50%; animation:spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    
    /* Estilo "Hacker" para a IA */
    .doc-output {
      background: #0d0d0d;
      border: 1px solid #333;
      border-radius: var(--r-xl);
      padding: 24px;
      min-height: 250px;
      font-size: 13px; 
      color: #e0e0e0;
      line-height: 1.7;
      white-space: pre-wrap;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      position: relative;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
      overflow-y: auto;
    }
    .doc-output.empty {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:10px; color:#555; text-align:center;
      background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.08); font-family: 'Inter', sans-serif;
    }
    .doc-section-title {
      font-size: 13px; font-weight: 600;
      color: #00ff41; /* Verde Matrix */
      letter-spacing: 0.5px;
      text-transform: uppercase; margin: 20px 0 8px;
      text-shadow: 0 0 5px rgba(0, 255, 65, 0.3);
    }
    .doc-section-title:first-child { margin-top:0; }
    .doc-cursor {
      display:inline-block; width:8px; height:15px;
      background: #00ff41; vertical-align:middle;
      margin-left:4px; animation:blink 0.9s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    
    /* ── Orbs bg ── */
    .bg-orbs { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    
    /* ── Print / PDF ── */
    @media print {
      body { background: white !important; display: block !important; height: auto !important; }
      .sidebar, #sidebar-container, .topbar, .left-panel, .bg-orbs,
      .tabs-row, .detail-actions, .tbtn, .ia-btn, .kanban-btn, .doc-controls { display: none !important; }
      .main { overflow: visible !important; }
      .content { display: block !important; overflow: visible !important; }
      .right-panel { overflow: visible !important; display: block !important; }
      .tab-content { overflow: visible !important; padding: 0 !important; }
      #printHeader { display: block !important; }
      .resp-item { background: #f9f9f9 !important; border: 1px solid #ddd !important; break-inside: avoid; margin-bottom: 10px; }
      .resp-q { color: #888 !important; }
      .resp-a { color: #111 !important; }
      .voxia-card { break-inside: avoid; border: 1px solid #ccc !important; }
      .doc-output { background: white !important; color: black !important; font-family: 'Inter', sans-serif !important; border: none !important; box-shadow: none !important; }
      .doc-section-title { color: var(--accent) !important; text-shadow: none !important; }
      .detail-header { border-bottom: 2px solid #eee !important; }
      .detail-name { color: #111 !important; font-size: 20px !important; }
      .detail-meta { color: #666 !important; }
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
    #printHeader { display: none; }
    
    /* Errata Styles */
    .errata-toggle {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 500; color: var(--orange-2);
      cursor: pointer; transition: all var(--t-normal);
      padding: 3px 9px; border-radius: 6px;
      border: 1px solid hsla(var(--theme-h),90%,50%,0.28);
      background: hsla(var(--theme-h),90%,50%,0.08);
      user-select: none;
      white-space: nowrap;
    }
    .errata-toggle:hover { background: hsla(var(--theme-h),90%,50%,0.16); border-color: hsla(var(--theme-h),90%,50%,0.45); color: var(--accent-light); }
    .errata-toggle.active {
      color: var(--accent); background: rgba(255,68,68,0.12); border-color: rgba(255,68,68,0.35);
    }
    .errata-toggle svg { width: 10px; height: 10px; fill: none; stroke: currentColor; stroke-width: 2.2; }
    .resp-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .resp-item.flagged { border-color: rgba(255,68,68,0.3); background: rgba(255,68,68,0.03); }
  
    /* Hub navbar: hide only the logo/title part of old topbar */
    #navbar-container:not(:empty) ~ .main > .topbar .topbar-left { display: none !important; }
    #navbar-container:not(:empty) ~ .main > .topbar {
      justify-content: flex-end;
      padding-left: 8px;
      height: 46px;
    }
    .page-navbar { width: 100%; }

  </style>
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div id="navbar-container"></div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <img src="../assets/logo.png" alt="HUB.nexus" style="height:32px;width:auto;object-fit:contain;filter:drop-shadow(0 0 4px hsla(var(--theme-h),90%,50%,0.2));flex-shrink:0;"/>
        <div style="display:flex;flex-direction:column;line-height:1.2;">
          <span class="topbar-title">Briefings</span>
          <span class="topbar-sub">Diagnósticos recebidos + Documentação IA + D1</span>
        </div>
      </div>

      <div class="topbar-right">
        <button class="tbtn" onclick="toggleMode()">
          <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
        <button class="tbtn" onclick="exportarBriefingsXLSX()">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
          Exportar XLSX
        </button>
        <button class="tbtn" onclick="exportarDocxAtivo()">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><polyline points="9 15 12 18 15 15"/><line x1="12" y1="18" x2="12" y2="12"/></svg>
          Exportar DOCX
        </button>
        <button class="tbtn tbtn-primary" onclick="abrirSeletorProduto()">
          <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
          Enviar Briefing
        </button>
        <button class="tbtn tbtn-primary" id="errataLinkBtn" style="display:none;" onclick="copiarLinkErrata()">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Link Errata (<span id="errataCount">0</span>)
        </button>
      </div>
    </div>

    <div class="content">
      <div class="left-panel">
        <div class="list-header">
          <div class="list-search">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Buscar briefing..." id="searchInput" oninput="filterList(this.value)"/>
            <button style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:6px;padding:5px 8px;cursor:pointer;color:var(--text-muted);font-size:10px;margin-top:4px;width:100%;font-family:inherit;" onclick="carregarBriefingsD1()">↺ Atualizar</button>
          </div>
        </div>
        <div class="briefing-list" id="briefingList"></div>
      </div>

      <div class="right-panel" id="rightPanel">
        <div class="empty-state">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <p>Selecione um briefing para visualizar</p>
        </div>
      </div>
    </div>

    checkAuth();
    initMode();
    document.getElementById('navbar-container').innerHTML = renderNavbar('briefing');
    if(typeof initTheme==='function'){initTheme();updateModeButtons();}

    /* ── DICIONÁRIO COMPLETO (Tradução de Inteligência Legado) ── */
    const DICTIONARY = {
      perguntas: {
        0: 'Qual é a sua principal necessidade hoje?',
        1: 'Com que frequência você precisa acompanhar a cobertura?',
        2: 'O que você quer medir nas redes sociais?',
        3: 'Que tipo de diagnóstico você precisa?',
        4: 'Qual decisão estratégica você precisa embasar?',
